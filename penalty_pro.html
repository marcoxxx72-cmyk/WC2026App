<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Penalty PRO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:linear-gradient(135deg,#0a0e1a,#0d1b2a,#0a0e1a);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Arial,sans-serif;overflow:hidden}

/* ── SCORE ── */
.score{color:#fff;font-size:14px;display:flex;gap:30px;margin-bottom:14px;letter-spacing:1px}
.score strong{color:#ffd700;font-size:28px;display:block;text-align:center}

/* ── CAGE — overflow:visible pour que le gardien plonge hors cadre ── */
.goal{
  position:relative;width:340px;height:240px;
  border:4px solid rgba(255,255,255,.9);border-bottom:none;border-radius:3px 3px 0 0;
  background:
    repeating-linear-gradient(0deg,transparent,transparent 18px,rgba(255,255,255,.06) 18px,rgba(255,255,255,.06) 19px),
    repeating-linear-gradient(90deg,transparent,transparent 18px,rgba(255,255,255,.06) 18px,rgba(255,255,255,.06) 19px);
  overflow:visible;
}
.goal::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:linear-gradient(180deg,rgba(30,60,120,.25),rgba(10,20,50,.5));
  pointer-events:none;z-index:0;
}

/* ── WRAP GARDIEN ── */
#wrap{
  position:absolute;bottom:0;left:50%;
  transform:translateX(-50%);
  width:200px;
  display:flex;flex-direction:column;align-items:center;
  z-index:5;
}

/* ── GARDIEN IMAGE ── */
#gk{
  width:150px;height:auto;display:block;
  filter:drop-shadow(0 8px 20px rgba(0,0,0,.7));
  transform-origin:center center;
}

/* ── BALLON ── */
#ball{
  position:absolute;width:34px;height:34px;border-radius:50%;
  background:radial-gradient(circle at 35% 32%,#fff 18%,#ddd 40%,#999 70%,#555);
  bottom:-50px;left:50%;transform:translateX(-50%);
  display:none;box-shadow:0 4px 14px rgba(0,0,0,.6);z-index:10;
}
#ball::after{content:'';position:absolute;top:30%;left:20%;width:30%;height:20%;background:rgba(0,0,0,.25);border-radius:50%;transform:rotate(-30deg)}

/* ── FLASH RÉSULTAT ── */
#flash{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:rgba(0,0,0,.82);
  padding:14px 22px;border-radius:14px;
  font-size:clamp(18px,5.5vw,30px);font-weight:900;white-space:nowrap;
  pointer-events:none;z-index:30;
  transition:transform .18s cubic-bezier(.34,1.56,.64,1);
}
#flash.show{transform:translate(-50%,-50%) scale(1)}

/* ── CONFETTIS ── */
.conf{position:absolute;top:-8px;font-size:16px;pointer-events:none;opacity:0;z-index:15}

/* ── BOUTONS ── */
.label{color:rgba(255,255,255,.5);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin:20px 0 10px}
.btns{display:flex;gap:14px}
.btn{
  width:74px;height:74px;border-radius:50%;border:none;
  font-size:26px;cursor:pointer;
  box-shadow:0 6px 20px rgba(0,0,0,.4);
  transition:transform .1s;color:#fff;
  display:flex;align-items:center;justify-content:center;
}
.btn:active{transform:scale(.88)}
.btn:disabled{opacity:.35;pointer-events:none}
.btnL{background:linear-gradient(135deg,#e74c3c,#c0392b)}
.btnC{background:linear-gradient(135deg,#f39c12,#e67e22)}
.btnR{background:linear-gradient(135deg,#27ae60,#2ecc71)}
.hint{color:rgba(255,255,255,.25);font-size:10px;margin-top:10px;letter-spacing:1px}

/* ════════════════════════════════════════
   ANIMATIONS GARDIEN — translation seule
   (les images montrent déjà la pose exacte)
   ════════════════════════════════════════ */

@keyframes gk-idle{
  0%,100%{transform:rotate(-2deg)} 50%{transform:rotate(2deg)}
}
/* Lucarne gauche */
@keyframes gk-diveLA{
  0%  {transform:translateX(0)     translateY(0)}
  30% {transform:translateX(-45px) translateY(-50px)}
  100%{transform:translateX(-85px) translateY(-30px)}
}
/* Ras du sol gauche */
@keyframes gk-diveLB{
  0%  {transform:translateX(0)     translateY(0)}
  30% {transform:translateX(-35px) translateY(-15px)}
  100%{transform:translateX(-70px) translateY(5px)}
}
/* Lucarne droite */
@keyframes gk-diveRA{
  0%  {transform:translateX(0)    translateY(0)}
  30% {transform:translateX(45px) translateY(-50px)}
  100%{transform:translateX(85px) translateY(-30px)}
}
/* Ras du sol droit */
@keyframes gk-diveRB{
  0%  {transform:translateX(0)    translateY(0)}
  30% {transform:translateX(35px) translateY(-15px)}
  100%{transform:translateX(70px) translateY(5px)}
}
/* Saut centre haut */
@keyframes gk-jump{
  0%  {transform:translateY(0)}
  12% {transform:translateY(4px)}
  45% {transform:translateY(-80px)}
  70% {transform:translateY(-75px)}
  100%{transform:translateY(0)}
}
/* Attrappage centre bas */
@keyframes gk-catch{
  0%  {transform:translateY(0)}
  50% {transform:translateY(5px)}
  100%{transform:translateY(8px)}
}

/* ════════════════════════════════════════
   TRAJECTOIRES BALLON
   ════════════════════════════════════════ */
@keyframes flyL{
  0%  {bottom:-50px;left:50%;opacity:1;transform:translateX(-50%) scale(1)}
  100%{bottom:175px;left:12%;opacity:.4;transform:translateX(-50%) scale(.45)}
}
@keyframes flyC{
  0%  {bottom:-50px;left:50%;opacity:1;transform:translateX(-50%) scale(1)}
  100%{bottom:205px;left:50%;opacity:.4;transform:translateX(-50%) scale(.4)}
}
@keyframes flyClow{
  0%  {bottom:-50px;left:50%;opacity:1;transform:translateX(-50%) scale(1)}
  100%{bottom:12px; left:50%;opacity:.75;transform:translateX(-50%) scale(.82)}
}
@keyframes flyR{
  0%  {bottom:-50px;left:50%;opacity:1;transform:translateX(-50%) scale(1)}
  100%{bottom:175px;left:88%;opacity:.4;transform:translateX(-50%) scale(.45)}
}
@keyframes flyLlow{
  0%  {bottom:-50px;left:50%;opacity:1;transform:translateX(-50%) scale(1)}
  100%{bottom:25px; left:8%; opacity:.6;transform:translateX(-50%) scale(.65)}
}
@keyframes flyRlow{
  0%  {bottom:-50px;left:50%;opacity:1;transform:translateX(-50%) scale(1)}
  100%{bottom:25px; left:92%;opacity:.6;transform:translateX(-50%) scale(.65)}
}

@keyframes confFall{
  0%  {transform:translateY(0)     rotate(0);opacity:1}
  100%{transform:translateY(230px) rotate(720deg);opacity:0}
}
</style>
</head>
<body>

<div class="score">
  <div>⚽ Buts<br><strong id="sg">0</strong></div>
  <div>🧤 Arrêts<br><strong id="ss">0</strong></div>
</div>

<div class="goal" id="goal">
  <div id="wrap">
    <img id="gk" src="goalkeeper.png" alt="Gardien" crossorigin="anonymous">
  </div>
  <div id="ball"></div>
  <div id="flash"></div>
</div>

<p class="label">Où tirez-vous ?</p>
<div class="btns">
  <button class="btn btnL" onclick="shoot('L')">⬅</button>
  <button class="btn btnC" onclick="shoot('C')">⬆</button>
  <button class="btn btnR" onclick="shoot('R')">➡</button>
</div>
<p class="hint">Le gardien choisit aléatoirement</p>

<script>
const gk      = document.getElementById('gk');
const ball    = document.getElementById('ball');
const flash   = document.getElementById('flash');
const goal    = document.getElementById('goal');
const btns    = document.querySelectorAll('.btn');
const shootEl = document.getElementById('shoot-main');
let busy=false, goals=0, saves=0;
let _gkH=null;

/* ══ Image pour chaque état ══ */
const IMG_MAP={
  idle:   'goalkeeper.png',
  diveLA: 'gk_diveLA.png',
  diveLB: 'gk_diveLB.png',
  diveRA: 'gk_diveRA.png',
  diveRB: 'gk_diveRB.png',
  jump:   'gk_jump_v3.png',
  catch:  'gk_lo_v4.png'
};

/* ══ Cartes d'animation (corps uniquement, pas de bras CSS) ══ */
const ANIM={
  body:{ idle:'gk-idle', diveLA:'gk-diveLA', diveLB:'gk-diveLB', diveRA:'gk-diveRA', diveRB:'gk-diveRB', jump:'gk-jump', catch:'gk-catch' }
};

/* ══ setState — iOS-safe ══ */
function setState(s){
  const dur  ={idle:'1.6s',jump:'.5s',catch:'.45s',diveLA:'.44s',diveLB:'.44s',diveRA:'.44s',diveRB:'.44s'}[s]||'.44s';
  const fill =s==='idle'?'none':'forwards';
  const rep  =s==='idle'?'infinite':'1';
  const ease =s==='idle'?'ease-in-out':s==='jump'?'ease-out':'cubic-bezier(.2,0,.4,1)';

  if(_gkH){try{_gkH.cancel();}catch(e){} _gkH=null;}

  /* Changer l'image du gardien */
  if(IMG_MAP[s]) gk.src=IMG_MAP[s];

  /* Reset iOS-safe */
  gk.style.animation='none';
  void gk.getBoundingClientRect();
  gk.style.animation=`${ANIM.body[s]} ${dur} ${ease} ${fill} ${rep}`;
}

/* ══ Confettis ══ */
function spawnConfetti(){
  const em=['🎊','⭐','🎉','✨','🌟','💫','🥇'];
  for(let i=0;i<10;i++){
    const d=document.createElement('div');
    d.className='conf'; d.textContent=em[i%em.length];
    d.style.left=(5+i*9)+'%'; d.style.fontSize=(12+Math.random()*10)+'px';
    d.style.animation=`confFall ${.8+i*.1}s ease-in ${i*.06}s forwards`;
    goal.appendChild(d); setTimeout(()=>d.remove(),2000);
  }
}

/* ── MESSAGES VARIÉS PAR TYPE D'ARRÊT (6 langues) ── */
const SAVE_MSGS={
  diveLA:{fr:'PLONGÉE INCROYABLE ! 🧤',en:'INCREDIBLE DIVE ! 🧤',es:'¡PARADA INCREÍBLE ! 🧤',de:'UNGLAUBLICHE PARADE ! 🧤',pt:'DEFESA INCRÍVEL ! 🧤',it:'PARATA INCREDIBILE ! 🧤'},
  diveRA:{fr:'PLONGÉE INCROYABLE ! 🧤',en:'INCREDIBLE DIVE ! 🧤',es:'¡PARADA INCREÍBLE ! 🧤',de:'UNGLAUBLICHE PARADE ! 🧤',pt:'DEFESA INCRÍVEL ! 🧤',it:'PARATA INCREDIBILE ! 🧤'},
  diveLB:{fr:'RÉFLEXE PARFAIT ! 🧤',  en:'PERFECT REFLEX ! 🧤',  es:'¡REFLEJO PERFECTO ! 🧤',de:'PERFEKTER REFLEX ! 🧤',   pt:'REFLEXO PERFEITO ! 🧤', it:'RIFLESSO PERFETTO ! 🧤'},
  diveRB:{fr:'RÉFLEXE PARFAIT ! 🧤',  en:'PERFECT REFLEX ! 🧤',  es:'¡REFLEJO PERFECTO ! 🧤',de:'PERFEKTER REFLEX ! 🧤',   pt:'REFLEXO PERFEITO ! 🧤', it:'RIFLESSO PERFETTO ! 🧤'},
  jump:  {fr:'VOL PARFAIT ! 🧤',      en:'PERFECT FLIGHT ! 🧤',  es:'¡VUELO PERFECTO ! 🧤',  de:'PERFEKTER SPRUNG ! 🧤',   pt:'VÔO PERFEITO ! 🧤',     it:'VOLO PERFETTO ! 🧤'},
  catch: {fr:'DANS LES BRAS ! 🧤',    en:'CAUGHT IT ! 🧤',       es:'¡ATRAPADO ! 🧤',        de:'SICHER GEFANGEN ! 🧤',    pt:'AGARROU ! 🧤',          it:'PRESO AL VOLO ! 🧤'},
};
function getLang(){
  let stored=null;
  try{stored=localStorage.getItem('wc2026_lang');}catch(e){}
  const l=(stored||navigator.language||'fr').slice(0,2).toLowerCase();
  return ['fr','en','es','de','pt','it'].includes(l)?l:'fr';
}

/* Positions snap ballon par type d'arrêt */
const CATCH_POS={
  diveLA:{x:55, b:155}, diveLB:{x:35, b:30},
  diveRA:{x:285,b:155}, diveRB:{x:305,b:30},
  jump:  {x:170,b:195}, catch: {x:170,b:20},
};

function showFlash(txt,color){
  const old=document.getElementById('_fl');
  if(old)old.remove();
  const el=document.createElement('div');
  el.id='_fl';
  el.textContent=txt;
  Object.assign(el.style,{
    position:'fixed',top:'50%',left:'50%',
    transform:'translate(-50%,-50%)',
    background:'rgba(0,0,0,.88)',color:color,
    fontSize:'clamp(22px,6vw,38px)',fontWeight:'900',
    padding:'14px 26px',borderRadius:'16px',
    zIndex:'99999',pointerEvents:'none',whiteSpace:'nowrap',
    fontFamily:'Arial,sans-serif',
    textShadow:'0 2px 10px rgba(0,0,0,.9)',
    letterSpacing:'1px'
  });
  document.body.appendChild(el);
  clearTimeout(showFlash._t);
  showFlash._t=setTimeout(()=>{if(el.parentNode)el.remove();},1300);
}

/* ══ TIRER ══ */
function shoot(dir){
  if(busy)return;
  busy=true;
  btns.forEach(b=>b.disabled=true);
  if(shootEl) shootEl.disabled=true;

  const choices=['L','C','R'];
  let kDir=choices[Math.floor(Math.random()*3)];
  if(Math.random()<0.38) kDir=dir;
  const variant=Math.random()<.5?'A':'B';
  const kAnim={L:variant==='A'?'diveLA':'diveLB', C:Math.random()<.5?'jump':'catch', R:variant==='A'?'diveRA':'diveRB'}[kDir];

  const scored=(dir!==kDir);

  let ballAnim;
  if(dir==='L')      ballAnim=(!scored&&kAnim==='diveLB')?'flyLlow':'flyL';
  else if(dir==='R') ballAnim=(!scored&&kAnim==='diveRB')?'flyRlow':'flyR';
  else               ballAnim=(kDir==='C'&&kAnim==='catch')?'flyClow':'flyC';

  try{ball.getAnimations().forEach(a=>a.cancel());}catch(e){}
  ball.style.animation='none'; ball.style.display='block';
  void ball.getBoundingClientRect();
  ball.style.animation=`${ballAnim} .52s ease-in forwards`;

  setState(kAnim);

  /* Figer le gardien au sommet du saut */
  if(!scored && kAnim==='jump'){
    setTimeout(()=>{ _gkH=gk.animate([{transform:'translateY(-75px)'}],{duration:200,easing:'ease-out',fill:'forwards'}); },340);
  }

  /* Fondu ballon sur arrêt */
  if(!scored){
    setTimeout(()=>ball.animate([{opacity:0}],{duration:220,easing:'ease-in',fill:'forwards'}),1760);
  }

  /* Flash + snap ballon — 520ms */
  setTimeout(()=>{
    if(scored){
      goals++; document.getElementById('sg').textContent=goals;
      showFlash('⚽ BUT !','#ff4444'); spawnConfetti();
    } else {
      saves++; document.getElementById('ss').textContent=saves;
      const lang=getLang();
      const msg=(SAVE_MSGS[kAnim]||{})[lang]||'ARRÊTÉ ! 🧤';
      showFlash(msg,'#ffd700');
      const p=CATCH_POS[kAnim]||{x:170,b:90};
      ball.animate([{left:p.x+'px',bottom:p.b+'px',transform:'translateX(-50%) scale(.5)',opacity:.9}],{duration:130,easing:'ease-out',fill:'forwards'});
    }
  },520);

  /* Reset — 1990ms */
  setTimeout(()=>{
    ball.style.display='none';
    try{ball.getAnimations().forEach(a=>a.cancel());}catch(e){}
    setState('idle');
    busy=false;
    btns.forEach(b=>b.disabled=false);
    if(shootEl) shootEl.disabled=false;
  },1990);
}

setState('idle');
</script>
</body>
</html>
