<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Penalty PRO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0a0e1a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Arial,sans-serif;overflow:hidden;position:relative}
#stadium-bg{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.55;z-index:0;pointer-events:none}
#game-wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;width:100%;max-width:420px;padding:0 8px}

/* ── HEADER SCORE ── */
.hdr{width:100%;background:rgba(0,0,0,0.7);border-bottom:2px solid #d4af37;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;border-radius:8px}
.team{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:70px}
.team-flag{font-size:26px}
.team-name{font-size:10px;color:#aaa;letter-spacing:1px;text-transform:uppercase}
.score-center{display:flex;flex-direction:column;align-items:center;gap:2px}
.score-nums{font-size:32px;font-weight:900;color:#fff;letter-spacing:4px}
.score-label{font-size:9px;color:#d4af37;letter-spacing:2px;text-transform:uppercase}
.score-dots{display:flex;gap:4px;margin-top:2px}
.score-dots span{width:8px;height:8px;border-radius:50%;border:1px solid #d4af37;background:transparent}
.score-dots span.scored{background:#d4af37}

/* ── STATS ── */
.stats-panel{width:100%;background:rgba(0,0,0,0.6);border:1px solid rgba(212,175,55,0.3);border-radius:8px;padding:8px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.player-num{font-size:22px;font-weight:900;color:#d4af37;min-width:28px}
.stats-rows{flex:1;display:flex;flex-direction:column;gap:4px}
.stat-row{display:flex;align-items:center;gap:8px;font-size:10px;color:#aaa;letter-spacing:1px}
.stat-bar{flex:1;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;overflow:hidden}
.stat-fill{height:100%;background:linear-gradient(90deg,#d4af37,#f5d06e);border-radius:2px}
.stat-val{color:#fff;font-weight:bold;min-width:20px;text-align:right;font-size:10px}

/* ── SCORE ── */
.score{color:#fff;font-size:14px;display:flex;gap:30px;margin-bottom:14px;letter-spacing:1px}
.score strong{color:#ffd700;font-size:28px;display:block;text-align:center}

/* ── CAGE — overflow:visible pour que le gardien plonge hors cadre ── */
.goal{
  position:relative;width:340px;height:240px;
  border:4px solid rgba(255,255,255,.9);border-bottom:none;border-radius:3px 3px 0 0;
  background:
    repeating-linear-gradient(0deg,transparent,transparent 18px,rgba(255,255,255,.06) 18px,rgba(255,255,255,.06) 19px),
    repeating-linear-gradient(90deg,transparent,transparent 18px,rgba(255,255,255,.06) 18px,rgba(255,255,255,.06) 19px);
  overflow:visible;
}
.goal::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:linear-gradient(180deg,rgba(30,60,120,.25),rgba(10,20,50,.5));
  pointer-events:none;z-index:0;
}

/* ── WRAP GARDIEN ── */
#wrap{
  position:absolute;bottom:0;left:50%;
  transform:translateX(-50%);
  width:160px;
  display:flex;flex-direction:column;align-items:center;
  z-index:5;
}

/* ── BRAS CSS — pivotent depuis l'épaule ── */
.arms{position:absolute;bottom:70px;width:170px;height:44px;pointer-events:none}
.arm{
  position:absolute;width:58px;height:14px;
  background:linear-gradient(90deg,#5bc8e8,#3aa8cc);
  border-radius:7px;top:50%;
}
#arm-L{right:50%;transform-origin:right center;transform:translateY(-50%) rotate(20deg)}
#arm-R{left:50%;transform-origin:left center;transform:translateY(-50%) rotate(-20deg)}

/* ── GARDIEN IMAGE ── */
#gk{
  width:150px;height:auto;display:block;
  filter:drop-shadow(0 8px 20px rgba(0,0,0,.7));
  transform-origin:bottom center;
}

/* ── BALLON ── */
#ball{
  position:absolute;width:34px;height:34px;border-radius:50%;
  background:radial-gradient(circle at 35% 32%,#fff 18%,#ddd 40%,#999 70%,#555);
  bottom:-50px;left:50%;transform:translateX(-50%);
  display:none;box-shadow:0 4px 14px rgba(0,0,0,.6);z-index:10;
}
#ball::after{content:'';position:absolute;top:30%;left:20%;width:30%;height:20%;background:rgba(0,0,0,.25);border-radius:50%;transform:rotate(-30deg)}

/* ── FLASH RÉSULTAT ── */
#flash{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  font-size:30px;font-weight:900;white-space:nowrap;
  pointer-events:none;text-shadow:0 4px 18px rgba(0,0,0,.9);
  transition:transform .16s cubic-bezier(.34,1.56,.64,1);
  z-index:20;
}
#flash.show{transform:translate(-50%,-50%) scale(1)}

/* ── CONFETTIS ── */
.conf{position:absolute;top:-8px;font-size:16px;pointer-events:none;opacity:0;z-index:15}

/* ── BOUTONS ── */
.label{color:rgba(255,255,255,.5);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin:12px 0 8px}
.btns{display:flex;gap:14px;margin-bottom:4px}
.btn{
  width:68px;height:68px;border-radius:50%;border:2px solid rgba(212,175,55,0.4);
  font-size:22px;cursor:pointer;
  box-shadow:0 6px 20px rgba(0,0,0,.5);
  transition:transform .1s;color:#fff;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.6);
}
.btn:active{transform:scale(.88)}
.btn:disabled{opacity:.35;pointer-events:none}
.btnL{border-color:#e74c3c;color:#e74c3c}
.btnC{border-color:#d4af37;color:#d4af37}
.btnR{border-color:#27ae60;color:#27ae60}
.shoot-btn{
  width:100%;padding:15px;background:linear-gradient(135deg,#d4af37,#b8963e);
  color:#0a0e1a;border:none;border-radius:50px;font-size:18px;font-weight:900;
  cursor:pointer;letter-spacing:2px;margin-top:10px;
  box-shadow:0 8px 25px rgba(212,175,55,0.4);transition:transform .1s;
}
.shoot-btn:active{transform:scale(.96)}
.shoot-btn:disabled{opacity:.4;pointer-events:none}
.hint{color:rgba(255,255,255,.25);font-size:10px;margin-top:6px;letter-spacing:1px}

/* ════════════════════════════════════════
   ANIMATIONS CORPS GARDIEN — 6 positions
   transform-origin: bottom center
   ════════════════════════════════════════ */

@keyframes gk-idle{
  0%,100%{transform:rotate(-2deg)} 50%{transform:rotate(2deg)}
}
/* Lucarne gauche — grand plongeon en arc */
@keyframes gk-diveLA{
  0%  {transform:translateX(0)       translateY(0)       rotate(0)}
  30% {transform:translateX(-50px)   translateY(-60px)   rotate(-40deg)}
  65% {transform:translateX(-110px)  translateY(-40px)   rotate(-70deg)}
  100%{transform:translateX(-160px)  translateY(-10px)   rotate(-78deg)}
}
/* Ras du sol gauche */
@keyframes gk-diveLB{
  0%  {transform:translateX(0)       translateY(0)       rotate(0)}
  30% {transform:translateX(-40px)   translateY(-20px)   rotate(-25deg)}
  65% {transform:translateX(-90px)   translateY(-5px)    rotate(-45deg)}
  100%{transform:translateX(-135px)  translateY(5px)     rotate(-55deg)}
}
/* Lucarne droite */
@keyframes gk-diveRA{
  0%  {transform:translateX(0)       translateY(0)       rotate(0)}
  30% {transform:translateX(50px)    translateY(-60px)   rotate(40deg)}
  65% {transform:translateX(110px)   translateY(-40px)   rotate(70deg)}
  100%{transform:translateX(160px)   translateY(-10px)   rotate(78deg)}
}
/* Ras du sol droit */
@keyframes gk-diveRB{
  0%  {transform:translateX(0)       translateY(0)       rotate(0)}
  30% {transform:translateX(40px)    translateY(-20px)   rotate(25deg)}
  65% {transform:translateX(90px)    translateY(-5px)    rotate(45deg)}
  100%{transform:translateX(135px)   translateY(5px)     rotate(55deg)}
}
/* Saut centre haut */
@keyframes gk-jump{
  0%  {transform:translateY(0)     scaleX(1)    scaleY(1)}
  12% {transform:translateY(4px)   scaleX(1.05) scaleY(.92)}
  45% {transform:translateY(-75px) scaleX(1.2)  scaleY(1)}
  70% {transform:translateY(-65px) scaleX(1.25) scaleY(1)}
  100%{transform:translateY(0)     scaleX(1)    scaleY(1)}
}
/* Attrappage centre bas — penché en avant */
@keyframes gk-catch{
  0%  {transform:translateY(0)     rotate(0)      scaleY(1)}
  50% {transform:translateY(6px)   rotate(-15deg) scaleY(.93)}
  100%{transform:translateY(10px)  rotate(-25deg) scaleY(.87)}
}

/* ════════════════════════════════════════
   ANIMATIONS BRAS — pivotent depuis épaule
   ════════════════════════════════════════ */
@keyframes armL-idle  {0%,100%{transform:translateY(-50%) rotate(20deg)} 50%{transform:translateY(-50%) rotate(8deg)}}
@keyframes armR-idle  {0%,100%{transform:translateY(-50%) rotate(-20deg)} 50%{transform:translateY(-50%) rotate(-8deg)}}

/* Bras actif — part vers la lucarne */
@keyframes armL-diveA {
  0%  {transform:translateY(-50%) rotate(20deg)  scaleX(1)}
  50% {transform:translateY(-50%) rotate(70deg)  scaleX(1.2)}
  100%{transform:translateY(-50%) rotate(120deg) scaleX(1.45)}
}
@keyframes armL-diveB {
  0%  {transform:translateY(-50%) rotate(20deg)   scaleX(1)}
  50% {transform:translateY(-50%) rotate(-20deg)  scaleX(1.2)}
  100%{transform:translateY(-50%) rotate(-60deg)  scaleX(1.45)}
}
@keyframes armR-diveA {
  0%  {transform:translateY(-50%) rotate(-20deg)  scaleX(1)}
  50% {transform:translateY(-50%) rotate(-70deg)  scaleX(1.2)}
  100%{transform:translateY(-50%) rotate(-120deg) scaleX(1.45)}
}
@keyframes armR-diveB {
  0%  {transform:translateY(-50%) rotate(-20deg) scaleX(1)}
  50% {transform:translateY(-50%) rotate(20deg)  scaleX(1.2)}
  100%{transform:translateY(-50%) rotate(60deg)  scaleX(1.45)}
}
/* Bras traîne — suit le mouvement */
@keyframes armR-trailA{0%{transform:translateY(-50%) rotate(-20deg)} 100%{transform:translateY(-50%) rotate(-50deg)}}
@keyframes armR-trailB{0%{transform:translateY(-50%) rotate(-20deg)} 100%{transform:translateY(-50%) rotate(-35deg)}}
@keyframes armL-trailA{0%{transform:translateY(-50%) rotate(20deg)}  100%{transform:translateY(-50%) rotate(50deg)}}
@keyframes armL-trailB{0%{transform:translateY(-50%) rotate(20deg)}  100%{transform:translateY(-50%) rotate(35deg)}}
/* Saut — bras montent et RESTENT en haut (fill:forwards) pour la phase 2 */
@keyframes armL-jump  {0%{transform:translateY(-50%) rotate(20deg)}  100%{transform:translateY(-50%) rotate(-90deg)}}
@keyframes armR-jump  {0%{transform:translateY(-50%) rotate(-20deg)} 100%{transform:translateY(-50%) rotate(90deg)}}
/* Catch — bras ouverts vers le bas pour attraper */
@keyframes armL-catch {
  0%  {transform:translateY(-50%) rotate(20deg)   scaleX(1)}
  50% {transform:translateY(-50%) rotate(-35deg)  scaleX(1.2)}
  100%{transform:translateY(-50%) rotate(-55deg)  scaleX(1.35)}
}
@keyframes armR-catch {
  0%  {transform:translateY(-50%) rotate(-20deg)  scaleX(1)}
  50% {transform:translateY(-50%) rotate(35deg)   scaleX(1.2)}
  100%{transform:translateY(-50%) rotate(55deg)   scaleX(1.35)}
}

/* ════════════════════════════════════════
   TRAJECTOIRES BALLON
   ════════════════════════════════════════ */
@keyframes flyL{
  0%  {bottom:-50px;left:50%;opacity:1;transform:translateX(-50%) scale(1)}
  100%{bottom:185px;left:12%;opacity:.4;transform:translateX(-50%) scale(.45)}
}
@keyframes flyC{
  0%  {bottom:-50px;left:50%;opacity:1;transform:translateX(-50%) scale(1)}
  100%{bottom:205px;left:50%;opacity:.4;transform:translateX(-50%) scale(.4)}
}
/* Trajectoire centre-save : arrive à hauteur des bras levés (~148px) */
@keyframes flyCsave{
  0%  {bottom:-50px;left:50%;opacity:1;transform:translateX(-50%) scale(1)}
  100%{bottom:148px;left:50%;opacity:.4;transform:translateX(-50%) scale(.44)}
}
@keyframes flyClow{
  0%  {bottom:-50px;left:50%;opacity:1;transform:translateX(-50%) scale(1)}
  100%{bottom:12px; left:50%;opacity:.75;transform:translateX(-50%) scale(.82)}
}
@keyframes flyR{
  0%  {bottom:-50px;left:50%;opacity:1;transform:translateX(-50%) scale(1)}
  100%{bottom:185px;left:88%;opacity:.4;transform:translateX(-50%) scale(.45)}
}

/* CONFETTIS */
@keyframes confFall{
  0%  {transform:translateY(0)    rotate(0);opacity:1}
  100%{transform:translateY(230px) rotate(720deg);opacity:0}
}
</style>
</head>
<body>
<img src="/stadium_bg.png" id="stadium-bg" alt="" crossorigin="anonymous">

<div id="game-wrap">

  <!-- HEADER SCORE -->
  <div class="hdr">
    <div class="team">
      <div class="team-flag">🏴󠁧󠁢󠁥󠁮󠁧󠁿</div>
      <div class="team-name">YOU</div>
    </div>
    <div class="score-center">
      <div class="score-label">PENALTIES</div>
      <div class="score-nums"><span id="sg">0</span> – <span id="ss">0</span></div>
      <div class="score-dots">
        <span id="d1"></span><span id="d2"></span><span id="d3"></span>
        <span id="d4"></span><span id="d5"></span>
      </div>
    </div>
    <div class="team">
      <div class="team-flag">🧤</div>
      <div class="team-name">GK</div>
    </div>
  </div>

  <!-- STATS JOUEUR -->
  <div class="stats-panel">
    <div class="player-num">10</div>
    <div class="stats-rows">
      <div class="stat-row">POWER<div class="stat-bar"><div class="stat-fill" style="width:82%"></div></div><span class="stat-val">82</span></div>
      <div class="stat-row">PRECISION<div class="stat-bar"><div class="stat-fill" style="width:91%"></div></div><span class="stat-val">91</span></div>
      <div class="stat-row">NERVE<div class="stat-bar"><div class="stat-fill" style="width:75%"></div></div><span class="stat-val">75</span></div>
    </div>
  </div>

  <!-- CAGE + GARDIEN -->
  <div class="goal" id="goal">
    <div id="wrap">
      <div class="arms">
        <div class="arm" id="arm-L"></div>
        <div class="arm" id="arm-R"></div>
      </div>
      <img id="gk" src="goalkeeper.png" alt="Gardien" crossorigin="anonymous">
    </div>
    <div id="ball"></div>
    <div id="flash"></div>
  </div>

  <!-- DIRECTION -->
  <p class="label">Where do you shoot?</p>
  <div class="btns">
    <button class="btn btnL" onclick="shoot('L')">⬅</button>
    <button class="btn btnC" onclick="shoot('C')">⬆</button>
    <button class="btn btnR" onclick="shoot('R')">➡</button>
  </div>

  <!-- SHOOT -->
  <button class="shoot-btn" id="shoot-main" onclick="shootAuto()">⚽ SHOOT</button>
  <p class="hint">Goalkeeper chooses randomly</p>

</div>

<script>
const gk   = document.getElementById('gk');
const armL = document.getElementById('arm-L');
const armR = document.getElementById('arm-R');
const ball = document.getElementById('ball');
const flash= document.getElementById('flash');
const goal = document.getElementById('goal');
const btns = document.querySelectorAll('.btn');
const shootMain = document.getElementById('shoot-main');
let busy=false, goals=0, saves=0, gkHoldAnim=null;
let pendingDir=null;

function shootAuto(){
  const dirs=['L','C','R'];
  shoot(dirs[Math.floor(Math.random()*3)]);
}

/* ══ Cartes d'animation par position ══ */
const ANIM = {
  body:{
    idle:   'gk-idle',
    diveLA: 'gk-diveLA', diveLB: 'gk-diveLB',
    diveRA: 'gk-diveRA', diveRB: 'gk-diveRB',
    jump:   'gk-jump',   catch:  'gk-catch'
  },
  armL:{
    idle:   'armL-idle',
    diveLA: 'armL-diveA', diveLB: 'armL-diveB',
    diveRA: 'armL-trailA',diveRB: 'armL-trailB',
    jump:   'armL-jump',  catch:  'armL-catch'
  },
  armR:{
    idle:   'armR-idle',
    diveLA: 'armR-trailA',diveLB: 'armR-trailB',
    diveRA: 'armR-diveA', diveRB: 'armR-diveB',
    jump:   'armR-jump',  catch:  'armR-catch'
  }
};

/* ══ setState — iOS-safe ══ */
function setState(s){
  const dur  = {idle:'1.6s',jump:'.5s',catch:'.45s',diveLA:'.44s',diveLB:'.44s',diveRA:'.44s',diveRB:'.44s'}[s]||'.44s';
  const fill = s==='idle'?'none':'forwards';
  const rep  = s==='idle'?'infinite':'1';
  const ease = s==='idle'?'ease-in-out':s==='jump'?'ease-out':'cubic-bezier(.2,0,.4,1)';
  const easeA= s==='idle'?'ease-in-out':'ease-out';

  /* Annuler uniquement les WAAPI sur les bras + le hold de saut éventuel */
  if(gkHoldAnim){ try{gkHoldAnim.cancel();}catch(e){} gkHoldAnim=null; }
  try{ armL.getAnimations().forEach(a=>a.cancel()); }catch(e){}
  try{ armR.getAnimations().forEach(a=>a.cancel()); }catch(e){}

  /* Reset iOS-safe */
  gk.style.animation   = 'none';
  armL.style.animation = 'none';
  armR.style.animation = 'none';
  void gk.getBoundingClientRect();

  gk.style.animation   = `${ANIM.body[s]||''} ${dur} ${ease}  ${fill} ${rep}`;
  armL.style.animation = `${ANIM.armL[s]||''} ${dur} ${easeA} ${fill} ${rep}`;
  armR.style.animation = `${ANIM.armR[s]||''} ${dur} ${easeA} ${fill} ${rep}`;
}

/* ══ Phase 2 — Web Animations API ══
   element.animate([{to}]) démarre DEPUIS la valeur animée courante →
   écrase la CSS animation sans snap ni transition inline.
*/
const ARMS_CLOSE = {
  diveLA: ['translateY(-50%) rotate(110deg) scaleX(1.35)','translateY(-50%) rotate(-35deg)'],
  diveLB: ['translateY(-50%) rotate(-52deg) scaleX(1.35)','translateY(-50%) rotate(-25deg)'],
  diveRA: ['translateY(-50%) rotate(35deg)',              'translateY(-50%) rotate(-110deg) scaleX(1.35)'],
  diveRB: ['translateY(-50%) rotate(25deg)',              'translateY(-50%) rotate(-52deg)  scaleX(1.35)'],
  jump:   ['translateY(-50%) rotate(-78deg)',             'translateY(-50%) rotate(78deg)'],
  catch:  ['translateY(-50%) rotate(-68deg) scaleX(1.25)','translateY(-50%) rotate(68deg)   scaleX(1.25)'],
};
const ARMS_LOCK = {
  diveLA: ['translateY(-50%) rotate(114deg) scaleX(1.3)','translateY(-50%) rotate(-40deg)'],
  diveLB: ['translateY(-50%) rotate(-56deg) scaleX(1.3)','translateY(-50%) rotate(-28deg)'],
  diveRA: ['translateY(-50%) rotate(40deg)',             'translateY(-50%) rotate(-114deg) scaleX(1.3)'],
  diveRB: ['translateY(-50%) rotate(28deg)',             'translateY(-50%) rotate(-56deg)  scaleX(1.3)'],
  jump:   ['translateY(-50%) rotate(-82deg)',            'translateY(-50%) rotate(82deg)'],
  catch:  ['translateY(-50%) rotate(-72deg) scaleX(1.2)','translateY(-50%) rotate(72deg)   scaleX(1.2)'],
};

function setArmsClose(kAnim){
  const cl=ARMS_CLOSE[kAnim]; if(!cl) return;
  /* Démarre depuis la position CSS animée courante — aucun snap */
  armL.animate([{transform:cl[0]}],{duration:180,easing:'ease-out',fill:'forwards'});
  armR.animate([{transform:cl[1]}],{duration:180,easing:'ease-out',fill:'forwards'});
}
function setArmsLock(kAnim){
  const lk=ARMS_LOCK[kAnim]; if(!lk) return;
  armL.animate([{transform:lk[0]}],{duration:100,easing:'ease-out',fill:'forwards'});
  armR.animate([{transform:lk[1]}],{duration:100,easing:'ease-out',fill:'forwards'});
}

/* ══ Confettis sur but ══ */
function spawnConfetti(){
  const emojis=['🎊','⭐','🎉','✨','🌟','💫','🥇'];
  for(let i=0;i<10;i++){
    const d=document.createElement('div');
    d.className='conf';
    d.textContent=emojis[i%emojis.length];
    d.style.left=(5+i*9)+'%';
    d.style.fontSize=(12+Math.random()*10)+'px';
    d.style.animation=`confFall ${.8+i*.1}s ease-in ${i*.06}s forwards`;
    goal.appendChild(d);
    setTimeout(()=>d.remove(),2000);
  }
}

/* ══ Flash résultat ══ */
function showFlash(txt,color){
  flash.textContent=txt;
  flash.style.color=color;
  flash.classList.add('show');
  setTimeout(()=>flash.classList.remove('show'),1100);
}

/* ══ TIRER ══ */
function shoot(dir){
  if(busy)return;
  busy=true;
  btns.forEach(b=>b.disabled=true);
  if(shootMain) shootMain.disabled=true;

  const choices=['L','C','R'];
  /* IA gardien — lit le tir 15% du temps (→ ~43% save rate) */
  let kDir = choices[Math.floor(Math.random()*3)];
  if(Math.random()<0.15) kDir=dir;
  const variant= Math.random()<.5?'A':'B';

  /* Animation gardien selon sa décision */
  const kAnim = {
    L: variant==='A'?'diveLA':'diveLB',
    C: Math.random()<.5?'jump':'catch',
    R: variant==='A'?'diveRA':'diveRB'
  }[kDir];

  /* Résultat connu maintenant (avant choix de trajectoire) */
  const scored=(dir!==kDir);

  /* Trajectoire ballon */
  let ballAnim='flyL';
  if(dir==='R') ballAnim='flyR';
  else if(dir==='C'){
    if(kDir==='C'&&kAnim==='catch')       ballAnim='flyClow';
    else if(!scored&&kAnim==='jump')       ballAnim='flyCsave'; /* arrive aux bras */
    else                                   ballAnim='flyC';
  }

  /* Reset ballon iOS-safe — nettoie aussi les WAAPI opacity de l'arrêt précédent */
  try{ ball.getAnimations().forEach(a=>a.cancel()); }catch(e){}
  ball.style.animation='none';
  ball.style.display='block';
  void ball.getBoundingClientRect();
  ball.style.animation=`${ballAnim} .52s ease-in forwards`;

  /* Lancer l'animation gardien */
  setState(kAnim);

  /* Phase 2 — arrêt seulement : bras se referment + ballon reste visible */
  if(!scored){
    setTimeout(()=>setArmsClose(kAnim), 320);
    setTimeout(()=>setArmsLock(kAnim),  520);
    /* #2 — ballon "attrapé" : éclairci 530ms, fondu sortant 1760ms */
    setTimeout(()=>ball.animate([{opacity:.92}],{duration:80,easing:'ease-out',fill:'forwards'}), 530);
    setTimeout(()=>ball.animate([{opacity:0}],  {duration:220,easing:'ease-in', fill:'forwards'}), 1760);
    /* Saut : figer le gardien à son point culminant (sinon il retombe avant l'arrêt) */
    if(kAnim==='jump'){
      setTimeout(()=>{
        gkHoldAnim=gk.animate(
          [{transform:'translateY(-65px) scaleX(1.25) scaleY(1)'}],
          {duration:200,easing:'ease-out',fill:'forwards'}
        );
      }, 340);
    }
  }

  /* Flash résultat — 520ms = fin de trajectoire visible */
  setTimeout(()=>{
    if(scored){
      goals++;
      document.getElementById('sg').textContent=goals;
      showFlash('⚽ BUT !','#ff4444');
      spawnConfetti();
    } else {
      saves++;
      document.getElementById('ss').textContent=saves;
      showFlash('ARRÊTÉ ! 🧤','#ffd700');
    }
  },520);

  /* Reset — 1990ms (laisse le fondu ballon se terminer) */
  setTimeout(()=>{
    ball.style.display='none';
    try{ ball.getAnimations().forEach(a=>a.cancel()); }catch(e){}
    setState('idle');
    busy=false;
    btns.forEach(b=>b.disabled=false);
    if(shootMain) shootMain.disabled=false;
  },1990);
}

/* Démarrage idle */
setState('idle');
</script>
