<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Penalty PRO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:linear-gradient(135deg,#0a0e1a,#0d1b2a,#0a0e1a);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Arial,sans-serif;overflow:hidden}

/* ── SCORE ── */
.score{color:#fff;font-size:14px;display:flex;gap:30px;margin-bottom:14px;letter-spacing:1px}
.score strong{color:#ffd700;font-size:28px;display:block;text-align:center}

/* ── CAGE — overflow:visible pour que le gardien plonge hors cadre ── */
.goal{
  position:relative;width:340px;height:240px;
  border:4px solid rgba(255,255,255,.9);border-bottom:none;border-radius:3px 3px 0 0;
  background:
    repeating-linear-gradient(0deg,transparent,transparent 18px,rgba(255,255,255,.06) 18px,rgba(255,255,255,.06) 19px),
    repeating-linear-gradient(90deg,transparent,transparent 18px,rgba(255,255,255,.06) 18px,rgba(255,255,255,.06) 19px);
  overflow:visible;
}
.goal::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:linear-gradient(180deg,rgba(30,60,120,.25),rgba(10,20,50,.5));
  pointer-events:none;z-index:0;
}

/* ── WRAP GARDIEN ── */
#wrap{
  position:absolute;bottom:0;left:50%;
  transform:translateX(-50%);
  width:160px;
  display:flex;flex-direction:column;align-items:center;
  z-index:5;
}

/* ── BRAS CSS — pivotent depuis l'épaule ── */
.arms{position:absolute;bottom:70px;width:170px;height:44px;pointer-events:none}
.arm{
  position:absolute;width:58px;height:14px;
  background:linear-gradient(90deg,#5bc8e8,#3aa8cc);
  border-radius:7px;top:50%;
}
#arm-L{right:50%;transform-origin:right center;transform:translateY(-50%) rotate(20deg)}
#arm-R{left:50%;transform-origin:left center;transform:translateY(-50%) rotate(-20deg)}

/* ── GARDIEN IMAGE ── */
#gk{
  width:150px;height:auto;display:block;
  filter:drop-shadow(0 8px 20px rgba(0,0,0,.7));
  transform-origin:bottom center;
}

/* ── BALLON ── */
#ball{
  position:absolute;width:34px;height:34px;border-radius:50%;
  background:radial-gradient(circle at 35% 32%,#fff 18%,#ddd 40%,#999 70%,#555);
  bottom:-50px;left:50%;transform:translateX(-50%);
  display:none;box-shadow:0 4px 14px rgba(0,0,0,.6);z-index:10;
}
#ball::after{content:'';position:absolute;top:30%;left:20%;width:30%;height:20%;background:rgba(0,0,0,.25);border-radius:50%;transform:rotate(-30deg)}

/* ── FLASH RÉSULTAT ── */
#flash{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:rgba(0,0,0,.82);
  padding:14px 22px;border-radius:14px;
  font-size:clamp(18px,5.5vw,30px);font-weight:900;white-space:nowrap;
  pointer-events:none;z-index:30;
  transition:transform .18s cubic-bezier(.34,1.56,.64,1);
}
#flash.show{transform:translate(-50%,-50%) scale(1)}

/* ── CONFETTIS ── */
.conf{position:absolute;top:-8px;font-size:16px;pointer-events:none;opacity:0;z-index:15}

/* ── BOUTONS ── */
.label{color:rgba(255,255,255,.5);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin:20px 0 10px}
.btns{display:flex;gap:14px}
.btn{
  width:74px;height:74px;border-radius:50%;border:none;
  font-size:26px;cursor:pointer;
  box-shadow:0 6px 20px rgba(0,0,0,.4);
  transition:transform .1s;color:#fff;
  display:flex;align-items:center;justify-content:center;
}
.btn:active{transform:scale(.88)}
.btn:disabled{opacity:.35;pointer-events:none}
.btnL{background:linear-gradient(135deg,#e74c3c,#c0392b)}
.btnC{background:linear-gradient(135deg,#f39c12,#e67e22)}
.btnR{background:linear-gradient(135deg,#27ae60,#2ecc71)}
.hint{color:rgba(255,255,255,.25);font-size:10px;margin-top:10px;letter-spacing:1px}

/* ════════════════════════════════════════
   ANIMATIONS CORPS GARDIEN — 6 positions
   transform-origin: bottom center
   ════════════════════════════════════════ */

@keyframes gk-idle{
  0%,100%{transform:rotate(-2deg)} 50%{transform:rotate(2deg)}
}
/* Lucarne gauche */
@keyframes gk-diveLA{
  0%  {transform:translateX(0)       translateY(0)       rotate(0)}
  30% {transform:translateX(-50px)   translateY(-60px)   rotate(-40deg)}
  65% {transform:translateX(-110px)  translateY(-40px)   rotate(-70deg)}
  100%{transform:translateX(-160px)  translateY(-10px)   rotate(-78deg)}
}
/* Ras du sol gauche */
@keyframes gk-diveLB{
  0%  {transform:translateX(0)       translateY(0)       rotate(0)}
  30% {transform:translateX(-40px)   translateY(-20px)   rotate(-25deg)}
  65% {transform:translateX(-90px)   translateY(-5px)    rotate(-45deg)}
  100%{transform:translateX(-135px)  translateY(5px)     rotate(-55deg)}
}
/* Lucarne droite */
@keyframes gk-diveRA{
  0%  {transform:translateX(0)       translateY(0)       rotate(0)}
  30% {transform:translateX(50px)    translateY(-60px)   rotate(40deg)}
  65% {transform:translateX(110px)   translateY(-40px)   rotate(70deg)}
  100%{transform:translateX(160px)   translateY(-10px)   rotate(78deg)}
}
/* Ras du sol droit */
@keyframes gk-diveRB{
  0%  {transform:translateX(0)       translateY(0)       rotate(0)}
  30% {transform:translateX(40px)    translateY(-20px)   rotate(25deg)}
  65% {transform:translateX(90px)    translateY(-5px)    rotate(45deg)}
  100%{transform:translateX(135px)   translateY(5px)     rotate(55deg)}
}
/* Saut centre haut */
@keyframes gk-jump{
  0%  {transform:translateY(0)     scaleX(1)    scaleY(1)}
  12% {transform:translateY(4px)   scaleX(1.05) scaleY(.92)}
  45% {transform:translateY(-75px) scaleX(1.2)  scaleY(1)}
  70% {transform:translateY(-65px) scaleX(1.25) scaleY(1)}
  100%{transform:translateY(0)     scaleX(1)    scaleY(1)}
}
/* Attrappage centre bas — penché en avant */
@keyframes gk-catch{
  0%  {transform:translateY(0)     rotate(0)      scaleY(1)}
  50% {transform:translateY(6px)   rotate(-15deg) scaleY(.93)}
  100%{transform:translateY(10px)  rotate(-25deg) scaleY(.87)}
}

/* ════════════════════════════════════════
   ANIMATIONS BRAS — pivotent depuis épaule
   ════════════════════════════════════════ */
@keyframes armL-idle  {0%,100%{transform:translateY(-50%) rotate(20deg)} 50%{transform:translateY(-50%) rotate(8deg)}}
@keyframes armR-idle  {0%,100%{transform:translateY(-50%) rotate(-20deg)} 50%{transform:translateY(-50%) rotate(-8deg)}}

/* Bras actif — part vers la lucarne */
@keyframes armL-diveA {
  0%  {transform:translateY(-50%) rotate(20deg)  scaleX(1)}
  50% {transform:translateY(-50%) rotate(70deg)  scaleX(1.2)}
  100%{transform:translateY(-50%) rotate(120deg) scaleX(1.45)}
}
@keyframes armL-diveB {
  0%  {transform:translateY(-50%) rotate(20deg)   scaleX(1)}
  50% {transform:translateY(-50%) rotate(-20deg)  scaleX(1.2)}
  100%{transform:translateY(-50%) rotate(-60deg)  scaleX(1.45)}
}
@keyframes armR-diveA {
  0%  {transform:translateY(-50%) rotate(-20deg)  scaleX(1)}
  50% {transform:translateY(-50%) rotate(-70deg)  scaleX(1.2)}
  100%{transform:translateY(-50%) rotate(-120deg) scaleX(1.45)}
}
@keyframes armR-diveB {
  0%  {transform:translateY(-50%) rotate(-20deg) scaleX(1)}
  50% {transform:translateY(-50%) rotate(20deg)  scaleX(1.2)}
  100%{transform:translateY(-50%) rotate(60deg)  scaleX(1.45)}
}
/* Bras traîne — suit le mouvement */
@keyframes armR-trailA{0%{transform:translateY(-50%) rotate(-20deg)} 100%{transform:translateY(-50%) rotate(-50deg)}}
@keyframes armR-trailB{0%{transform:translateY(-50%) rotate(-20deg)} 100%{transform:translateY(-50%) rotate(-35deg)}}
@keyframes armL-trailA{0%{transform:translateY(-50%) rotate(20deg)}  100%{transform:translateY(-50%) rotate(50deg)}}
@keyframes armL-trailB{0%{transform:translateY(-50%) rotate(20deg)}  100%{transform:translateY(-50%) rotate(35deg)}}
/* Saut — bras montent et RESTENT en haut (fill:forwards) pour la phase 2 */
@keyframes armL-jump  {0%{transform:translateY(-50%) rotate(20deg)}  100%{transform:translateY(-50%) rotate(-90deg)}}
@keyframes armR-jump  {0%{transform:translateY(-50%) rotate(-20deg)} 100%{transform:translateY(-50%) rotate(90deg)}}
/* Catch — bras ouverts vers le bas pour attraper */
@keyframes armL-catch {
  0%  {transform:translateY(-50%) rotate(20deg)   scaleX(1)}
  50% {transform:translateY(-50%) rotate(-35deg)  scaleX(1.2)}
  100%{transform:translateY(-50%) rotate(-55deg)  scaleX(1.35)}
}
@keyframes armR-catch {
  0%  {transform:translateY(-50%) rotate(-20deg)  scaleX(1)}
  50% {transform:translateY(-50%) rotate(35deg)   scaleX(1.2)}
  100%{transform:translateY(-50%) rotate(55deg)   scaleX(1.35)}
}

/* ════════════════════════════════════════
   TRAJECTOIRES BALLON
   ════════════════════════════════════════ */
@keyframes flyL{
  0%  {bottom:-50px;left:50%;opacity:1;transform:translateX(-50%) scale(1)}
  100%{bottom:175px;left:12%;opacity:.4;transform:translateX(-50%) scale(.45)}
}
@keyframes flyC{
  0%  {bottom:-50px;left:50%;opacity:1;transform:translateX(-50%) scale(1)}
  100%{bottom:205px;left:50%;opacity:.4;transform:translateX(-50%) scale(.4)}
}
@keyframes flyClow{
  0%  {bottom:-50px;left:50%;opacity:1;transform:translateX(-50%) scale(1)}
  100%{bottom:12px; left:50%;opacity:.75;transform:translateX(-50%) scale(.82)}
}
@keyframes flyR{
  0%  {bottom:-50px;left:50%;opacity:1;transform:translateX(-50%) scale(1)}
  100%{bottom:175px;left:88%;opacity:.4;transform:translateX(-50%) scale(.45)}
}
/* Trajectoires basses (arrêts ras du sol) */
@keyframes flyLlow{
  0%  {bottom:-50px;left:50%;opacity:1;transform:translateX(-50%) scale(1)}
  100%{bottom:25px; left:8%; opacity:.6;transform:translateX(-50%) scale(.65)}
}
@keyframes flyRlow{
  0%  {bottom:-50px;left:50%;opacity:1;transform:translateX(-50%) scale(1)}
  100%{bottom:25px; left:92%;opacity:.6;transform:translateX(-50%) scale(.65)}
}

/* CONFETTIS */
@keyframes confFall{
  0%  {transform:translateY(0)    rotate(0);opacity:1}
  100%{transform:translateY(230px) rotate(720deg);opacity:0}
}
</style>
</head>
<body>

<div class="score">
  <div>⚽ <span id="lbl-goals">Buts</span><br><strong id="sg">0</strong></div>
  <div>🧤 <span id="lbl-saves">Arrêts</span><br><strong id="ss">0</strong></div>
</div>

<div class="goal" id="goal">
  <div id="wrap">
    <div class="arms">
      <div class="arm" id="arm-L"></div>
      <div class="arm" id="arm-R"></div>
    </div>
    <img id="gk" src="goalkeeper.png" alt="Gardien" crossorigin="anonymous">
  </div>
  <div id="ball"></div>
  <div id="flash"></div>
</div>

<p class="label" id="lbl-shoot">Où tirez-vous ?</p>
<div class="btns">
  <button class="btn btnL" onclick="shoot('L')">⬅</button>
  <button class="btn btnC" onclick="shoot('C')">⬆</button>
  <button class="btn btnR" onclick="shoot('R')">➡</button>
</div>
<p class="hint" id="lbl-hint">Le gardien choisit aléatoirement</p>

<script>
const gk      = document.getElementById('gk');
const armL    = document.getElementById('arm-L');
const armR    = document.getElementById('arm-R');
const ball    = document.getElementById('ball');
const flash   = document.getElementById('flash');
const goal    = document.getElementById('goal');
const btns    = document.querySelectorAll('.btn');
const shootEl = document.getElementById('shoot-main');
let busy=false, goals=0, saves=0;
/* Références aux WAAPI actives — on cancelle UNIQUEMENT celles-ci (pas les CSS) */
let _armL=null, _armR=null, _gkH=null;

function shootAuto(){
  const d=['L','C','R']; shoot(d[Math.floor(Math.random()*3)]);
}

/* ══ Cartes d'animation ══ */
const ANIM = {
  body:{ idle:'gk-idle', diveLA:'gk-diveLA', diveLB:'gk-diveLB', diveRA:'gk-diveRA', diveRB:'gk-diveRB', jump:'gk-jump', catch:'gk-catch' },
  armL:{ idle:'armL-idle', diveLA:'armL-diveA', diveLB:'armL-diveB', diveRA:'armL-trailA', diveRB:'armL-trailB', jump:'armL-jump', catch:'armL-catch' },
  armR:{ idle:'armR-idle', diveLA:'armR-trailA', diveLB:'armR-trailB', diveRA:'armR-diveA', diveRB:'armR-diveB', jump:'armR-jump', catch:'armR-catch' }
};

/* ══ setState — iOS-safe, cancelle uniquement les WAAPI stockées ══ */
function setState(s){
  const dur  = {idle:'1.6s',jump:'.5s',catch:'.45s',diveLA:'.44s',diveLB:'.44s',diveRA:'.44s',diveRB:'.44s'}[s]||'.44s';
  const fill = s==='idle'?'none':'forwards';
  const rep  = s==='idle'?'infinite':'1';
  const ease = s==='idle'?'ease-in-out':s==='jump'?'ease-out':'cubic-bezier(.2,0,.4,1)';
  const easeA= s==='idle'?'ease-in-out':'ease-out';

  /* Canceller uniquement les WAAPI qu'on a créées (pas les CSS du gardien) */
  if(_gkH){ try{_gkH.cancel();}catch(e){} _gkH=null; }
  if(_armL){ try{_armL.cancel();}catch(e){} _armL=null; }
  if(_armR){ try{_armR.cancel();}catch(e){} _armR=null; }

  /* Reset iOS-safe */
  gk.style.animation   = 'none';
  armL.style.animation = 'none';
  armR.style.animation = 'none';
  void gk.getBoundingClientRect();

  gk.style.animation   = `${ANIM.body[s]} ${dur} ${ease} ${fill} ${rep}`;
  armL.style.animation = `${ANIM.armL[s]} ${dur} ${easeA} ${fill} ${rep}`;
  armR.style.animation = `${ANIM.armR[s]} ${dur} ${easeA} ${fill} ${rep}`;
}

/* ══ Phase 2 — WAAPI bras se referment ══ */
const ARMS_CLOSE = {
  diveLA:['translateY(-50%) rotate(110deg) scaleX(1.35)','translateY(-50%) rotate(-35deg)'],
  diveLB:['translateY(-50%) rotate(-52deg) scaleX(1.35)','translateY(-50%) rotate(-25deg)'],
  diveRA:['translateY(-50%) rotate(35deg)','translateY(-50%) rotate(-110deg) scaleX(1.35)'],
  diveRB:['translateY(-50%) rotate(25deg)','translateY(-50%) rotate(-52deg) scaleX(1.35)'],
  jump:  ['translateY(-50%) rotate(-78deg)','translateY(-50%) rotate(78deg)'],
  catch: ['translateY(-50%) rotate(-68deg) scaleX(1.25)','translateY(-50%) rotate(68deg) scaleX(1.25)'],
};
const ARMS_LOCK = {
  diveLA:['translateY(-50%) rotate(114deg) scaleX(1.3)','translateY(-50%) rotate(-40deg)'],
  diveLB:['translateY(-50%) rotate(-56deg) scaleX(1.3)','translateY(-50%) rotate(-28deg)'],
  diveRA:['translateY(-50%) rotate(40deg)','translateY(-50%) rotate(-114deg) scaleX(1.3)'],
  diveRB:['translateY(-50%) rotate(28deg)','translateY(-50%) rotate(-56deg) scaleX(1.3)'],
  jump:  ['translateY(-50%) rotate(-82deg)','translateY(-50%) rotate(82deg)'],
  catch: ['translateY(-50%) rotate(-72deg) scaleX(1.2)','translateY(-50%) rotate(72deg) scaleX(1.2)'],
};

function setArmsClose(k){
  const c=ARMS_CLOSE[k]; if(!c)return;
  _armL=armL.animate([{transform:c[0]}],{duration:180,easing:'ease-out',fill:'forwards'});
  _armR=armR.animate([{transform:c[1]}],{duration:180,easing:'ease-out',fill:'forwards'});
}
function setArmsLock(k){
  const l=ARMS_LOCK[k]; if(!l)return;
  _armL=armL.animate([{transform:l[0]}],{duration:100,easing:'ease-out',fill:'forwards'});
  _armR=armR.animate([{transform:l[1]}],{duration:100,easing:'ease-out',fill:'forwards'});
}

/* ══ Confettis ══ */
function spawnConfetti(){
  const em=['🎊','⭐','🎉','✨','🌟','💫','🥇'];
  for(let i=0;i<10;i++){
    const d=document.createElement('div');
    d.className='conf'; d.textContent=em[i%em.length];
    d.style.left=(5+i*9)+'%'; d.style.fontSize=(12+Math.random()*10)+'px';
    d.style.animation=`confFall ${.8+i*.1}s ease-in ${i*.06}s forwards`;
    goal.appendChild(d); setTimeout(()=>d.remove(),2000);
  }
}

/* ══ Flash ══ */
/* ── MESSAGES BUT — 3 variantes × 6 langues ── */
const GOAL_MSGS=[
  {fr:'⚽ BUT !',            en:'⚽ GOAL !',            es:'⚽ ¡GOL !',            de:'⚽ TOR !',              pt:'⚽ GOL !',             it:'⚽ GOL !'},
  {fr:'⚽ DANS LE FILET !',  en:'⚽ IN THE NET !',      es:'⚽ ¡A LA RED !',       de:'⚽ INS NETZ !',         pt:'⚽ NA REDE !',         it:'⚽ IN RETE !'},
  {fr:'⚽ MAGNIFIQUE !',     en:'⚽ BEAUTIFUL GOAL !',  es:'⚽ ¡QUÉ GOLAZO !',    de:'⚽ WUNDERSCHÖN !',      pt:'⚽ QUE GOLAÇO !',      it:'⚽ CHE GOL !'},
];
/* ── MESSAGES ARRÊT — 2 variantes × 6 types × 6 langues ── */
const SAVE_MSGS={
  diveLA:[
    {fr:'PLONGÉE INCROYABLE ! 🧤', en:'INCREDIBLE DIVE ! 🧤',    es:'¡PARADA INCREÍBLE ! 🧤',  de:'UNGLAUBLICHE PARADE ! 🧤', pt:'DEFESA INCRÍVEL ! 🧤',    it:'PARATA INCREDIBILE ! 🧤'},
    {fr:'QUE RÉFLEXE ! 🧤',        en:'WHAT A REFLEX ! 🧤',      es:'¡QUÉ REFLEJO ! 🧤',       de:'WELCH EIN REFLEX ! 🧤',    pt:'QUE REFLEXO ! 🧤',        it:'CHE RIFLESSO ! 🧤'},
  ],
  diveRA:[
    {fr:'PLONGÉE INCROYABLE ! 🧤', en:'INCREDIBLE DIVE ! 🧤',    es:'¡PARADA INCREÍBLE ! 🧤',  de:'UNGLAUBLICHE PARADE ! 🧤', pt:'DEFESA INCRÍVEL ! 🧤',    it:'PARATA INCREDIBILE ! 🧤'},
    {fr:'ENVOL PARFAIT ! 🧤',      en:'PERFECT TAKE-OFF ! 🧤',   es:'¡VUELO PERFECTO ! 🧤',    de:'PERFEKTER ABFLUG ! 🧤',    pt:'VOO PERFEITO ! 🧤',       it:'VOLO PERFETTO ! 🧤'},
  ],
  diveLB:[
    {fr:'RÉFLEXE PARFAIT ! 🧤',   en:'PERFECT REFLEX ! 🧤',     es:'¡REFLEJO PERFECTO ! 🧤',  de:'PERFEKTER REFLEX ! 🧤',    pt:'REFLEXO PERFEITO ! 🧤',   it:'RIFLESSO PERFETTO ! 🧤'},
    {fr:'ARRÊT AU SOL ! 🧤',      en:'DIVING SAVE ! 🧤',        es:'¡PARADA AL SUELO ! 🧤',   de:'PARADE AM BODEN ! 🧤',     pt:'DEFESA RASTEIRA ! 🧤',    it:'PARATA A TERRA ! 🧤'},
  ],
  diveRB:[
    {fr:'RÉFLEXE PARFAIT ! 🧤',   en:'PERFECT REFLEX ! 🧤',     es:'¡REFLEJO PERFECTO ! 🧤',  de:'PERFEKTER REFLEX ! 🧤',    pt:'REFLEXO PERFEITO ! 🧤',   it:'RIFLESSO PERFETTO ! 🧤'},
    {fr:'LANCÉ COMME UNE FLÈCHE ! 🧤',en:'ARROW DIVE ! 🧤',     es:'¡COMO UNA FLECHA ! 🧤',   de:'WIE EIN PFEIL ! 🧤',       pt:'COMO UMA FLECHA ! 🧤',    it:'COME UNA FRECCIA ! 🧤'},
  ],
  jump:[
    {fr:'VOL PARFAIT ! 🧤',       en:'PERFECT FLIGHT ! 🧤',     es:'¡VUELO PERFECTO ! 🧤',    de:'PERFEKTER SPRUNG ! 🧤',    pt:'VÔO PERFEITO ! 🧤',       it:'VOLO PERFETTO ! 🧤'},
    {fr:'IL DÉCOLLE ! 🧤',        en:'HE FLIES ! 🧤',           es:'¡VUELA ! 🧤',             de:'ER FLIEGT ! 🧤',           pt:'ELE VOA ! 🧤',            it:'VOLA ! 🧤'},
  ],
  catch:[
    {fr:'DANS LES BRAS ! 🧤',     en:'CAUGHT IT ! 🧤',          es:'¡ATRAPADO ! 🧤',          de:'SICHER GEFANGEN ! 🧤',     pt:'PEGOU ! 🧤',            it:'PRESO AL VOLO ! 🧤'},
    {fr:'ATTRAPÉ PROPREMENT ! 🧤',en:'CLEAN CATCH ! 🧤',        es:'¡CAPTURADO ! 🧤',         de:'SAUBER GEFANGEN ! 🧤',     pt:'PEGOU LIMPO ! 🧤',        it:'PRESO PULITO ! 🧤'},
  ],
};
function getLang(){
  const supported=['fr','en','es','de','pt','it'];
  const urlP=new URLSearchParams(window.location.search).get('lang');
  if(urlP&&supported.includes(urlP))return urlP;
  let stored=null;
  try{stored=localStorage.getItem('wc2026_lang');}catch(e){}
  const l=(stored||navigator.language||'fr').slice(0,2).toLowerCase();
  return supported.includes(l)?l:'fr';
}
/* Positions snap fixes par type d'arrêt (px dans goal, bottom depuis bas) */
const CATCH_POS={
  diveLA:{x:42, b:170}, diveLB:{x:28, b:28},
  diveRA:{x:298,b:170}, diveRB:{x:312,b:28},
  jump:  {x:170,b:190}, catch: {x:170,b:16},
};
/* Flash intérieur — dans l'écran noir (cage) */
function showFlashInner(txt,color){
  flash.textContent=txt; flash.style.color=color;
  flash.classList.add('show');
  clearTimeout(flash._tid);
  flash._tid=setTimeout(()=>flash.classList.remove('show'),1250);
}
/* Flash extérieur — grand overlay plein écran */
function showFlash(txt,color){
  const old=document.getElementById('_fl');
  if(old)old.remove();
  const el=document.createElement('div');
  el.id='_fl';
  el.textContent=txt;
  Object.assign(el.style,{
    position:'fixed',top:'50%',left:'50%',
    transform:'translate(-50%,-50%)',
    background:'rgba(0,0,0,.88)',color:color,
    fontSize:'clamp(22px,6vw,38px)',fontWeight:'900',
    padding:'14px 26px',borderRadius:'16px',
    zIndex:'99999',pointerEvents:'none',whiteSpace:'nowrap',
    fontFamily:'Arial,sans-serif',
    textShadow:'0 2px 10px rgba(0,0,0,.9)',
    letterSpacing:'1px'
  });
  document.body.appendChild(el);
  clearTimeout(showFlash._t);
  showFlash._t=setTimeout(()=>{if(el.parentNode)el.remove();},1300);
}

/* ══ TIRER ══ */
function shoot(dir){
  if(busy)return;
  busy=true;
  btns.forEach(b=>b.disabled=true);
  if(shootEl) shootEl.disabled=true;

  const choices=['L','C','R'];
  let kDir=choices[Math.floor(Math.random()*3)];
  if(Math.random()<0.38) kDir=dir;               /* IA ~59% save rate */
  const variant=Math.random()<.5?'A':'B';
  const kAnim={L:variant==='A'?'diveLA':'diveLB', C:Math.random()<.5?'jump':'catch', R:variant==='A'?'diveRA':'diveRB'}[kDir];

  /* Résultat connu avant de choisir la trajectoire */
  const scored=(dir!==kDir);

  /* Trajectoire ballon — variante basse pour saves ras-du-sol */
  let ballAnim;
  if(dir==='L')      ballAnim=(!scored&&kAnim==='diveLB')?'flyLlow':'flyL';
  else if(dir==='R') ballAnim=(!scored&&kAnim==='diveRB')?'flyRlow':'flyR';
  else               ballAnim=(kDir==='C'&&kAnim==='catch')?'flyClow':'flyC';

  /* Reset ballon iOS-safe */
  try{ball.getAnimations().forEach(a=>a.cancel());}catch(e){}
  ball.style.animation='none'; ball.style.display='block';
  void ball.getBoundingClientRect();
  ball.style.animation=`${ballAnim} .52s ease-in forwards`;

  setState(kAnim);

  /* Phase 2 — seulement sur arrêt */
  if(!scored){
    setTimeout(()=>setArmsClose(kAnim), 320);
    setTimeout(()=>setArmsLock(kAnim),  520);
    /* Saut : figer le gardien à son point culminant */
    if(kAnim==='jump'){
      setTimeout(()=>{ _gkH=gk.animate([{transform:'translateY(-65px) scaleX(1.25) scaleY(1)'}],{duration:200,easing:'ease-out',fill:'forwards'}); },340);
    }
    /* Fondu sortant du ballon */
    setTimeout(()=>ball.animate([{opacity:0}],{duration:220,easing:'ease-in',fill:'forwards'}),1760);
  }

  /* Flash + snap ballon sur les bras — 520ms */
  const SIMPLE_GOAL={fr:'⚽ BUT !',   en:'⚽ GOAL !', es:'⚽ GOL !', de:'⚽ TOR !', pt:'⚽ GOL !', it:'⚽ GOL !'};
  const SIMPLE_SAVE={fr:'ARRÊTÉ ! 🧤',en:'SAVED ! 🧤',es:'PARADO ! 🧤',de:'GEHALTEN ! 🧤',pt:'PEGOU ! 🧤',it:'PARATO ! 🧤'};
  setTimeout(()=>{
    const lang=getLang();
    if(scored){
      goals++; document.getElementById('sg').textContent=goals;
      const gm=GOAL_MSGS[Math.floor(Math.random()*GOAL_MSGS.length)];
      showFlash(gm[lang]||gm.en,'#ff4444');
      spawnConfetti();
    } else {
      saves++; document.getElementById('ss').textContent=saves;
      const arr=SAVE_MSGS[kAnim]||[{fr:'ARRÊTÉ !',en:'SAVED !',es:'PARADO !',de:'GEHALTEN !',pt:'PEGOU !',it:'PARATO !'}];
      const pick=arr[Math.floor(Math.random()*arr.length)];
      showFlash(pick[lang]||pick.en,'#ffd700');
      /* Snap ballon sur position fixe par type d'arrêt */
      const p=CATCH_POS[kAnim]||{x:170,b:90};
      ball.animate([{left:p.x+'px',bottom:p.b+'px',transform:'translateX(-50%) scale(.5)',opacity:.9}],{duration:130,easing:'ease-out',fill:'forwards'});
    }
  },520);

  /* Reset — 1990ms */
  setTimeout(()=>{
    ball.style.display='none';
    try{ball.getAnimations().forEach(a=>a.cancel());}catch(e){}
    setState('idle');
    busy=false;
    btns.forEach(b=>b.disabled=false);
    if(shootEl) shootEl.disabled=false;
  },1990);
}

/* ── Traduction UI ── */
const UI={
  fr:{goals:'Buts',      saves:'Arrêts',  shoot:'Où tirez-vous ?',        hint:'Le gardien choisit aléatoirement'},
  en:{goals:'Goals',     saves:'Saves',   shoot:'Where do you shoot ?',   hint:'The goalkeeper chooses randomly'},
  es:{goals:'Goles',     saves:'Paradas', shoot:'¿Dónde disparas ?',      hint:'El portero elige al azar'},
  de:{goals:'Tore',      saves:'Paraden', shoot:'Wohin schießt du ?',     hint:'Der Torwart wählt zufällig'},
  pt:{goals:'Gols',      saves:'Defesas', shoot:'Para onde você chuta ?', hint:'O goleiro escolhe aleatoriamente'},
  it:{goals:'Gol',       saves:'Parate',  shoot:'Dove tiri ?',            hint:'Il portiere sceglie a caso'},
};
function applyLang(){
  const l=getLang();
  const t=UI[l]||UI.fr;
  document.getElementById('lbl-goals').textContent=t.goals;
  document.getElementById('lbl-saves').textContent=t.saves;
  document.getElementById('lbl-shoot').textContent=t.shoot;
  document.getElementById('lbl-hint').textContent=t.hint;
}
applyLang();
setState('idle');
</script>
