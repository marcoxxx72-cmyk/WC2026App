<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Penalty PRO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:linear-gradient(135deg,#0a0e1a,#0d1b2a,#0a0e1a);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Arial,sans-serif;overflow:hidden}

/* ── SCORE ── */
.score{color:#fff;font-size:14px;display:flex;gap:30px;margin-bottom:12px;letter-spacing:1px}
.score strong{color:#ffd700;font-size:26px;display:block;text-align:center}

/* ── CAGE ── */
.goal{
  position:relative;width:340px;height:240px;
  border:4px solid rgba(255,255,255,.9);border-bottom:none;border-radius:3px 3px 0 0;
  background:
    repeating-linear-gradient(0deg,transparent,transparent 18px,rgba(255,255,255,.06) 18px,rgba(255,255,255,.06) 19px),
    repeating-linear-gradient(90deg,transparent,transparent 18px,rgba(255,255,255,.06) 18px,rgba(255,255,255,.06) 19px);
  overflow:hidden;
}
.goal::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(180deg,rgba(30,60,120,.25),rgba(10,20,50,.5))}

/* ── GARDIEN SVG ── */
#gk-wrap{
  position:absolute;bottom:0;left:50%;
  transform:translateX(-50%);
  width:80px;height:160px;
  transform-origin:bottom center;
}
#gk-svg{width:100%;height:100%;overflow:visible;}

/* ── BALLON ── */
#ball{
  position:absolute;width:32px;height:32px;
  border-radius:50%;
  background:radial-gradient(circle at 35% 32%,#fff 18%,#ddd 40%,#999 70%,#555);
  bottom:-50px;left:50%;transform:translateX(-50%);
  display:none;
  box-shadow:0 4px 14px rgba(0,0,0,.6);
}
#ball::after{content:'';position:absolute;top:30%;left:20%;width:30%;height:20%;background:rgba(0,0,0,.25);border-radius:50%;transform:rotate(-30deg)}

/* ── FLASH RESULT ── */
#flash{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  font-size:28px;font-weight:900;white-space:nowrap;
  pointer-events:none;text-shadow:0 4px 18px rgba(0,0,0,.9);
  transition:transform .16s cubic-bezier(.34,1.56,.64,1);
}
#flash.show{transform:translate(-50%,-50%) scale(1)}

/* ── CONFETTIS GOAL ── */
.conf{position:absolute;top:-8px;font-size:16px;pointer-events:none;opacity:0;}

/* ── BOUTONS ── */
.label{color:rgba(255,255,255,.5);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin:18px 0 10px}
.btns{display:flex;gap:14px}
.btn{
  width:72px;height:72px;border-radius:50%;border:none;
  font-size:26px;cursor:pointer;
  box-shadow:0 6px 20px rgba(0,0,0,.4);
  transition:transform .1s;color:#fff;
  display:flex;align-items:center;justify-content:center;
}
.btn:active{transform:scale(.88)}
.btn:disabled{opacity:.35;pointer-events:none}
.btnL{background:linear-gradient(135deg,#e74c3c,#c0392b)}
.btnC{background:linear-gradient(135deg,#f39c12,#e67e22)}
.btnR{background:linear-gradient(135deg,#27ae60,#2ecc71)}
.hint{color:rgba(255,255,255,.25);font-size:10px;margin-top:12px;letter-spacing:1px}

/* ══════════════════════════════════════════
   ANIMATIONS GARDIEN — 6 positions
   Base : transform-origin = bottom center
   ══════════════════════════════════════════ */

/* Idle — oscillation douce */
@keyframes idle{
  0%,100%{transform:translateX(-50%) rotate(-2deg)}
  50%{transform:translateX(-50%) rotate(2deg)}
}

/* TYPE A — LUCARNE (-78° / +78°) */
@keyframes diveLA{
  0%  {transform:translateX(-50%) translateY(0)      rotate(0)}
  30% {transform:translateX(-130px) translateY(-60px) rotate(-50deg)}
  100%{transform:translateX(-190px) translateY(-20px) rotate(-78deg)}
}
@keyframes diveRA{
  0%  {transform:translateX(-50%) translateY(0)      rotate(0)}
  30% {transform:translateX(50px)  translateY(-60px) rotate(50deg)}
  100%{transform:translateX(110px) translateY(-20px) rotate(78deg)}
}

/* TYPE B — RAS DU SOL (-55° / +55°) */
@keyframes diveLB{
  0%  {transform:translateX(-50%) translateY(0)      rotate(0)}
  30% {transform:translateX(-110px) translateY(20px) rotate(-35deg)}
  100%{transform:translateX(-170px) translateY(30px) rotate(-55deg)}
}
@keyframes diveRB{
  0%  {transform:translateX(-50%) translateY(0)      rotate(0)}
  30% {transform:translateX(30px)  translateY(20px)  rotate(35deg)}
  100%{transform:translateX(90px)  translateY(30px)  rotate(55deg)}
}

/* SAUT CENTRE */
@keyframes jump{
  0%  {transform:translateX(-50%) translateY(0)      scaleX(1)}
  40% {transform:translateX(-50%) translateY(-75px)  scaleX(1.15)}
  70% {transform:translateX(-50%) translateY(-65px)  scaleX(1.2)}
  100%{transform:translateX(-50%) translateY(0)      scaleX(1)}
}

/* ATTRAPPAGE CENTRE BAS */
@keyframes catchC{
  0%  {transform:translateX(-50%) translateY(0) rotate(0) scaleX(1)}
  50% {transform:translateX(-50%) translateY(5px) rotate(-8deg) scaleX(1.1)}
  100%{transform:translateX(-50%) translateY(8px) rotate(-12deg) scaleX(1.15)}
}

/* ══ TRAJECTOIRES BALLON ══ */
@keyframes flyL{
  0%  {bottom:-50px;left:50%;opacity:1;transform:translateX(-50%) scale(1)}
  100%{bottom:195px;left:11%;opacity:.35;transform:translateX(-50%) scale(.42)}
}
@keyframes flyCH{
  0%  {bottom:-50px;left:50%;opacity:1;transform:translateX(-50%) scale(1)}
  100%{bottom:210px;left:50%;opacity:.35;transform:translateX(-50%) scale(.38)}
}
@keyframes flyCL{
  0%  {bottom:-50px;left:50%;opacity:1;transform:translateX(-50%) scale(1)}
  100%{bottom:100px;left:50%;opacity:.35;transform:translateX(-50%) scale(.55)}
}
@keyframes flyR{
  0%  {bottom:-50px;left:50%;opacity:1;transform:translateX(-50%) scale(1)}
  100%{bottom:195px;left:88%;opacity:.35;transform:translateX(-50%) scale(.42)}
}

/* CONFETTIS */
@keyframes confFall{
  0%  {transform:translateY(0) rotate(0);opacity:1}
  100%{transform:translateY(230px) rotate(720deg);opacity:0}
}
</style>
</head>
<body>

<div class="score">
  <div>⚽ Buts<br><strong id="sg">0</strong></div>
  <div>🧤 Arrêts<br><strong id="ss">0</strong></div>
</div>

<div class="goal" id="goal">

  <!-- Gardien SVG stick figure -->
  <div id="gk-wrap">
    <svg id="gk-svg" viewBox="-40 -160 80 160" xmlns="http://www.w3.org/2000/svg">
      <!-- Tête -->
      <circle id="gk-head" cx="0" cy="-142" r="12" fill="rgba(255,255,255,.15)" stroke="white" stroke-width="2.5"/>
      <!-- Torse -->
      <line id="gk-torso" x1="0" y1="-130" x2="0" y2="-80" stroke="white" stroke-width="4" stroke-linecap="round"/>
      <!-- Bras gauche -->
      <line id="gk-armL1" x1="0" y1="-120" x2="-22" y2="-95" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
      <line id="gk-armL2" x1="-22" y1="-95" x2="-32" y2="-72" stroke="white" stroke-width="3" stroke-linecap="round"/>
      <!-- Gant gauche -->
      <circle id="gk-gloveL" cx="-32" cy="-72" r="8" fill="rgba(120,224,0,.35)" stroke="#78e000" stroke-width="2.5"/>
      <!-- Bras droit -->
      <line id="gk-armR1" x1="0" y1="-120" x2="22" y2="-95" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
      <line id="gk-armR2" x1="22" y1="-95" x2="32" y2="-72" stroke="white" stroke-width="3" stroke-linecap="round"/>
      <!-- Gant droit -->
      <circle id="gk-gloveR" cx="32" cy="-72" r="8" fill="rgba(120,224,0,.35)" stroke="#78e000" stroke-width="2.5"/>
      <!-- Bassin -->
      <line id="gk-hip" x1="-14" y1="-80" x2="14" y2="-80" stroke="white" stroke-width="3" stroke-linecap="round"/>
      <!-- Jambe gauche -->
      <line id="gk-legL1" x1="-8" y1="-80" x2="-14" y2="-40" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
      <line id="gk-legL2" x1="-14" y1="-40" x2="-18" y2="-6" stroke="white" stroke-width="4" stroke-linecap="round"/>
      <!-- Jambe droite -->
      <line id="gk-legR1" x1="8" y1="-80" x2="14" y2="-40" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
      <line id="gk-legR2" x1="14" y1="-40" x2="18" y2="-6" stroke="white" stroke-width="4" stroke-linecap="round"/>
    </svg>
  </div>

  <div id="ball"></div>
  <div id="flash"></div>
</div>

<p class="label">Où tirez-vous ?</p>
<div class="btns">
  <button class="btn btnL" onclick="shoot('L')">⬅</button>
  <button class="btn btnC" onclick="shoot('C')">⬆</button>
  <button class="btn btnR" onclick="shoot('R')">➡</button>
</div>
<p class="hint" id="hint-txt">Le gardien choisit aléatoirement</p>

<script>
const wrap  = document.getElementById('gk-wrap');
const ball  = document.getElementById('ball');
const flash = document.getElementById('flash');
const goal  = document.getElementById('goal');
const btns  = document.querySelectorAll('.btn');
let busy=false, goals=0, saves=0;

/* ══ setState iOS-safe ══ */
function setState(s){
  const durMap={idle:'1.6s',jump:'.52s',catchC:'.4s',diveLA:'.42s',diveLB:'.42s',diveRA:'.42s',diveRB:'.42s'};
  const dur   = durMap[s]||'.42s';
  const fill  = s==='idle'?'none':'forwards';
  const rep   = s==='idle'?'infinite':'1';
  const ease  = s==='idle'?'ease-in-out':s==='jump'?'ease-out':'cubic-bezier(.2,0,.4,1)';

  /* iOS Safari fix — reset + reflow */
  wrap.style.animation='none';
  void wrap.offsetWidth;
  wrap.style.animation=`${s} ${dur} ${ease} ${fill} ${rep}`;

  /* Mise à jour SVG selon position */
  updateSVG(s);
}

/* Adapte la SVG aux 6 positions */
function updateSVG(s){
  const head  = document.getElementById('gk-head');
  const glL   = document.getElementById('gk-gloveL');
  const glR   = document.getElementById('gk-gloveR');
  const aL1   = document.getElementById('gk-armL1');
  const aL2   = document.getElementById('gk-armL2');
  const aR1   = document.getElementById('gk-armR1');
  const aR2   = document.getElementById('gk-armR2');

  if(s==='idle'){
    /* Bras position normale */
    aL1.setAttribute('x2','-22');aL1.setAttribute('y2','-95');
    aL2.setAttribute('x1','-22');aL2.setAttribute('y1','-95');aL2.setAttribute('x2','-32');aL2.setAttribute('y2','-72');
    glL.setAttribute('cx','-32');glL.setAttribute('cy','-72');
    aR1.setAttribute('x2','22'); aR1.setAttribute('y2','-95');
    aR2.setAttribute('x1','22');aR2.setAttribute('y1','-95');aR2.setAttribute('x2','32');aR2.setAttribute('y2','-72');
    glR.setAttribute('cx','32'); glR.setAttribute('cy','-72');
  } else if(s==='diveLA'){
    /* Bras gauche vers lucarne haut-gauche */
    aL1.setAttribute('x2','-28');aL1.setAttribute('y2','-130');
    aL2.setAttribute('x1','-28');aL2.setAttribute('y1','-130');aL2.setAttribute('x2','-40');aL2.setAttribute('y2','-148');
    glL.setAttribute('cx','-40');glL.setAttribute('cy','-148');
    /* Bras droit — traîne derrière */
    aR1.setAttribute('x2','18');aR1.setAttribute('y2','-70');
    aR2.setAttribute('x1','18');aR2.setAttribute('y1','-70');aR2.setAttribute('x2','22');aR2.setAttribute('y2','-50');
    glR.setAttribute('cx','22');glR.setAttribute('cy','-50');
  } else if(s==='diveRA'){
    /* Bras droit vers lucarne haut-droit */
    aR1.setAttribute('x2','28');aR1.setAttribute('y2','-130');
    aR2.setAttribute('x1','28');aR2.setAttribute('y1','-130');aR2.setAttribute('x2','40');aR2.setAttribute('y2','-148');
    glR.setAttribute('cx','40');glR.setAttribute('cy','-148');
    /* Bras gauche — traîne */
    aL1.setAttribute('x2','-18');aL1.setAttribute('y2','-70');
    aL2.setAttribute('x1','-18');aL2.setAttribute('y1','-70');aL2.setAttribute('x2','-22');aL2.setAttribute('y2','-50');
    glL.setAttribute('cx','-22');glL.setAttribute('cy','-50');
  } else if(s==='diveLB'){
    /* Bras gauche vers sol gauche */
    aL1.setAttribute('x2','-26');aL1.setAttribute('y2','-60');
    aL2.setAttribute('x1','-26');aL2.setAttribute('y1','-60');aL2.setAttribute('x2','-38');aL2.setAttribute('y2','-22');
    glL.setAttribute('cx','-38');glL.setAttribute('cy','-22');
    aR1.setAttribute('x2','14');aR1.setAttribute('y2','-90');
    aR2.setAttribute('x1','14');aR2.setAttribute('y1','-90');aR2.setAttribute('x2','18');aR2.setAttribute('y2','-68');
    glR.setAttribute('cx','18');glR.setAttribute('cy','-68');
  } else if(s==='diveRB'){
    /* Bras droit vers sol droit */
    aR1.setAttribute('x2','26');aR1.setAttribute('y2','-60');
    aR2.setAttribute('x1','26');aR2.setAttribute('y1','-60');aR2.setAttribute('x2','38');aR2.setAttribute('y2','-22');
    glR.setAttribute('cx','38');glR.setAttribute('cy','-22');
    aL1.setAttribute('x2','-14');aL1.setAttribute('y2','-90');
    aL2.setAttribute('x1','-14');aL2.setAttribute('y1','-90');aL2.setAttribute('x2','-18');aL2.setAttribute('y2','-68');
    glL.setAttribute('cx','-18');glL.setAttribute('cy','-68');
  } else if(s==='jump'){
    /* Les deux bras montent */
    aL1.setAttribute('x2','-20');aL1.setAttribute('y2','-135');
    aL2.setAttribute('x1','-20');aL2.setAttribute('y1','-135');aL2.setAttribute('x2','-28');aL2.setAttribute('y2','-152');
    glL.setAttribute('cx','-28');glL.setAttribute('cy','-152');
    aR1.setAttribute('x2','20');aR1.setAttribute('y2','-135');
    aR2.setAttribute('x1','20');aR2.setAttribute('y1','-135');aR2.setAttribute('x2','28');aR2.setAttribute('y2','-152');
    glR.setAttribute('cx','28');glR.setAttribute('cy','-152');
  } else if(s==='catchC'){
    /* Les deux bras descendent vers le bas-centre */
    aL1.setAttribute('x2','-16');aL1.setAttribute('y2','-85');
    aL2.setAttribute('x1','-16');aL2.setAttribute('y1','-85');aL2.setAttribute('x2','-12');aL2.setAttribute('y2','-55');
    glL.setAttribute('cx','-12');glL.setAttribute('cy','-55');
    aR1.setAttribute('x2','16');aR1.setAttribute('y2','-85');
    aR2.setAttribute('x1','16');aR2.setAttribute('y1','-85');aR2.setAttribute('x2','12');aR2.setAttribute('y2','-55');
    glR.setAttribute('cx','12');glR.setAttribute('cy','-55');
  }
}

function spawnConfetti(){
  const emojis=['🎊','⭐','🎉','✨','🌟','💫','🥇'];
  for(let i=0;i<10;i++){
    const d=document.createElement('div');
    d.className='conf';
    d.textContent=emojis[i%emojis.length];
    d.style.left=(5+i*9)+'%';
    d.style.top='0';
    d.style.fontSize=(12+Math.random()*10)+'px';
    d.style.animation=`confFall ${.8+i*.1}s ease-in ${i*.06}s forwards`;
    goal.appendChild(d);
    setTimeout(()=>d.remove(),2000);
  }
}

function showFlash(txt,color){
  flash.textContent=txt;
  flash.style.color=color;
  flash.classList.add('show');
  setTimeout(()=>flash.classList.remove('show'),1100);
}

function shoot(dir){
  if(busy)return;
  busy=true;
  btns.forEach(b=>b.disabled=true);

  /* IA gardien — choisit parmi les positions adaptées */
  const choices=['L','C','R'];
  const kDir=choices[Math.floor(Math.random()*3)];

  /* Variante A (lucarne) ou B (bas) au hasard selon direction */
  function keeperAnim(kd){
    if(kd==='L') return Math.random()<.5?'diveLA':'diveLB';
    if(kd==='R') return Math.random()<.5?'diveRA':'diveRB';
    return Math.random()<.5?'jump':'catchC';
  }
  const kAnim=keeperAnim(kDir);

  /* Trajectoire ballon : si centre — haut ou bas au hasard */
  let ballAnim='flyL';
  if(dir==='R') ballAnim='flyR';
  else if(dir==='C') ballAnim=Math.random()<.5?'flyCH':'flyCL';

  /* Reset ballon iOS-safe */
  ball.style.animation='none';
  ball.style.display='block';
  void ball.offsetWidth;
  ball.style.animation=`${ballAnim} .55s ease-in forwards`;

  setState(kAnim);

  /* Résultat */
  setTimeout(()=>{
    const saved=(dir===kDir)||
      (dir==='L'&&(kAnim==='diveLA'||kAnim==='diveLB'))||
      (dir==='R'&&(kAnim==='diveRA'||kAnim==='diveRB'))||
      (dir==='C'&&(kAnim==='jump'||kAnim==='catchC'));

    if(saved){
      saves++;document.getElementById('ss').textContent=saves;
      showFlash('ARRÊTÉ ! 🧤','#ffd700');
    } else {
      goals++;document.getElementById('sg').textContent=goals;
      showFlash('BUT ! ⚽','#ff4444');
      spawnConfetti();
    }
  },550);

  /* Reset */
  setTimeout(()=>{
    /* iOS-safe reset animation */
    wrap.style.animation='none';
    void wrap.offsetWidth;
    setState('idle');
    ball.style.display='none';
    busy=false;
    btns.forEach(b=>b.disabled=false);
    updateSVG('idle');
  },2000);
}

setState('idle');
</script>
</body>
</html>
