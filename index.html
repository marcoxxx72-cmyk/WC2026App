<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#08091a;color:#eee8d5;font-family:sans-serif;min-height:100vh}
#root{min-height:100vh}
select{-webkit-appearance:none;appearance:none}
#splash-overlay{position:fixed;inset:0;background:#08091a;z-index:9999;transition:opacity 0.8s ease;display:flex;align-items:center;justify-content:center}
#splash-overlay.hidden{opacity:0;pointer-events:none}
#splash-icon{width:110px;height:110px;border-radius:24px;opacity:0;animation:iconIn 1s ease 0.3s forwards,iconOut 0.6s ease 1.6s forwards;z-index:2;position:relative}
@keyframes iconIn{from{opacity:0;transform:scale(0.7)}to{opacity:1;transform:scale(1)}}
@keyframes iconOut{from{opacity:1}to{opacity:0}}
#splash-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;opacity:0;animation:bgIn 1s ease 2s forwards}
@keyframes bgIn{from{opacity:0}to{opacity:1}}

/* ── Goalkeeper CSS animations (used by PenaltyCSSGame in app.js) ── */
@keyframes gk-idle{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
@keyframes gk-diveLA{0%{transform:translateX(0) translateY(0) rotate(0)}30%{transform:translateX(-50px) translateY(-60px) rotate(-40deg)}65%{transform:translateX(-110px) translateY(-40px) rotate(-70deg)}100%{transform:translateX(-160px) translateY(-10px) rotate(-78deg)}}
@keyframes gk-diveLB{0%{transform:translateX(0) translateY(0) rotate(0)}30%{transform:translateX(-40px) translateY(-20px) rotate(-25deg)}65%{transform:translateX(-90px) translateY(-5px) rotate(-45deg)}100%{transform:translateX(-135px) translateY(5px) rotate(-55deg)}}
@keyframes gk-diveRA{0%{transform:translateX(0) translateY(0) rotate(0)}30%{transform:translateX(50px) translateY(-60px) rotate(40deg)}65%{transform:translateX(110px) translateY(-40px) rotate(70deg)}100%{transform:translateX(160px) translateY(-10px) rotate(78deg)}}
@keyframes gk-diveRB{0%{transform:translateX(0) translateY(0) rotate(0)}30%{transform:translateX(40px) translateY(-20px) rotate(25deg)}65%{transform:translateX(90px) translateY(-5px) rotate(45deg)}100%{transform:translateX(135px) translateY(5px) rotate(55deg)}}
@keyframes gk-jump{0%{transform:translateY(0) scaleX(1) scaleY(1)}12%{transform:translateY(4px) scaleX(1.05) scaleY(.92)}45%{transform:translateY(-75px) scaleX(1.2) scaleY(1)}70%{transform:translateY(-65px) scaleX(1.25) scaleY(1)}100%{transform:translateY(0) scaleX(1) scaleY(1)}}
@keyframes gk-catch{0%{transform:translateY(0) rotate(0) scaleY(1)}50%{transform:translateY(6px) rotate(-15deg) scaleY(.93)}100%{transform:translateY(10px) rotate(-25deg) scaleY(.87)}}
@keyframes gk-armL-idle{0%,100%{transform:translateY(-50%) rotate(20deg)}50%{transform:translateY(-50%) rotate(8deg)}}
@keyframes gk-armR-idle{0%,100%{transform:translateY(-50%) rotate(-20deg)}50%{transform:translateY(-50%) rotate(-8deg)}}
@keyframes gk-armL-diveA{0%{transform:translateY(-50%) rotate(20deg) scaleX(1)}50%{transform:translateY(-50%) rotate(70deg) scaleX(1.2)}100%{transform:translateY(-50%) rotate(120deg) scaleX(1.45)}}
@keyframes gk-armL-diveB{0%{transform:translateY(-50%) rotate(20deg) scaleX(1)}50%{transform:translateY(-50%) rotate(-20deg) scaleX(1.2)}100%{transform:translateY(-50%) rotate(-60deg) scaleX(1.45)}}
@keyframes gk-armR-diveA{0%{transform:translateY(-50%) rotate(-20deg) scaleX(1)}50%{transform:translateY(-50%) rotate(-70deg) scaleX(1.2)}100%{transform:translateY(-50%) rotate(-120deg) scaleX(1.45)}}
@keyframes gk-armR-diveB{0%{transform:translateY(-50%) rotate(-20deg) scaleX(1)}50%{transform:translateY(-50%) rotate(20deg) scaleX(1.2)}100%{transform:translateY(-50%) rotate(60deg) scaleX(1.45)}}
@keyframes gk-armR-trailA{0%{transform:translateY(-50%) rotate(-20deg)}100%{transform:translateY(-50%) rotate(-50deg)}}
@keyframes gk-armR-trailB{0%{transform:translateY(-50%) rotate(-20deg)}100%{transform:translateY(-50%) rotate(-35deg)}}
@keyframes gk-armL-trailA{0%{transform:translateY(-50%) rotate(20deg)}100%{transform:translateY(-50%) rotate(50deg)}}
@keyframes gk-armL-trailB{0%{transform:translateY(-50%) rotate(20deg)}100%{transform:translateY(-50%) rotate(35deg)}}
@keyframes gk-armL-jump{0%{transform:translateY(-50%) rotate(20deg)}100%{transform:translateY(-50%) rotate(-90deg)}}
@keyframes gk-armR-jump{0%{transform:translateY(-50%) rotate(-20deg)}100%{transform:translateY(-50%) rotate(90deg)}}
@keyframes gk-armL-catch{0%{transform:translateY(-50%) rotate(20deg) scaleX(1)}50%{transform:translateY(-50%) rotate(-35deg) scaleX(1.2)}100%{transform:translateY(-50%) rotate(-55deg) scaleX(1.35)}}
@keyframes gk-armR-catch{0%{transform:translateY(-50%) rotate(-20deg) scaleX(1)}50%{transform:translateY(-50%) rotate(35deg) scaleX(1.2)}100%{transform:translateY(-50%) rotate(55deg) scaleX(1.35)}}
@keyframes gk-flyL{0%{bottom:-50px;left:50%;opacity:1;transform:translateX(-50%) scale(1)}100%{bottom:185px;left:12%;opacity:.4;transform:translateX(-50%) scale(.45)}}
@keyframes gk-flyR{0%{bottom:-50px;left:50%;opacity:1;transform:translateX(-50%) scale(1)}100%{bottom:185px;left:88%;opacity:.4;transform:translateX(-50%) scale(.45)}}
@keyframes gk-flyC{0%{bottom:-50px;left:50%;opacity:1;transform:translateX(-50%) scale(1)}100%{bottom:205px;left:50%;opacity:.4;transform:translateX(-50%) scale(.4)}}
@keyframes gk-flyClow{0%{bottom:-50px;left:50%;opacity:1;transform:translateX(-50%) scale(1)}100%{bottom:12px;left:50%;opacity:.75;transform:translateX(-50%) scale(.82)}}
</style>

<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "29a090bc-9893-46a1-87a3-e3f162e2271d",

</head>
<body>
<div id="splash-overlay" onclick="closeSplash()">
  <img id="splash-bg" alt="">
  <img src="/icon-512.png" id="splash-icon" alt="WC 2026">
</div>
<script>
(function(){
  var lang=(navigator.language||'en').slice(0,2).toLowerCase();
  var supported=['en','fr','es','de','pt','it'];
  if(supported.indexOf(lang)===-1) lang='en';
  var isMobile=window.innerWidth<=768;
  var type=isMobile?'phone':'desktop';
  document.getElementById('splash-bg').src='/public/splash-'+lang+'-'+type+'.png';
})();
function closeSplash(){
  var s=document.getElementById('splash-overlay');
  s.classList.add('hidden');
  setTimeout(function(){s.style.display='none';},800);
  document.dispatchEvent(new Event('wc2026-unlocked'));
}
</script>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

</script>
