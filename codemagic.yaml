workflows:
  macos-app-store:
    name: macOS App Store (Mac Catalyst)
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - signing
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          rm -rf node_modules package-lock.json
          npm install @capacitor/cli@5 @capacitor/core@5 @capacitor/ios@5 --legacy-peer-deps
          npx cap sync ios
          cd ios/App
          pod install

      - name: Set up signing
        script: |
          keychain initialize
          echo "$CM_MAC_CERT_KEY" > /tmp/cert_key.pem

          CERTS_DIR="$HOME/Library/Developer/Xcode/UserData/Certificates"
          PROFILES_DIR="$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          mkdir -p "$CERTS_DIR" "$PROFILES_DIR"

          # ── CERT 1 : Apple Distribution + profil Mac Catalyst ───────────────
          # Même approche que le workflow iOS (fonctionne déjà avec CM_MAC_CERT_KEY)
          app-store-connect fetch-signing-files "com.marcocanal.worldcup2026" \
            --platform IOS \
            --type MAC_CATALYST_APP_STORE \
            --certificate-key=@file:/tmp/cert_key.pem \
            --certificates-dir "$CERTS_DIR" \
            --profiles-dir "$PROFILES_DIR" \
            --create \
            && echo "fetch-signing-files: OK ✓" \
            || { echo "fetch-signing-files: ERREUR"; exit 1; }

          # ── CERT 2 : Mac Installer Distribution (crée le .pkg) ─────────────
          # Cert déjà sur Apple Developer — on le reconstruit avec CM_MAC_CERT_KEY
          CERT_B64=$(app-store-connect list-certificates \
            --type MAC_INSTALLER_DISTRIBUTION --json 2>/dev/null | \
            python3 -c "
import sys, json
d = json.load(sys.stdin)
attrs = d[0].get('attributes', d[0]) if d else {}
print(attrs.get('certificateContent', ''))
" 2>/dev/null || echo "")
          echo "Installer cert taille: ${#CERT_B64} chars"
          if [ -n "$CERT_B64" ]; then
            echo "$CERT_B64" | base64 --decode > /tmp/installer.cer
            openssl x509 -in /tmp/installer.cer -inform DER -out /tmp/installer.pem 2>/dev/null
            openssl pkcs12 -export \
              -inkey /tmp/cert_key.pem \
              -in /tmp/installer.pem \
              -out "$CERTS_DIR/installer.p12" \
              -passout pass: \
              -name "3rd Party Mac Developer Installer" 2>/dev/null \
              && echo "Installer P12: créé ✓" \
              || { echo "Installer P12: ERREUR openssl"; exit 1; }
            security import "$CERTS_DIR/installer.p12" \
              -k ~/Library/Keychains/login.keychain-db \
              -P "" \
              -T /usr/bin/codesign \
              -T /usr/bin/productbuild \
              && echo "Installer P12: importé ✓" \
              || { echo "Installer P12: ERREUR import"; exit 1; }
          else
            echo "ERREUR: installer cert vide depuis l'API"
            exit 1
          fi

          # ── Autoriser codesign + productbuild sans prompt ────────────────────
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "" \
            ~/Library/Keychains/login.keychain-db 2>/dev/null || true

          keychain add-certificates

          # ── Lire le nom exact du profil pour PROVISIONING_PROFILE_SPECIFIER ─
          PROFILE_PATH=$(ls "$PROFILES_DIR"/*.provisionprofile 2>/dev/null | head -1)
          PROFILE_NAME=""
          if [ -n "$PROFILE_PATH" ]; then
            PROFILE_NAME=$(security cms -D -i "$PROFILE_PATH" 2>/dev/null | \
              python3 -c "import sys,plistlib; d=plistlib.loads(sys.stdin.buffer.read()); print(d.get('Name',''))" \
              2>/dev/null || echo "")
          fi
          if [ -z "$PROFILE_NAME" ]; then
            PROFILE_NAME="World Cup 2026 mac_catalyst_app_store 1781450616"
          fi
          echo "Profil: $PROFILE_NAME"
          echo "$PROFILE_NAME" > /tmp/mac_profile_name.txt

          # ── Diagnostics ──────────────────────────────────────────────────────
          echo "=== Identités de signature ==="
          security find-identity -v
          echo "=== Profils installés ==="
          ls "$PROFILES_DIR"

      - name: Build macOS (Mac Catalyst)
        script: |
          PROFILE_NAME=$(cat /tmp/mac_profile_name.txt 2>/dev/null || \
            echo "World Cup 2026 mac_catalyst_app_store 1781450616")
          echo "Profil: $PROFILE_NAME"

          # ── ARCHIVE ──────────────────────────────────────────────────────────
          xcodebuild clean archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination "platform=macOS,variant=Mac Catalyst" \
            -archivePath /tmp/App-macOS.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=Y6F853GG9K \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            2>&1 | tee /tmp/xcodebuild.log
          grep -E "error:|ARCHIVE SUCCEEDED" /tmp/xcodebuild.log | head -30 || true
          ls /tmp/App-macOS.xcarchive 2>/dev/null \
            || (echo "=== ARCHIVE ÉCHOUÉ ===" && exit 1)
          echo "=== ARCHIVE RÉUSSI ✓ ==="

          # ── EXPORT .pkg ──────────────────────────────────────────────────────
          xcodebuild -exportArchive \
            -archivePath /tmp/App-macOS.xcarchive \
            -exportPath /tmp/App-macOS \
            -exportOptionsPlist ios/App/ExportOptions-macOS.plist \
            2>&1 | tee /tmp/export.log
          EXPORT_STATUS=${PIPESTATUS[0]}
          tail -30 /tmp/export.log || true
          exit $EXPORT_STATUS

    artifacts:
      - /tmp/App-macOS/*.pkg
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
      email:
        recipients:
          - marcoxxx72@gmail.com

  ios-app-store:
    name: iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - signing
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          rm -rf node_modules package-lock.json
          npm install @capacitor/cli@5 @capacitor/core@5 @capacitor/ios@5 --legacy-peer-deps
          npx cap sync ios
          cd ios/App
          pod install
      - name: Set up signing
        script: |
          keychain initialize
          echo "$CM_MAC_CERT_KEY" > /tmp/cert_key.pem
          CERTS_DIR="$HOME/Library/Developer/Xcode/UserData/Certificates"
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$CERTS_DIR" "$PROFILES_DIR"
          app-store-connect fetch-signing-files "com.marcocanal.worldcup2026" \
            --platform IOS \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/cert_key.pem \
            --certificates-dir "$CERTS_DIR" \
            --profiles-dir "$PROFILES_DIR" \
            --create
          echo "=== P12 ==="
          ls "$CERTS_DIR"/*.p12 2>/dev/null || echo "Aucun P12"
          echo "=== Profiles ==="
          ls "$PROFILES_DIR"/*.mobileprovision 2>/dev/null || echo "Aucun profil"
          keychain add-certificates
          echo "=== Signing identities ==="
          security find-identity -v -p codesigning
      - name: Build iOS IPA
        script: |
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_PATH=$(ls "$PROFILES_DIR"/*.mobileprovision 2>/dev/null | head -1)
          echo "Profile path: $PROFILE_PATH"
          PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" 2>/dev/null | python3 -c "import sys,plistlib; d=plistlib.loads(sys.stdin.buffer.read()); print(d['UUID'])")
          echo "UUID: $PROFILE_UUID"
          if [ -z "$PROFILE_UUID" ]; then echo "ERREUR: UUID vide" && exit 1; fi
          xcodebuild clean archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath /tmp/App-iOS.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=Y6F853GG9K \
            PROVISIONING_PROFILE="$PROFILE_UUID"
          PROFILE_NAME=$(security cms -D -i "$PROFILE_PATH" 2>/dev/null | python3 -c "import sys,plistlib; d=plistlib.loads(sys.stdin.buffer.read()); print(d['Name'])")
          echo "Profile name: $PROFILE_NAME"
          python3 -c "import plistlib; plistlib.dump({'method':'app-store-connect','teamID':'Y6F853GG9K','uploadSymbols':True,'compileBitcode':False,'provisioningProfiles':{'com.marcocanal.worldcup2026':'$PROFILE_NAME'}},open('/tmp/ExportOptions-iOS.plist','wb'))"
          xcodebuild -exportArchive \
            -archivePath /tmp/App-iOS.xcarchive \
            -exportPath /tmp/App-iOS \
            -exportOptionsPlist /tmp/ExportOptions-iOS.plist
    artifacts:
      - /tmp/App-iOS/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - marcoxxx72@gmail.com

  # NOTE: Before this workflow can run, the Android platform must be added to the project:
  #   npx cap add android
  # Commit the generated android/ folder before triggering this workflow.
  android-app-store:
    name: Android App Store (Google Play)
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      node: latest
      # TODO: Add google_play group with service account credentials once available
      # groups:
      #   - google_play
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Sync Capacitor Android platform
        script: |
          # Requires the android/ folder to exist (npx cap add android must have been run first)
          npx cap sync android
      - name: Build Android App Bundle (AAB)
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
    publishing:
      # TODO: Configure Google Play credentials before enabling this block
      # google_play:
      #   credentials: $GPLAY_SERVICE_ACCOUNT_JSON
      #   track: internal
      email:
        recipients:
          - marcoxxx72@gmail.com
