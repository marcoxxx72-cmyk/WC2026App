workflows:
  macos-app-store:
    name: macOS App Store (Mac Catalyst)
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - signing
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          rm -rf node_modules package-lock.json
          npm install @capacitor/cli@5 @capacitor/core@5 @capacitor/ios@5 --legacy-peer-deps
          npx cap sync ios
          cd ios/App
          pod install
      - name: Set up signing
        script: |
          keychain initialize
          # Clé privée persistante (stockée dans Codemagic, jamais regénérée)
          echo "$CM_MAC_CERT_KEY" > /tmp/cert_key.pem
          # Supprimer les anciens certs via JSON pour libérer le quota
          python3 << 'PYEOF'
import subprocess, json
for cert_type in ['MAC_APP_DISTRIBUTION', 'DISTRIBUTION']:
    r = subprocess.run(
        ['app-store-connect', 'list-certificates', '--type', cert_type, '--json'],
        capture_output=True, text=True
    )
    try:
        data = json.loads(r.stdout)
        certs = data if isinstance(data, list) else []
        for cert in certs:
            cid = cert.get('id', '')
            if cid:
                print(f"Deleting {cert_type}: {cid}")
                subprocess.run(['app-store-connect', 'delete-certificate', '--certificate-id', cid], capture_output=True)
    except Exception as e:
        print(f"Could not parse {cert_type} certs: {e}")
PYEOF
          # Créer le cert avec notre clé persistante (409 = déjà existant = OK)
          app-store-connect certificates create \
            --type MAC_APP_DISTRIBUTION \
            --certificate-key=@file:/tmp/cert_key.pem \
            --save 2>&1 || echo "Cert creation error (may already exist — OK)"
          app-store-connect fetch-signing-files "com.marcocanal.worldcup2026" \
            --platform MAC_OS \
            --type MAC_APP_STORE \
            --certificate-key=@file:/tmp/cert_key.pem \
            --create
          keychain add-certificates
          xcode-project use-profiles
          echo "=== Certs disponibles ==="
          security find-identity -v -p codesigning
          echo "=== Profils installés ==="
          ls ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/ 2>/dev/null || echo "Aucun profil"
          echo "=== CODE_SIGN settings ==="
          grep -E "CODE_SIGN_STYLE|CODE_SIGN_IDENTITY|PROVISIONING_PROFILE" ios/App/App.xcodeproj/project.pbxproj || true
      - name: Build macOS (Mac Catalyst)
        script: |
          xcodebuild clean archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination "platform=macOS,variant=Mac Catalyst" \
            -archivePath /tmp/App-macOS.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=Y6F853GG9K \
            2>&1 | tee /tmp/xcodebuild.log
          grep -E "error:|ARCHIVE SUCCEEDED" /tmp/xcodebuild.log | head -50 || true
          ls /tmp/App-macOS.xcarchive 2>/dev/null || (echo "=== ARCHIVE NOT FOUND ===" && exit 1)
          xcodebuild -exportArchive \
            -archivePath /tmp/App-macOS.xcarchive \
            -exportPath /tmp/App-macOS \
            -exportOptionsPlist ios/App/ExportOptions-macOS.plist
    artifacts:
      - /tmp/App-macOS/*.pkg
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
      email:
        recipients:
          - marcoxxx72@gmail.com

  ios-app-store:
    name: iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.marcocanal.worldcup2026
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          rm -rf node_modules package-lock.json
          npm install @capacitor/cli@5 @capacitor/core@5 @capacitor/ios@5 --legacy-peer-deps
          npx cap sync ios
          cd ios/App
          pod install
      - name: Set up signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - marcoxxx72@gmail.com

  # NOTE: Before this workflow can run, the Android platform must be added to the project:
  #   npx cap add android
  # Commit the generated android/ folder before triggering this workflow.
  android-app-store:
    name: Android App Store (Google Play)
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      node: latest
      # TODO: Add google_play group with service account credentials once available
      # groups:
      #   - google_play
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Sync Capacitor Android platform
        script: |
          # Requires the android/ folder to exist (npx cap add android must have been run first)
          npx cap sync android
      - name: Build Android App Bundle (AAB)
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
    publishing:
      # TODO: Configure Google Play credentials before enabling this block
      # google_play:
      #   credentials: $GPLAY_SERVICE_ACCOUNT_JSON
      #   track: internal
      email:
        recipients:
          - marcoxxx72@gmail.com
