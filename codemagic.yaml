workflows:
  macos-app-store:
    name: macOS App Store (Mac Catalyst)
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - signing
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          rm -rf node_modules package-lock.json
          npm install @capacitor/cli@5 @capacitor/core@5 @capacitor/ios@5 --legacy-peer-deps
          npx cap sync ios
          cd ios/App
          pod install
      - name: Set up signing
        script: |
          keychain initialize
          # Install provisioning profile
          echo "$MAC_PROVISIONING_PROFILE" | base64 --decode > /tmp/mac_catalyst.provisionprofile
          # Extract UUID (openssl fallback for newer macOS)
          UUID=$(openssl smime -verify -inform DER -in /tmp/mac_catalyst.provisionprofile -noverify 2>/dev/null | plutil -extract UUID raw -)
          if [ -z "$UUID" ]; then
            UUID=$(grep -aEo '[A-Fa-f0-9]{8}-[A-Fa-f0-9]{4}-[A-Fa-f0-9]{4}-[A-Fa-f0-9]{4}-[A-Fa-f0-9]{12}' /tmp/mac_catalyst.provisionprofile | head -1)
          fi
          echo "Profile UUID: ${UUID}"
          echo "$UUID" > /tmp/profile_uuid
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/mac_catalyst.provisionprofile ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.provisionprofile
          echo "Keychain path: $CM_KEYCHAIN_PATH"
          # Import Mac App Distribution certificate into Codemagic keychain
          echo "$MAC_APP_P12" | base64 --decode > /tmp/mac_app.p12
          security import /tmp/mac_app.p12 \
            -k "$CM_KEYCHAIN_PATH" \
            -P "$MAC_APP_PWD" \
            -A -t cert -f pkcs12
          # Import Mac Installer Distribution certificate
          echo "$MAC_INSTALLER_P12" | base64 --decode > /tmp/mac_installer.p12
          security import /tmp/mac_installer.p12 \
            -k "$CM_KEYCHAIN_PATH" \
            -P "$MAC_INSTALLER_PWD" \
            -A -t cert -f pkcs12
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s \
            -k "" "$CM_KEYCHAIN_PATH"
          echo "=== Available signing identities ==="
          security find-identity -v -p codesigning
      - name: Build macOS (Mac Catalyst)
        script: |
          UUID=$(cat /tmp/profile_uuid)
          xcodebuild clean archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -destination "platform=macOS,variant=Mac Catalyst" \
            -archivePath /tmp/App-macOS.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="3rd Party Mac Developer Application" \
            DEVELOPMENT_TEAM=Y6F853GG9K \
            PROVISIONING_PROFILE="${UUID}"
          xcodebuild -exportArchive \
            -archivePath /tmp/App-macOS.xcarchive \
            -exportPath /tmp/App-macOS \
            -exportOptionsPlist ios/App/ExportOptions-macOS.plist
    artifacts:
      - /tmp/App-macOS/*.pkg
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
      email:
        recipients:
          - marcoxxx72@gmail.com

  ios-app-store:
    name: iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.marcocanal.worldcup2026
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          rm -rf node_modules package-lock.json
          npm install @capacitor/cli@5 @capacitor/core@5 @capacitor/ios@5 --legacy-peer-deps
          npx cap sync ios
          cd ios/App
          pod install
      - name: Set up signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - marcoxxx72@gmail.com

  # NOTE: Before this workflow can run, the Android platform must be added to the project:
  #   npx cap add android
  # Commit the generated android/ folder before triggering this workflow.
  android-app-store:
    name: Android App Store (Google Play)
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      node: latest
      # TODO: Add google_play group with service account credentials once available
      # groups:
      #   - google_play
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Sync Capacitor Android platform
        script: |
          # Requires the android/ folder to exist (npx cap add android must have been run first)
          npx cap sync android
      - name: Build Android App Bundle (AAB)
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
    publishing:
      # TODO: Configure Google Play credentials before enabling this block
      # google_play:
      #   credentials: $GPLAY_SERVICE_ACCOUNT_JSON
      #   track: internal
      email:
        recipients:
          - marcoxxx72@gmail.com
