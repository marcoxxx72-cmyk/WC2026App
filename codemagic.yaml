workflows:
  macos-app-store:
    name: macOS App Store (Mac Catalyst)
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - signing
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          rm -rf node_modules package-lock.json
          npm install @capacitor/cli@5 @capacitor/core@5 @capacitor/ios@5 --legacy-peer-deps
          npx cap sync ios
          cd ios/App
          pod install

      - name: Set up signing
        script: |
          keychain initialize
          echo "$CM_MAC_CERT_KEY" > /tmp/cert_key.pem

          CERTS_DIR="$HOME/Library/Developer/Xcode/UserData/Certificates"
          PROFILES_DIR="$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          mkdir -p "$CERTS_DIR" "$PROFILES_DIR"

          # ── CERT 1 : Apple Distribution + profil Mac Catalyst ───────────────
          # Même approche que le workflow iOS (fonctionne déjà avec CM_MAC_CERT_KEY)
          app-store-connect fetch-signing-files "com.marcocanal.worldcup2026" \
            --platform IOS \
            --type MAC_CATALYST_APP_STORE \
            --certificate-key=@file:/tmp/cert_key.pem \
            --certificates-dir "$CERTS_DIR" \
            --profiles-dir "$PROFILES_DIR" \
            --create \
            && echo "fetch-signing-files: OK ✓" \
            || { echo "fetch-signing-files: ERREUR"; exit 1; }

          # ── CERT 2 : Mac Installer Distribution (requis pour le .pkg) ──────
          echo "=== Cert Mac Installer Distribution ==="
          P12_BEFORE=$(ls "$CERTS_DIR"/*.p12 2>/dev/null | wc -l | tr -d ' ')
          CREATE_OUT=$(app-store-connect certificates create \
            --type MAC_INSTALLER_DISTRIBUTION \
            --certificate-key=@file:/tmp/cert_key.pem \
            --save \
            --certificates-dir "$CERTS_DIR" 2>&1)
          CREATE_STATUS=$?
          echo "$CREATE_OUT"
          if [ $CREATE_STATUS -ne 0 ]; then
            if echo "$CREATE_OUT" | grep -q "409"; then
              echo "Cert déjà existant (409) — téléchargement..."
              app-store-connect list-certificates \
                --type MAC_INSTALLER_DISTRIBUTION \
                --certificate-key=@file:/tmp/cert_key.pem \
                --save \
                --certificates-dir "$CERTS_DIR" 2>/dev/null || true
            else
              echo "ERREUR: création cert installer"; exit 1
            fi
          fi
          P12_AFTER=$(ls "$CERTS_DIR"/*.p12 2>/dev/null | wc -l | tr -d ' ')
          echo "P12 avant: $P12_BEFORE / après: $P12_AFTER"
          [ "$P12_AFTER" -gt "$P12_BEFORE" ] \
            && echo "Installer cert: OK ✓" \
            || { echo "ERREUR: cert installer non installé"; exit 1; }

          keychain add-certificates

          # ── Autoriser codesign + productbuild sur TOUS les keychains ─────────
          security list-keychains | tr -d '"' | xargs -I{} \
            security set-key-partition-list -S apple-tool:,apple: -s -k "" {} 2>/dev/null || true

          # ── Lire le nom exact du profil pour PROVISIONING_PROFILE_SPECIFIER ─
          PROFILE_PATH=$(ls "$PROFILES_DIR"/*.provisionprofile 2>/dev/null | head -1)
          PROFILE_NAME=""
          if [ -n "$PROFILE_PATH" ]; then
            PROFILE_NAME=$(security cms -D -i "$PROFILE_PATH" 2>/dev/null | \
              python3 -c "import sys,plistlib; d=plistlib.loads(sys.stdin.buffer.read()); print(d.get('Name',''))" \
              2>/dev/null || echo "")
          fi
          if [ -z "$PROFILE_NAME" ]; then
            PROFILE_NAME="World Cup 2026 mac_catalyst_app_store 1781450616"
          fi
          echo "Profil: $PROFILE_NAME"
          echo "$PROFILE_NAME" > /tmp/mac_profile_name.txt

          # ── Diagnostics ──────────────────────────────────────────────────────
          echo "=== Identités de signature ==="
          security find-identity -v
          echo "=== Profils installés ==="
          ls "$PROFILES_DIR"

      - name: Build macOS (Mac Catalyst)
        script: |
          PROFILE_NAME=$(cat /tmp/mac_profile_name.txt 2>/dev/null || \
            echo "World Cup 2026 mac_catalyst_app_store 1781450616")
          echo "Profil: $PROFILE_NAME"

          # ── ARCHIVE ──────────────────────────────────────────────────────────
          xcodebuild clean archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination "platform=macOS,variant=Mac Catalyst" \
            -archivePath /tmp/App-macOS.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=Y6F853GG9K \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            2>&1 | tee /tmp/xcodebuild.log
          grep -E "error:|ARCHIVE SUCCEEDED" /tmp/xcodebuild.log | head -30 || true
          ls /tmp/App-macOS.xcarchive 2>/dev/null \
            || (echo "=== ARCHIVE ÉCHOUÉ ===" && exit 1)
          echo "=== ARCHIVE RÉUSSI ✓ ==="

          # ── Débloquer cert installer pour productbuild (errSecInteractionNotAllowed) ──
          keychain add-certificates
          CM_KC=$(ls "$HOME/Library/codemagic-cli-tools/keychains/"*.keychain-db 2>/dev/null | head -1)
          echo "Keychain Codemagic: $CM_KC"

          # Créer keychain perso avec mot de passe connu
          OUR_KC="/tmp/wc2026_signing.keychain-db"
          OUR_PWD="wc2026sign"
          security delete-keychain "$OUR_KC" 2>/dev/null || true
          security create-keychain -p "$OUR_PWD" "$OUR_KC" && echo "Keychain créé ✓"
          security unlock-keychain -p "$OUR_PWD" "$OUR_KC"
          security set-keychain-settings -t 7200 -u "$OUR_KC"

          # Extraire cert installer depuis le keychain Codemagic (encore déverrouillé)
          security find-certificate -c "3rd Party Mac Developer Installer" \
            -a -p "$CM_KC" > /tmp/installer_cert.pem 2>/dev/null || true
          if grep -q "BEGIN CERTIFICATE" /tmp/installer_cert.pem; then
            echo "Cert extrait ✓"
            openssl pkcs12 -export \
              -out /tmp/installer_pkg.p12 \
              -inkey /tmp/cert_key.pem \
              -in /tmp/installer_cert.pem \
              -passout pass:"$OUR_PWD" && echo "P12 créé ✓"
            security import /tmp/installer_pkg.p12 \
              -k "$OUR_KC" -P "$OUR_PWD" -A && echo "Import OK ✓"
            # set-key-partition-list avec notre mot de passe CONNU → garanti
            security set-key-partition-list -S apple-tool:,apple: -s -k "$OUR_PWD" "$OUR_KC" \
              && echo "Partition list OK ✓"
            # SUPPRIMER le cert du keychain Codemagic (déverrouillé) → productbuild
            # n'a plus d'autre choix que notre keychain
            security delete-certificate -c "3rd Party Mac Developer Installer" \
              "$CM_KC" 2>/dev/null \
              && echo "Cert supprimé de Codemagic ✓" \
              || echo "Suppression impossible (on continue)"
            # Mettre notre keychain en premier dans toutes les listes
            security list-keychains -s "$OUR_KC" ~/Library/Keychains/login.keychain-db "$CM_KC"
            security default-keychain -s "$OUR_KC"
            echo "Keychains:" && security list-keychains
          else
            echo "ERREUR: cert installer non trouvé"
          fi
          echo "=== Identités disponibles pour export ==="
          security find-identity -v

          # ── EXPORT .pkg ──────────────────────────────────────────────────────
          python3 -c "import plistlib; plistlib.dump({'method':'app-store-connect','signingStyle':'manual','teamID':'Y6F853GG9K','signingCertificate':'Apple Distribution','installerSigningCertificate':'3rd Party Mac Developer Installer','provisioningProfiles':{'com.marcocanal.worldcup2026':'$PROFILE_NAME'}},open('/tmp/ExportOptions-macOS.plist','wb')); print('ExportOptions OK: $PROFILE_NAME')"
          xcodebuild -exportArchive \
            -archivePath /tmp/App-macOS.xcarchive \
            -exportPath /tmp/App-macOS \
            -exportOptionsPlist /tmp/ExportOptions-macOS.plist \
            2>&1 | tee /tmp/export.log
          EXPORT_STATUS=${PIPESTATUS[0]}
          if [ $EXPORT_STATUS -ne 0 ]; then
            # ── Résumé erreurs (à la fin = visible dans les 50 dernières lignes) ─
            DISTLOG=$(find /var/folders -name "*.xcdistributionlogs" -maxdepth 6 2>/dev/null | tail -1)
            echo "=== EXPORT LOG — lignes d'erreur ==="
            grep -iE "error:|: error|productbuild|codesign" /tmp/export.log \
              | grep -v "Enabling\|noerror\|0 error" | head -20 || true
            echo "=== DISTRIBUTION LOG — lignes d'erreur ==="
            [ -n "$DISTLOG" ] && find "$DISTLOG" -type f \
              | xargs grep -hiE "error|fail|productbuild|codesign" 2>/dev/null \
              | grep -v "Evaluating\|Applying\|errors: (null)\|certificateKinds\|issueDate" \
              | head -30 || true
            echo "=== DISTRIBUTION LOG — 30 dernières lignes ==="
            [ -n "$DISTLOG" ] && find "$DISTLOG" -type f | sort | xargs cat 2>/dev/null | tail -30 || true
          else
            echo "=== EXPORT RÉUSSI ✓ ==="
            ls /tmp/App-macOS/*.pkg 2>/dev/null || true
          fi
          exit $EXPORT_STATUS

    artifacts:
      - /tmp/App-macOS/*.pkg
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
      email:
        recipients:
          - marcoxxx72@gmail.com

  ios-app-store:
    name: iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - signing
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          rm -rf node_modules package-lock.json
          npm install @capacitor/cli@5 @capacitor/core@5 @capacitor/ios@5 --legacy-peer-deps
          npx cap sync ios
          cd ios/App
          pod install
      - name: Set up signing
        script: |
          keychain initialize
          echo "$CM_MAC_CERT_KEY" > /tmp/cert_key.pem
          CERTS_DIR="$HOME/Library/Developer/Xcode/UserData/Certificates"
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$CERTS_DIR" "$PROFILES_DIR"
          app-store-connect fetch-signing-files "com.marcocanal.worldcup2026" \
            --platform IOS \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/cert_key.pem \
            --certificates-dir "$CERTS_DIR" \
            --profiles-dir "$PROFILES_DIR" \
            --create
          echo "=== P12 ==="
          ls "$CERTS_DIR"/*.p12 2>/dev/null || echo "Aucun P12"
          echo "=== Profiles ==="
          ls "$PROFILES_DIR"/*.mobileprovision 2>/dev/null || echo "Aucun profil"
          keychain add-certificates
          echo "=== Signing identities ==="
          security find-identity -v -p codesigning
      - name: Build iOS IPA
        script: |
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_PATH=$(ls "$PROFILES_DIR"/*.mobileprovision 2>/dev/null | head -1)
          echo "Profile path: $PROFILE_PATH"
          PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" 2>/dev/null | python3 -c "import sys,plistlib; d=plistlib.loads(sys.stdin.buffer.read()); print(d['UUID'])")
          echo "UUID: $PROFILE_UUID"
          if [ -z "$PROFILE_UUID" ]; then echo "ERREUR: UUID vide" && exit 1; fi
          xcodebuild clean archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath /tmp/App-iOS.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=Y6F853GG9K \
            PROVISIONING_PROFILE="$PROFILE_UUID"
          PROFILE_NAME=$(security cms -D -i "$PROFILE_PATH" 2>/dev/null | python3 -c "import sys,plistlib; d=plistlib.loads(sys.stdin.buffer.read()); print(d['Name'])")
          echo "Profile name: $PROFILE_NAME"
          python3 -c "import plistlib; plistlib.dump({'method':'app-store-connect','teamID':'Y6F853GG9K','uploadSymbols':True,'compileBitcode':False,'provisioningProfiles':{'com.marcocanal.worldcup2026':'$PROFILE_NAME'}},open('/tmp/ExportOptions-iOS.plist','wb'))"
          xcodebuild -exportArchive \
            -archivePath /tmp/App-iOS.xcarchive \
            -exportPath /tmp/App-iOS \
            -exportOptionsPlist /tmp/ExportOptions-iOS.plist
    artifacts:
      - /tmp/App-iOS/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - marcoxxx72@gmail.com

  # NOTE: Before this workflow can run, the Android platform must be added to the project:
  #   npx cap add android
  # Commit the generated android/ folder before triggering this workflow.
  android-app-store:
    name: Android App Store (Google Play)
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      node: latest
      # TODO: Add google_play group with service account credentials once available
      # groups:
      #   - google_play
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Sync Capacitor Android platform
        script: |
          # Requires the android/ folder to exist (npx cap add android must have been run first)
          npx cap sync android
      - name: Build Android App Bundle (AAB)
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
    publishing:
      # TODO: Configure Google Play credentials before enabling this block
      # google_play:
      #   credentials: $GPLAY_SERVICE_ACCOUNT_JSON
      #   track: internal
      email:
        recipients:
          - marcoxxx72@gmail.com
