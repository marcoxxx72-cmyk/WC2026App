workflows:
  macos-app-store:
    name: macOS App Store (Mac Catalyst)
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - signing
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          rm -rf node_modules package-lock.json
          npm install @capacitor/cli@5 @capacitor/core@5 @capacitor/ios@5 --legacy-peer-deps
          npx cap sync ios
          cd ios/App
          pod install
      - name: Set up signing
        script: |
          # Marquer le début pour retrouver les P12 créés dans ce step
          touch /tmp/signing_marker
          keychain initialize
          # Clé privée persistante (stockée dans Codemagic, jamais regénérée)
          echo "$CM_MAC_CERT_KEY" > /tmp/cert_key.pem
          # Supprimer les anciens certs pour libérer le quota
          for TYPE in MAC_APP_DISTRIBUTION MAC_INSTALLER_DISTRIBUTION; do
            app-store-connect list-certificates --type $TYPE --json 2>/dev/null | \
              python3 -c "import sys,json; [print(c['id']) for c in json.load(sys.stdin) if c.get('id')]" 2>/dev/null | \
              while read CERT_ID; do
                [ -n "$CERT_ID" ] && app-store-connect delete-certificate --certificate-id "$CERT_ID" 2>&1 || true
              done
          done
          # Fetch profil Mac Catalyst App Store + cert Apple Distribution
          CERTS_DIR=~/Library/Developer/Xcode/UserData/Certificates
          mkdir -p "$CERTS_DIR"
          app-store-connect fetch-signing-files "com.marcocanal.worldcup2026" \
            --platform IOS \
            --type MAC_CATALYST_APP_STORE \
            --certificate-key=@file:/tmp/cert_key.pem \
            --certificates-dir "$CERTS_DIR" \
            --create
          # Créer cert Mac Installer Distribution avec notre clé persistante
          echo "=== Creating MAC_INSTALLER_DISTRIBUTION cert ==="
          app-store-connect certificates create \
            --type MAC_INSTALLER_DISTRIBUTION \
            --certificate-key=@file:/tmp/cert_key.pem \
            --save \
            --certificates-dir "$CERTS_DIR" \
            2>&1 || true
          # Récupérer le cert depuis l'API et créer le P12 avec la même clé (CM_MAC_CERT_KEY)
          echo "=== Building installer P12 from API cert content ==="
          CERT_CONTENT=$(app-store-connect list-certificates \
            --type MAC_INSTALLER_DISTRIBUTION --json 2>/dev/null | \
            python3 -c "import sys,json; d=json.load(sys.stdin); c=d[0] if d else {}; attrs=c.get('attributes',c); print(attrs.get('certificateContent',''))" 2>/dev/null || echo "")
          echo "Cert content size: ${#CERT_CONTENT} chars"
          if [ -n "$CERT_CONTENT" ]; then
            echo "$CERT_CONTENT" | base64 --decode > /tmp/installer_api.cer
            openssl x509 -in /tmp/installer_api.cer -inform DER -out /tmp/installer_api.pem 2>/dev/null
            openssl pkcs12 -export \
              -inkey /tmp/cert_key.pem \
              -in /tmp/installer_api.pem \
              -out "$CERTS_DIR/MAC_INSTALLER_api.p12" \
              -passout pass: \
              -name "3rd Party Mac Developer Installer" 2>/dev/null && \
              echo "P12 from API: OK ✓" || echo "P12 from API: FAILED"
          else
            echo "Cert content vide — tentative via --save uniquement"
          fi
          echo "=== P12 dans CERTS_DIR ==="
          ls -la "$CERTS_DIR"/*.p12 2>/dev/null || echo "Aucun P12"
          keychain add-certificates
          xcode-project use-profiles
          echo "=== Certs disponibles ==="
          security find-identity -v -p codesigning
          echo "=== Profils installés ==="
          ls ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/ 2>/dev/null || echo "Aucun profil"
          echo "=== CODE_SIGN settings ==="
          grep -E "CODE_SIGN_STYLE|CODE_SIGN_IDENTITY|PROVISIONING_PROFILE" ios/App/App.xcodeproj/project.pbxproj || true
      - name: Build macOS (Mac Catalyst)
        script: |
          xcodebuild clean archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination "platform=macOS,variant=Mac Catalyst" \
            -archivePath /tmp/App-macOS.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=Y6F853GG9K \
            2>&1 | tee /tmp/xcodebuild.log
          grep -E "error:|ARCHIVE SUCCEEDED" /tmp/xcodebuild.log | head -50 || true
          ls /tmp/App-macOS.xcarchive 2>/dev/null || (echo "=== ARCHIVE NOT FOUND ===" && exit 1)
          xcodebuild -exportArchive \
            -archivePath /tmp/App-macOS.xcarchive \
            -exportPath /tmp/App-macOS \
            -exportOptionsPlist ios/App/ExportOptions-macOS.plist \
            2>&1 | tee /tmp/export.log; EXPORT_STATUS=${PIPESTATUS[0]}
          echo "=== Dernières lignes export log ==="
          tail -50 /tmp/export.log || true
          echo "=== xcdistributionlogs (productbuild details) ==="
          find /var/folders -name "*.xcdistributionlogs" -type d 2>/dev/null | sort | tail -1 | while read D; do
            find "$D" -type f 2>/dev/null | while read F; do
              echo "--- $F ---"
              cat "$F" 2>/dev/null
            done
          done
          exit $EXPORT_STATUS
    artifacts:
      - /tmp/App-macOS/*.pkg
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
      email:
        recipients:
          - marcoxxx72@gmail.com

  ios-app-store:
    name: iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.marcocanal.worldcup2026
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          rm -rf node_modules package-lock.json
          npm install @capacitor/cli@5 @capacitor/core@5 @capacitor/ios@5 --legacy-peer-deps
          npx cap sync ios
          cd ios/App
          pod install
      - name: Set up signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - marcoxxx72@gmail.com

  # NOTE: Before this workflow can run, the Android platform must be added to the project:
  #   npx cap add android
  # Commit the generated android/ folder before triggering this workflow.
  android-app-store:
    name: Android App Store (Google Play)
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      node: latest
      # TODO: Add google_play group with service account credentials once available
      # groups:
      #   - google_play
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Sync Capacitor Android platform
        script: |
          # Requires the android/ folder to exist (npx cap add android must have been run first)
          npx cap sync android
      - name: Build Android App Bundle (AAB)
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
    publishing:
      # TODO: Configure Google Play credentials before enabling this block
      # google_play:
      #   credentials: $GPLAY_SERVICE_ACCOUNT_JSON
      #   track: internal
      email:
        recipients:
          - marcoxxx72@gmail.com
