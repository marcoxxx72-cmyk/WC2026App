workflows:
  macos-app-store:
    name: macOS App Store (Mac Catalyst)
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - signing
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          rm -rf node_modules package-lock.json
          npm install @capacitor/cli@5 @capacitor/core@5 @capacitor/ios@5 --legacy-peer-deps
          npx cap sync ios
          cd ios/App
          pod install

      - name: Set up signing
        script: |
          keychain initialize
          echo "$CM_MAC_CERT_KEY" > /tmp/cert_key.pem

          CERTS_DIR="$HOME/Library/Developer/Xcode/UserData/Certificates"
          PROFILES_DIR="$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          mkdir -p "$CERTS_DIR" "$PROFILES_DIR"

          # Apple Distribution cert + profil Mac Catalyst (pour xcodebuild archive)
          app-store-connect fetch-signing-files "com.marcocanal.worldcup2026" \
            --platform IOS \
            --type MAC_CATALYST_APP_STORE \
            --certificate-key=@file:/tmp/cert_key.pem \
            --certificates-dir "$CERTS_DIR" \
            --profiles-dir "$PROFILES_DIR" \
            --create \
            && echo "fetch-signing-files: OK ✓" \
            || { echo "fetch-signing-files: ERREUR"; exit 1; }

          keychain add-certificates
          echo "=== Identités après add-certificates ==="
          security find-identity -v

          # Nom exact du profil pour PROVISIONING_PROFILE_SPECIFIER
          PROFILE_PATH=$(ls "$PROFILES_DIR"/*.provisionprofile 2>/dev/null | head -1)
          PROFILE_NAME=""
          if [ -n "$PROFILE_PATH" ]; then
            PROFILE_NAME=$(security cms -D -i "$PROFILE_PATH" 2>/dev/null | \
              python3 -c "import sys,plistlib; d=plistlib.loads(sys.stdin.buffer.read()); print(d.get('Name',''))" \
              2>/dev/null || echo "")
          fi
          [ -z "$PROFILE_NAME" ] && PROFILE_NAME="World Cup 2026 mac_catalyst_app_store 1781450616"
          echo "Profil: $PROFILE_NAME"
          echo "$PROFILE_NAME" > /tmp/mac_profile_name.txt
          echo "=== Profils installés ==="
          ls "$PROFILES_DIR"

      - name: Build macOS (Mac Catalyst)
        script: |
          PROFILE_NAME=$(cat /tmp/mac_profile_name.txt 2>/dev/null || \
            echo "World Cup 2026 mac_catalyst_app_store 1781450616")
          echo "Profil: $PROFILE_NAME"

          # ── ARCHIVE ──────────────────────────────────────────────────────────
          xcodebuild clean archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination "platform=macOS,variant=Mac Catalyst" \
            -archivePath /tmp/App-macOS.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=Y6F853GG9K \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            2>&1 | tee /tmp/xcodebuild.log
          grep -E "error:|ARCHIVE SUCCEEDED|ARCHIVE FAILED" /tmp/xcodebuild.log | head -20 || true
          ls /tmp/App-macOS.xcarchive 2>/dev/null \
            || (echo "=== ARCHIVE ÉCHOUÉ ===" && exit 1)
          echo "=== ARCHIVE RÉUSSI ✓ ==="

          # ── Keychain perso : installer cert avec mot de passe CONNU ──────────
          # La clé privée dans ce keychain a la partition list correcte (apple-tool:)
          # → productbuild peut signer SANS interaction UI
          OUR_KC="/tmp/wc2026_signing.keychain-db"
          OUR_PWD="wc2026sign"
          security delete-keychain "$OUR_KC" 2>/dev/null || true
          security create-keychain -p "$OUR_PWD" "$OUR_KC"
          security unlock-keychain -p "$OUR_PWD" "$OUR_KC"
          security set-keychain-settings -t 7200 -u "$OUR_KC"

          # Importer directement la clé privée PEM + cert DER dans notre keychain
          # (évite le P12 intermédiaire + l'incompatibilité OpenSSL 3.x / security import)
          security import /tmp/cert_key.pem -k "$OUR_KC" -A \
            && echo "Clé privée importée ✓" \
            || { echo "ERREUR: import clé privée"; exit 1; }
          security import ios/App/mac_installer.cer -k "$OUR_KC" -A \
            && echo "Cert installer importé ✓" \
            || { echo "ERREUR: import cert installer"; exit 1; }

          # Partition list avec MOT DE PASSE DU KEYCHAIN (connu) → clé accessible sans UI
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$OUR_PWD" "$OUR_KC" \
            && echo "Partition list OK ✓" \
            || { echo "ERREUR: set-key-partition-list"; exit 1; }

          # Notre keychain en 1er (productbuild → installer cert)
          # CM's keychain en dernier (codesign → Apple Distribution cert)
          CM_KC=$(ls "$HOME/Library/codemagic-cli-tools/keychains/"*.keychain-db 2>/dev/null | head -1)
          security list-keychains -s "$OUR_KC" ~/Library/Keychains/login.keychain-db "$CM_KC"
          security unlock-keychain -p "$OUR_PWD" "$OUR_KC"

          echo "=== Identités disponibles ==="
          security find-identity -v

          # ── PACKAGE (pas de re-signature — l'archive est déjà correctement signée) ─
          # xcodebuild archive a signé .app avec Apple Distribution + entitlements
          # productbuild signe uniquement le .pkg wrapper avec l'installer cert
          APP_ARCHIVE="/tmp/App-macOS.xcarchive/Products/Applications/App.app"
          mkdir -p /tmp/App-macOS

          echo "=== Lancement productbuild ==="
          /usr/bin/productbuild \
            --sign "3rd Party Mac Developer Installer: Jean-Marc Canal (Y6F853GG9K)" \
            --component "$APP_ARCHIVE" /Applications \
            /tmp/App-macOS/App.pkg \
            && echo "=== .PKG CRÉÉ ✓ ===" \
            || { echo "=== PRODUCTBUILD ÉCHEC ==="; exit 1; }

          pkgutil --check-signature /tmp/App-macOS/App.pkg || true
          ls -lh /tmp/App-macOS/App.pkg

    artifacts:
      - /tmp/App-macOS/*.pkg
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
      email:
        recipients:
          - marcoxxx72@gmail.com

  ios-app-store:
    name: iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - signing
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          rm -rf node_modules package-lock.json
          npm install @capacitor/cli@5 @capacitor/core@5 @capacitor/ios@5 --legacy-peer-deps
          npx cap sync ios
          cd ios/App
          pod install
      - name: Set up signing
        script: |
          keychain initialize
          echo "$CM_MAC_CERT_KEY" > /tmp/cert_key.pem
          CERTS_DIR="$HOME/Library/Developer/Xcode/UserData/Certificates"
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$CERTS_DIR" "$PROFILES_DIR"
          app-store-connect fetch-signing-files "com.marcocanal.worldcup2026" \
            --platform IOS \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/cert_key.pem \
            --certificates-dir "$CERTS_DIR" \
            --profiles-dir "$PROFILES_DIR" \
            --create
          echo "=== P12 ==="
          ls "$CERTS_DIR"/*.p12 2>/dev/null || echo "Aucun P12"
          echo "=== Profiles ==="
          ls "$PROFILES_DIR"/*.mobileprovision 2>/dev/null || echo "Aucun profil"
          keychain add-certificates
          echo "=== Signing identities ==="
          security find-identity -v -p codesigning
      - name: Build iOS IPA
        script: |
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_PATH=$(ls "$PROFILES_DIR"/*.mobileprovision 2>/dev/null | head -1)
          echo "Profile path: $PROFILE_PATH"
          PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" 2>/dev/null | python3 -c "import sys,plistlib; d=plistlib.loads(sys.stdin.buffer.read()); print(d['UUID'])")
          echo "UUID: $PROFILE_UUID"
          if [ -z "$PROFILE_UUID" ]; then echo "ERREUR: UUID vide" && exit 1; fi
          xcodebuild clean archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath /tmp/App-iOS.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=Y6F853GG9K \
            PROVISIONING_PROFILE="$PROFILE_UUID"
          PROFILE_NAME=$(security cms -D -i "$PROFILE_PATH" 2>/dev/null | python3 -c "import sys,plistlib; d=plistlib.loads(sys.stdin.buffer.read()); print(d['Name'])")
          echo "Profile name: $PROFILE_NAME"
          python3 -c "import plistlib; plistlib.dump({'method':'app-store-connect','teamID':'Y6F853GG9K','uploadSymbols':True,'compileBitcode':False,'provisioningProfiles':{'com.marcocanal.worldcup2026':'$PROFILE_NAME'}},open('/tmp/ExportOptions-iOS.plist','wb'))"
          xcodebuild -exportArchive \
            -archivePath /tmp/App-iOS.xcarchive \
            -exportPath /tmp/App-iOS \
            -exportOptionsPlist /tmp/ExportOptions-iOS.plist
    artifacts:
      - /tmp/App-iOS/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - marcoxxx72@gmail.com

  # NOTE: Before this workflow can run, the Android platform must be added to the project:
  #   npx cap add android
  # Commit the generated android/ folder before triggering this workflow.
  android-app-store:
    name: Android App Store (Google Play)
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      node: latest
      # TODO: Add google_play group with service account credentials once available
      # groups:
      #   - google_play
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Sync Capacitor Android platform
        script: |
          # Requires the android/ folder to exist (npx cap add android must have been run first)
          npx cap sync android
      - name: Build Android App Bundle (AAB)
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
    publishing:
      # TODO: Configure Google Play credentials before enabling this block
      # google_play:
      #   credentials: $GPLAY_SERVICE_ACCOUNT_JSON
      #   track: internal
      email:
        recipients:
          - marcoxxx72@gmail.com
