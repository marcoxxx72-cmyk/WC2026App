workflows:
  macos-app-store:
    name: macOS App Store (Mac Catalyst)
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - signing
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          rm -rf node_modules package-lock.json
          npm install @capacitor/cli@5 @capacitor/core@5 @capacitor/ios@5 --legacy-peer-deps
          npx cap sync ios
          cd ios/App
          pod install
      - name: Set up signing
        script: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/build.keychain-db"
          KEYCHAIN_PASS="cmbuild2026"
          # Create keychain with known password
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 7200 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          # Set as default + add to search list
          security default-keychain -s "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" "$HOME/Library/Keychains/login.keychain-db"
          # Import Mac App Distribution cert + private key
          printf '%s' "$MAC_APP_P12" | base64 --decode > /tmp/mac_app.p12
          echo "P12 size: $(wc -c < /tmp/mac_app.p12) bytes"
          security import /tmp/mac_app.p12 -P "$MAC_APP_PWD" -A -k "$KEYCHAIN_PATH" 2>&1
          echo "Mac App import exit: $?"
          # Import Mac Installer cert if available
          if [ -n "$MAC_INSTALLER_P12" ]; then
            printf '%s' "$MAC_INSTALLER_P12" | base64 --decode > /tmp/mac_installer.p12
            security import /tmp/mac_installer.p12 -P "$MAC_INSTALLER_PWD" -A -k "$KEYCHAIN_PATH" 2>&1
            echo "Mac Installer import exit: $?"
          fi
          # Grant codesign access to private keys
          security set-key-partition-list -S "apple-tool:,apple:,codesign:" -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH" 2>&1
          echo "Partition list exit: $?"
          # Install provisioning profile
          printf '%s' "$MAC_PROVISIONING_PROFILE" | base64 --decode > /tmp/mac_catalyst.provisionprofile
          openssl smime -verify -inform DER -in /tmp/mac_catalyst.provisionprofile -noverify > /tmp/profile.plist 2>/dev/null
          UUID=$(plutil -extract UUID raw /tmp/profile.plist 2>/dev/null)
          echo "Profile UUID: ${UUID}"
          echo "$UUID" > /tmp/profile_uuid
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/mac_catalyst.provisionprofile ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.provisionprofile
          echo "=== Signing identities (all) ==="
          security find-identity -p codesigning
          echo "=== Signing identities (valid only) ==="
          security find-identity -v -p codesigning
      - name: Build macOS (Mac Catalyst)
        script: |
          UUID=$(cat /tmp/profile_uuid)
          xcodebuild clean archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -destination "platform=macOS,variant=Mac Catalyst" \
            -archivePath /tmp/App-macOS.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="3rd Party Mac Developer Application" \
            DEVELOPMENT_TEAM=Y6F853GG9K \
            PROVISIONING_PROFILE="${UUID}"
          xcodebuild -exportArchive \
            -archivePath /tmp/App-macOS.xcarchive \
            -exportPath /tmp/App-macOS \
            -exportOptionsPlist ios/App/ExportOptions-macOS.plist
    artifacts:
      - /tmp/App-macOS/*.pkg
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
      email:
        recipients:
          - marcoxxx72@gmail.com

  ios-app-store:
    name: iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.marcocanal.worldcup2026
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          rm -rf node_modules package-lock.json
          npm install @capacitor/cli@5 @capacitor/core@5 @capacitor/ios@5 --legacy-peer-deps
          npx cap sync ios
          cd ios/App
          pod install
      - name: Set up signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - marcoxxx72@gmail.com

  # NOTE: Before this workflow can run, the Android platform must be added to the project:
  #   npx cap add android
  # Commit the generated android/ folder before triggering this workflow.
  android-app-store:
    name: Android App Store (Google Play)
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      node: latest
      # TODO: Add google_play group with service account credentials once available
      # groups:
      #   - google_play
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Sync Capacitor Android platform
        script: |
          # Requires the android/ folder to exist (npx cap add android must have been run first)
          npx cap sync android
      - name: Build Android App Bundle (AAB)
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
    publishing:
      # TODO: Configure Google Play credentials before enabling this block
      # google_play:
      #   credentials: $GPLAY_SERVICE_ACCOUNT_JSON
      #   track: internal
      email:
        recipients:
          - marcoxxx72@gmail.com
