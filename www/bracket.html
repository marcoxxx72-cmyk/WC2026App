<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WC2026 Bracket</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #0d0d12;
    width: 100%; height: 100%;
    display: flex; justify-content: center; align-items: flex-start;
    overflow: hidden;
  }
  .outer {
    width: 100vw;
    display: flex; justify-content: center; align-items: flex-start;
  }
  .bracket-canvas {
    position: relative; flex-shrink: 0;
    width: 580px; height: 680px;
    background: #0d0d12;
    transform-origin: top center;
  }
  svg.lines {
    position: absolute; top: 0; left: 0;
    width: 580px; height: 680px;
    pointer-events: none;
  }
  .match {
    position: absolute; width: 180px; height: 64px;
    background: linear-gradient(135deg,#1e1e28,#161620);
    border: 1px solid rgba(212,175,55,0.4);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    gap: 6px; padding: 6px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.6),inset 0 1px 0 rgba(212,175,55,0.1);
    transition: width 0.4s ease, left 0.4s ease;
  }
  .flag {
    width: 80px; height: 52px;
    background: #12121a;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    font-size: 38px; line-height: 1;
    overflow: hidden; flex-shrink: 0;
  }
  .flag.loser { display: none; }
  .match.resolved .flag { width: 68px; font-size: 42px; }

  /* Advancement badges — same rectangle as a resolved R32/R16 team flag (68x52) */
  .adv-badge {
    position: absolute;
    width: 68px; height: 52px;
    display: flex; flex-direction: row; align-items: center; justify-content: center;
    gap: 3px;
    background: #12121a;
    border: 1px solid rgba(212,175,55,0.8);
    border-radius: 6px;
    transform: translate(-50%,-50%);
    z-index: 10;
    pointer-events: none;
    overflow: hidden;
  }
  .adv-badge .af {
    font-size: 42px; line-height: 1;
    text-align: center;
  }

  .trophy-wrap {
    position: absolute; left: 50%; top: 338px;
    transform: translateX(-50%) translateY(-50%);
    display: flex; flex-direction: column; align-items: center;
    z-index: 5;
  }
  .trophy-icon {
    font-size: 72px; line-height: 1;
    filter: drop-shadow(0 0 18px rgba(212,175,55,0.9)) drop-shadow(0 0 6px rgba(212,175,55,0.6));
  }
  #finalists { display: none; gap: 12px; margin-top: 8px; align-items: center; }
  .finalist { font-size: 50px; line-height: 56px; transition: opacity 0.4s ease; }
  .finalist.loser { opacity: 0.15; }
</style>
</head>
<body>
<div class="outer">
<div class="bracket-canvas" id="canvas">

  <svg class="lines" viewBox="0 0 580 680" xmlns="http://www.w3.org/2000/svg">
    <defs><style>.bl{stroke:#c8a020;stroke-width:2;fill:none;stroke-linecap:square;opacity:0.9;}</style></defs>
    <!-- LEFT -->
    <polyline class="bl" points="190,38 212,38 212,106 190,106"/>
    <line class="bl" x1="212" y1="72" x2="238" y2="72"/>
    <polyline class="bl" points="190,218 212,218 212,286 190,286"/>
    <line class="bl" x1="212" y1="252" x2="238" y2="252"/>
    <polyline class="bl" points="238,72 260,72 260,252 238,252"/>
    <line class="bl" x1="260" y1="162" x2="286" y2="162"/>
    <polyline class="bl" points="190,398 212,398 212,466 190,466"/>
    <line class="bl" x1="212" y1="432" x2="238" y2="432"/>
    <polyline class="bl" points="190,578 212,578 212,646 190,646"/>
    <line class="bl" x1="212" y1="612" x2="238" y2="612"/>
    <polyline class="bl" points="238,432 260,432 260,612 238,612"/>
    <line class="bl" x1="260" y1="522" x2="286" y2="522"/>
    <polyline class="bl" points="286,162 308,162 308,522 286,522"/>
    <line class="bl" x1="308" y1="342" x2="318" y2="342"/>
    <!-- RIGHT -->
    <polyline class="bl" points="390,38 368,38 368,106 390,106"/>
    <line class="bl" x1="368" y1="72" x2="342" y2="72"/>
    <polyline class="bl" points="390,218 368,218 368,286 390,286"/>
    <line class="bl" x1="368" y1="252" x2="342" y2="252"/>
    <polyline class="bl" points="342,72 320,72 320,252 342,252"/>
    <line class="bl" x1="320" y1="162" x2="294" y2="162"/>
    <polyline class="bl" points="390,398 368,398 368,466 390,466"/>
    <line class="bl" x1="368" y1="432" x2="342" y2="432"/>
    <polyline class="bl" points="390,578 368,578 368,646 390,646"/>
    <line class="bl" x1="368" y1="612" x2="342" y2="612"/>
    <polyline class="bl" points="342,432 320,432 320,612 342,612"/>
    <line class="bl" x1="320" y1="522" x2="294" y2="522"/>
    <polyline class="bl" points="294,162 272,162 272,522 294,522"/>
    <line class="bl" x1="272" y1="342" x2="262" y2="342"/>
  </svg>

  <!-- LEFT MATCHES -->
  <div class="match" style="left:10px;top:10px;"><div class="flag" data-team="Germany">🇩🇪</div><div class="flag" data-team="Paraguay">🇵🇾</div></div>
  <div class="match" style="left:10px;top:78px;"><div class="flag" data-team="France">🇫🇷</div><div class="flag" data-team="Sweden">🇸🇪</div></div>
  <div class="match" style="left:10px;top:190px;"><div class="flag" data-team="South Africa">🇿🇦</div><div class="flag" data-team="Canada">🇨🇦</div></div>
  <div class="match" style="left:10px;top:258px;"><div class="flag" data-team="Netherlands">🇳🇱</div><div class="flag" data-team="Morocco">🇲🇦</div></div>
  <div class="match" style="left:10px;top:370px;"><div class="flag" data-team="Portugal">🇵🇹</div><div class="flag" data-team="Croatia">🇭🇷</div></div>
  <div class="match" style="left:10px;top:438px;"><div class="flag" data-team="Spain">🇪🇸</div><div class="flag" data-team="Austria">🇦🇹</div></div>
  <div class="match" style="left:10px;top:550px;"><div class="flag" data-team="USA">🇺🇸</div><div class="flag" data-team="Bosnia">🇧🇦</div></div>
  <div class="match" style="left:10px;top:618px;"><div class="flag" data-team="Belgium">🇧🇪</div><div class="flag" data-team="Senegal">🇸🇳</div></div>

  <!-- RIGHT MATCHES -->
  <div class="match" style="left:390px;top:10px;"><div class="flag" data-team="Brazil">🇧🇷</div><div class="flag" data-team="Japan">🇯🇵</div></div>
  <div class="match" style="left:390px;top:78px;"><div class="flag" data-team="Ivory Coast">🇨🇮</div><div class="flag" data-team="Norway">🇳🇴</div></div>
  <div class="match" style="left:390px;top:190px;"><div class="flag" data-team="Mexico">🇲🇽</div><div class="flag" data-team="Ecuador">🇪🇨</div></div>
  <div class="match" style="left:390px;top:258px;"><div class="flag" data-team="England">🏴󠁧󠁢󠁥󠁮󠁧󠁿</div><div class="flag" data-team="DR Congo">🇨🇩</div></div>
  <div class="match" style="left:390px;top:370px;"><div class="flag" data-team="Argentina">🇦🇷</div><div class="flag" data-team="Cape Verde">🇨🇻</div></div>
  <div class="match" style="left:390px;top:438px;"><div class="flag" data-team="Australia">🇦🇺</div><div class="flag" data-team="Egypt">🇪🇬</div></div>
  <div class="match" style="left:390px;top:550px;"><div class="flag" data-team="Switzerland">🇨🇭</div><div class="flag" data-team="Algeria">🇩🇿</div></div>
  <div class="match" style="left:390px;top:618px;"><div class="flag" data-team="Colombia">🇨🇴</div><div class="flag" data-team="Ghana">🇬🇭</div></div>

  <!-- LEFT R16 BADGES (x=238, exact corner vertex of the polyline where the golden bar turns) -->
  <div class="adv-badge" id="blr0" style="left:238px;top:72px;display:none"><span class="af" id="blr0a"></span><span class="af" id="blr0b"></span></div>
  <div class="adv-badge" id="blr1" style="left:238px;top:252px;display:none"><span class="af" id="blr1a"></span><span class="af" id="blr1b"></span></div>
  <div class="adv-badge" id="blr2" style="left:238px;top:432px;display:none"><span class="af" id="blr2a"></span><span class="af" id="blr2b"></span></div>
  <div class="adv-badge" id="blr3" style="left:238px;top:612px;display:none"><span class="af" id="blr3a"></span><span class="af" id="blr3b"></span></div>

  <!-- LEFT QF BADGES (x=286, corner vertex ending the QF stub, same rule as R16) -->
  <div class="adv-badge" id="bql0" style="left:286px;top:162px;display:none"><span class="af" id="bql0a"></span><span class="af" id="bql0b"></span></div>
  <div class="adv-badge" id="bql1" style="left:286px;top:522px;display:none"><span class="af" id="bql1a"></span><span class="af" id="bql1b"></span></div>

  <!-- RIGHT R16 BADGES (x=342, mirror of left x=238) -->
  <div class="adv-badge" id="brr0" style="left:342px;top:72px;display:none"><span class="af" id="brr0a"></span><span class="af" id="brr0b"></span></div>
  <div class="adv-badge" id="brr1" style="left:342px;top:252px;display:none"><span class="af" id="brr1a"></span><span class="af" id="brr1b"></span></div>
  <div class="adv-badge" id="brr2" style="left:342px;top:432px;display:none"><span class="af" id="brr2a"></span><span class="af" id="brr2b"></span></div>
  <div class="adv-badge" id="brr3" style="left:342px;top:612px;display:none"><span class="af" id="brr3a"></span><span class="af" id="brr3b"></span></div>

  <!-- RIGHT QF BADGES (x=294, mirror of left x=286) -->
  <div class="adv-badge" id="bqr0" style="left:294px;top:162px;display:none"><span class="af" id="bqr0a"></span><span class="af" id="bqr0b"></span></div>
  <div class="adv-badge" id="bqr1" style="left:294px;top:522px;display:none"><span class="af" id="bqr1a"></span><span class="af" id="bqr1b"></span></div>

  <!-- TROPHY + FINALISTS -->
  <div class="trophy-wrap">
    <div class="trophy-icon">🏆</div>
    <div id="finalists">
      <span class="finalist" id="fin-l"></span>
      <span class="finalist" id="fin-r"></span>
    </div>
  </div>

</div>
</div>

<script>
(function(){
  function scale(){
    var c=document.getElementById('canvas');
    var vw=window.innerWidth;
    var sc=Math.min(1,vw/580);
    c.style.transform='scale('+sc+')';
    var h=Math.round(680*sc);
    document.body.style.height=h+'px';
    document.documentElement.style.height=h+'px';
  }

  function badge(id,fA,fB,win){
    var el=document.getElementById(id);
    if(!el)return;
    var ea=document.getElementById(id+'a');
    var eb=document.getElementById(id+'b');
    if(!win){el.style.display='none';return;}
    el.style.display='flex';
    if(ea){ea.textContent=win;ea.className='af';ea.style.display='';}
    if(eb){eb.textContent='';eb.style.display='none';}
  }

  function applyAll(){
    var d={};
    try{d=JSON.parse(localStorage.getItem('wc2026_bracket')||'{}');}catch(e){}
    var lw=d.lR32w||[],rw=d.rR32w||[];
    var l16=d.lR16w||[],r16=d.rR16w||[];
    var lq=d.lQFw||[],rq=d.rQFw||[];

    badge('blr0',lw[0],lw[1],l16[0]);
    badge('blr1',lw[2],lw[3],l16[1]);
    badge('blr2',lw[4],lw[5],l16[2]);
    badge('blr3',lw[6],lw[7],l16[3]);
    badge('bql0',l16[0],l16[1],lq[0]);
    badge('bql1',l16[2],l16[3],lq[1]);
    badge('brr0',rw[0],rw[1],r16[0]);
    badge('brr1',rw[2],rw[3],r16[1]);
    badge('brr2',rw[4],rw[5],r16[2]);
    badge('brr3',rw[6],rw[7],r16[3]);
    badge('bqr0',r16[0],r16[1],rq[0]);
    badge('bqr1',r16[2],r16[3],rq[1]);

    var ls=d.lSFw||null,rs=d.rSFw||null,fw=d.finalW||null;
    var frow=document.getElementById('finalists');
    var fL=document.getElementById('fin-l');
    var fR=document.getElementById('fin-r');
    if(ls||rs){
      if(frow)frow.style.display='flex';
      if(fL){fL.textContent=ls||'·';fL.className='finalist'+(fw&&ls&&ls!==fw?' loser':'');}
      if(fR){fR.textContent=rs||'·';fR.className='finalist'+(fw&&rs&&rs!==fw?' loser':'');}
    }

    var r32={};
    try{r32=JSON.parse(localStorage.getItem('wc2026_r32_results')||'{}');}catch(e){}
    document.querySelectorAll('.flag[data-team]').forEach(function(el){
      el.classList.toggle('loser',r32[el.getAttribute('data-team')]==='loser');
    });
    // Shrink match rectangles when a team is eliminated
    document.querySelectorAll('.match').forEach(function(m){
      var hasLoser=m.querySelector('.flag.loser')!==null;
      if(hasLoser){
        if(!m.dataset.origLeft) m.dataset.origLeft=parseInt(m.style.left);
        var orig=parseInt(m.dataset.origLeft);
        m.classList.add('resolved');
        m.style.width='92px';
        if(orig<250) m.style.left='98px'; // right edge stays at ~190 (SVG line)
      } else {
        if(m.dataset.origLeft!==undefined){
          m.classList.remove('resolved');
          m.style.width='';
          m.style.left=m.dataset.origLeft+'px';
        }
      }
    });
  }

  scale();
  applyAll();
  window.addEventListener('resize',scale);
  window.addEventListener('message',function(ev){
    if(!ev.data)return;
    if(ev.data.type==='bracket_data'){
      try{localStorage.setItem('wc2026_bracket',JSON.stringify(ev.data.data));}catch(e){}
      try{localStorage.setItem('wc2026_r32_results',JSON.stringify(ev.data.r32losers));}catch(e){}
    }
    applyAll();
  });
})();
</script>
</body>
</html>
