<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WC2026 Bracket</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:#0d0d12;width:100%;height:100%;overflow:hidden;}
  .outer{width:100%;}
  .bracket-canvas{position:relative;flex-shrink:0;background:#0d0d12;transform-origin:top left;}
  svg.lines{position:absolute;top:0;left:0;pointer-events:none;}
  .match{position:absolute;height:64px;background:linear-gradient(135deg,#1e1e28,#161620);border:1px solid rgba(212,175,55,0.4);border-radius:10px;display:flex;align-items:center;justify-content:center;gap:6px;padding:6px;box-shadow:0 3px 10px rgba(0,0,0,0.6),inset 0 1px 0 rgba(212,175,55,0.1);transition:width .4s ease,left .4s ease;}
  .flag{width:80px;height:52px;background:#12121a;border-radius:6px;border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:38px;line-height:1;overflow:hidden;flex-shrink:0;}
  .flag.loser{display:none;}
  .match.resolved .flag{width:68px;font-size:42px;}
  .adv-badge{position:absolute;width:68px;height:52px;display:flex;flex-direction:row;align-items:center;justify-content:center;gap:3px;background:#12121a;border:1px solid rgba(212,175,55,0.8);border-radius:6px;transform:translate(-50%,-50%);z-index:10;pointer-events:none;overflow:hidden;}
  .adv-badge .af{font-size:42px;line-height:1;text-align:center;}
  .trophy-wrap{position:absolute;left:50%;transform:translateX(-50%) translateY(-50%);display:flex;flex-direction:column;align-items:center;z-index:5;}
  .final-frame{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 18px;background:linear-gradient(135deg,#1e1e28,#161620);border:2px solid #d4af37;border-radius:12px;box-shadow:0 0 18px rgba(212,175,55,0.55),0 3px 12px rgba(0,0,0,0.6),inset 0 1px 0 rgba(212,175,55,0.15);}
  .final-title{font-size:13px;font-weight:bold;letter-spacing:3px;color:#d4af37;text-shadow:0 0 8px rgba(212,175,55,0.6);font-family:system-ui,-apple-system,sans-serif;}
  #finalists{display:none;gap:10px;align-items:center;}
  .finalist{font-size:46px;line-height:52px;transition:opacity .4s ease;}
  .finalist.loser{opacity:0.15;}
  .fin-sep{color:rgba(212,175,55,0.7);font-size:22px;line-height:1;}
</style>
</head>
<body>
<div class="outer"><div class="bracket-canvas" id="canvas">
  <svg class="lines" id="lines" xmlns="http://www.w3.org/2000/svg"></svg>
  <div class="trophy-wrap" id="trophy">
    <div class="final-frame">
      <div class="final-title">FINALE</div>
      <div id="finalists"><span class="finalist" id="fin-l"></span><span class="fin-sep">В·</span><span class="finalist" id="fin-r"></span></div>
    </div>
  </div>
</div></div>
<script>
(function(){
  // ==== LAYOUT CONSTANTS вЂ” single place to tune spacing ====
  // Responsive width: wide layout on desktop (validated), narrower on mobile so flags stay bigger
  var BP=700, DESK_CW=780, MOB_CW=660;
  var CW=(window.innerWidth>=BP)?DESK_CW:MOB_CW;
  var CH=680, MW=180, MH=64;
  var TOP_DESKTOP=120;   // push the bracket down on Mac/desktop only (0 on mobile)
  var LX=10, RX=CW-10-MW;
  var tops=[10,78, 190,258, 370,438, 550,618];   // original vertical rhythm
  var cy=tops.map(function(t){return t+MH/2;});
  var EL=LX+MW, CX=CW/2, gap=CX-EL;
  // central columns placed as fractions of the gap в†’ same look at any width
  var CF=[0.13,0.33,0.50,0.73,0.90,0.97];
  var L1=EL+gap*CF[0], LR16=EL+gap*CF[1], L2=EL+gap*CF[2], LQF=EL+gap*CF[3], L3=EL+gap*CF[4], LSF=EL+gap*CF[5];
  var R1=CW-L1, RR16=CW-LR16, R2=CW-L2, RQF=CW-LQF, R3=CW-L3, RSF=CW-LSF;
  function mid(a,b){return (a+b)/2;}
  var r16Y=[mid(cy[0],cy[1]),mid(cy[2],cy[3]),mid(cy[4],cy[5]),mid(cy[6],cy[7])];
  var qfY=[mid(r16Y[0],r16Y[1]),mid(r16Y[2],r16Y[3])];
  var sfY=mid(qfY[0],qfY[1]);

  // R32 match-ups shown in the first column (name + flag emoji)
  var leftPairs=[
    ['Germany','рџ‡©рџ‡Є','Paraguay','рџ‡µрџ‡ѕ'],['France','рџ‡«рџ‡·','Sweden','рџ‡ёрџ‡Є'],
    ['South Africa','рџ‡їрџ‡¦','Canada','рџ‡Ёрџ‡¦'],['Netherlands','рџ‡ірџ‡±','Morocco','рџ‡Ірџ‡¦'],
    ['Portugal','рџ‡µрџ‡№','Croatia','рџ‡­рџ‡·'],['Spain','рџ‡Єрџ‡ё','Austria','рџ‡¦рџ‡№'],
    ['USA','рџ‡єрџ‡ё','Bosnia','рџ‡§рџ‡¦'],['Belgium','рџ‡§рџ‡Є','Senegal','рџ‡ёрџ‡і']
  ];
  var rightPairs=[
    ['Brazil','рџ‡§рџ‡·','Japan','рџ‡Їрџ‡µ'],['Ivory Coast','рџ‡Ёрџ‡®','Norway','рџ‡ірџ‡ґ'],
    ['Mexico','рџ‡Ірџ‡Ѕ','Ecuador','рџ‡Єрџ‡Ё'],['England','рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї','DR Congo','рџ‡Ёрџ‡©'],
    ['Argentina','рџ‡¦рџ‡·','Cape Verde','рџ‡Ёрџ‡»'],['Australia','рџ‡¦рџ‡є','Egypt','рџ‡Єрџ‡¬'],
    ['Switzerland','рџ‡Ёрџ‡­','Algeria','рџ‡©рџ‡ї'],['Colombia','рџ‡Ёрџ‡ґ','Ghana','рџ‡¬рџ‡­']
  ];

  var canvas=document.getElementById('canvas');
  canvas.style.width=CW+'px'; canvas.style.height=CH+'px';
  var svg=document.getElementById('lines');
  svg.setAttribute('viewBox','0 0 '+CW+' '+CH);
  svg.setAttribute('width',CW); svg.setAttribute('height',CH);
  document.getElementById('trophy').style.top=sfY+'px';

  var NS='http://www.w3.org/2000/svg';
  var st=document.createElementNS(NS,'style');st.textContent='.bl{stroke:#c8a020;stroke-width:2;fill:none;stroke-linecap:square;opacity:0.9;}';svg.appendChild(st);
  function poly(pts){var p=document.createElementNS(NS,'polyline');p.setAttribute('class','bl');p.setAttribute('points',pts);svg.appendChild(p);}
  function ln(x1,y1,x2,y2){var l=document.createElementNS(NS,'line');l.setAttribute('class','bl');l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);svg.appendChild(l);}

  function drawSide(isLeft){
    var edge=isLeft?EL:RX, c1=isLeft?L1:R1, r16=isLeft?LR16:RR16, c2=isLeft?L2:R2, qf=isLeft?LQF:RQF, c3=isLeft?L3:R3, sf=isLeft?LSF:RSF;
    for(var p=0;p<4;p++){var a=cy[2*p],b=cy[2*p+1],m=r16Y[p];poly(edge+','+a+' '+c1+','+a+' '+c1+','+b+' '+edge+','+b);ln(c1,m,r16,m);}
    for(var q=0;q<2;q++){var a2=r16Y[2*q],b2=r16Y[2*q+1],m2=qfY[q];poly(r16+','+a2+' '+c2+','+a2+' '+c2+','+b2+' '+r16+','+b2);ln(c2,m2,qf,m2);}
    poly(qf+','+qfY[0]+' '+c3+','+qfY[0]+' '+c3+','+qfY[1]+' '+qf+','+qfY[1]);ln(c3,sfY,sf,sfY);
  }
  drawSide(true); drawSide(false);

  function matchBox(x,top,t1,f1,t2,f2){
    var m=document.createElement('div');m.className='match';m.style.left=x+'px';m.style.top=top+'px';m.style.width=MW+'px';
    var g1=document.createElement('div');g1.className='flag';g1.setAttribute('data-team',t1);g1.textContent=f1;
    var g2=document.createElement('div');g2.className='flag';g2.setAttribute('data-team',t2);g2.textContent=f2;
    m.appendChild(g1);m.appendChild(g2);canvas.appendChild(m);
  }
  for(var i=0;i<8;i++){var lp=leftPairs[i];matchBox(LX,tops[i],lp[0],lp[1],lp[2],lp[3]);}
  for(var j=0;j<8;j++){var rp=rightPairs[j];matchBox(RX,tops[j],rp[0],rp[1],rp[2],rp[3]);}

  function mkBadge(id,x,y){var el=document.createElement('div');el.className='adv-badge';el.id=id;el.style.left=x+'px';el.style.top=y+'px';el.style.display='none';var s=document.createElement('span');s.className='af';s.id=id+'a';el.appendChild(s);var s2=document.createElement('span');s2.className='af';s2.id=id+'b';s2.style.display='none';el.appendChild(s2);canvas.appendChild(el);}
  for(var k=0;k<4;k++){mkBadge('blr'+k,LR16,r16Y[k]);mkBadge('brr'+k,RR16,r16Y[k]);}
  for(var q2=0;q2<2;q2++){mkBadge('bql'+q2,LQF,qfY[q2]);mkBadge('bqr'+q2,RQF,qfY[q2]);}

  // ==== behavior ====
  function scale(){var vw=window.innerWidth;var sc=Math.min(1,vw/CW);var off=(sc>=1)?TOP_DESKTOP:0;var tx=Math.max(0,(vw-CW*sc)/2);canvas.style.transform='translate('+tx+'px,'+off+'px) scale('+sc+')';var h=Math.round(CH*sc)+off;document.body.style.height=h+'px';document.documentElement.style.height=h+'px';}
  function badge(id,win){var el=document.getElementById(id);if(!el)return;var ea=document.getElementById(id+'a');if(!win){el.style.display='none';return;}el.style.display='flex';if(ea){ea.textContent=win;ea.className='af';ea.style.display='';}}
  function applyAll(){
    var d={};try{d=JSON.parse(localStorage.getItem('wc2026_bracket')||'{}');}catch(e){}
    var l16=d.lR16w||[],r16=d.rR16w||[],lq=d.lQFw||[],rq=d.rQFw||[];
    for(var k=0;k<4;k++){badge('blr'+k,l16[k]);badge('brr'+k,r16[k]);}
    badge('bql0',lq[0]);badge('bql1',lq[1]);badge('bqr0',rq[0]);badge('bqr1',rq[1]);
    var ls=d.lSFw||null,rs=d.rSFw||null,fw=d.finalW||null;
    var frow=document.getElementById('finalists'),fL=document.getElementById('fin-l'),fR=document.getElementById('fin-r');
    if(ls||rs){if(frow)frow.style.display='flex';if(fL){fL.textContent=ls||'В·';fL.className='finalist'+(fw&&ls&&ls!==fw?' loser':'');}if(fR){fR.textContent=rs||'В·';fR.className='finalist'+(fw&&rs&&rs!==fw?' loser':'');}}
    var r32={};try{r32=JSON.parse(localStorage.getItem('wc2026_r32_results')||'{}');}catch(e){}
    document.querySelectorAll('.flag[data-team]').forEach(function(el){el.classList.toggle('loser',r32[el.getAttribute('data-team')]==='loser');});
    document.querySelectorAll('.match').forEach(function(m){var hasLoser=m.querySelector('.flag.loser')!==null;if(hasLoser){if(!m.dataset.origLeft)m.dataset.origLeft=parseInt(m.style.left);var orig=parseInt(m.dataset.origLeft);m.classList.add('resolved');m.style.width='92px';if(orig<CX)m.style.left=(EL-92)+'px';}else{if(m.dataset.origLeft!==undefined){m.classList.remove('resolved');m.style.width=MW+'px';m.style.left=m.dataset.origLeft+'px';}}});
  }
  scale();applyAll();
  window.addEventListener('resize',scale);
  window.addEventListener('message',function(ev){if(!ev.data)return;if(ev.data.type==='bracket_data'){try{localStorage.setItem('wc2026_bracket',JSON.stringify(ev.data.data));}catch(e){}try{localStorage.setItem('wc2026_r32_results',JSON.stringify(ev.data.r32losers));}catch(e){}}applyAll();});
})();
</script>
</body></html>
