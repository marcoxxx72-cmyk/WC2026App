<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WC2026 Bracket</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #0d0d12; overflow: hidden; }
  .outer { width: 100vw; }
  .bracket-canvas {
    position: fixed; top: 0; left: 0;
    width: 520px; height: 640px;
    background: #0d0d12;
    transform-origin: top left;
  }
  svg.lines {
    position: absolute; top: 0; left: 0;
    width: 520px; height: 640px;
    pointer-events: none;
  }
  .match {
    position: absolute; width: 148px; height: 52px;
    background: linear-gradient(135deg,#1e1e28,#161620);
    border: 1px solid rgba(212,175,55,0.4);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    gap: 5px; padding: 5px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5),inset 0 1px 0 rgba(212,175,55,0.08);
  }
  .flag {
    width: 60px; height: 40px;
    background: #12121a;
    border-radius: 5px;
    border: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items: center; justify-content: center;
    font-size: 27px; line-height: 1;
    overflow: hidden; flex-shrink: 0;
    transition: opacity 0.4s ease;
  }
  .flag.loser { opacity: 0.2; }

  /* Advancement badges */
  .adv-badge {
    position: absolute;
    display: flex; flex-direction: column; align-items: center;
    gap: 0;
    background: rgba(8,8,16,0.97);
    border: 1px solid rgba(212,175,55,0.7);
    border-radius: 5px;
    padding: 2px;
    transform: translate(-50%,-50%);
    z-index: 10;
    pointer-events: none;
  }
  .adv-badge .af {
    font-size: 13px; line-height: 14px;
    width: 17px; text-align: center;
    transition: opacity 0.4s ease;
  }
  .adv-badge .af.loser { opacity: 0.12; }

  .trophy-wrap {
    position: absolute; left: 50%; top: 318px;
    transform: translateX(-50%) translateY(-50%);
    display: flex; flex-direction: column; align-items: center;
    z-index: 5;
  }
  .trophy-icon {
    font-size: 56px; line-height: 1;
    filter: drop-shadow(0 0 14px rgba(212,175,55,0.8)) drop-shadow(0 0 4px rgba(212,175,55,0.5));
  }
  #finalists { display: none; gap: 6px; margin-top: 3px; align-items: center; }
  .finalist { font-size: 15px; line-height: 17px; transition: opacity 0.4s ease; }
  .finalist.loser { opacity: 0.12; }
</style>
</head>
<body>
<div class="outer">
<div class="bracket-canvas" id="canvas">

    <defs><style>.bl{stroke:#c8a020;stroke-width:1.6;fill:none;stroke-linecap:square;opacity:0.85;}</style></defs>
    <!-- LEFT -->

    <line class="bl" x1="175" y1="234" x2="198" y2="234"/>
    <polyline class="bl" points="198,66 215,66 215,234 198,234"/>
    <line class="bl" x1="215" y1="150" x2="238" y2="150"/>
    <polyline class="bl" points="158,371 175,371 175,433 158,433"/>
    <line class="bl" x1="175" y1="402" x2="198" y2="402"/>
    <polyline class="bl" points="158,539 175,539 175,601 158,601"/>
    <line class="bl" x1="175" y1="570" x2="198" y2="570"/>

    <line class="bl" x1="255" y1="318" x2="263" y2="318"/>
    <!-- RIGHT -->
    <polyline class="bl" points="362,35 345,35 345,97 362,97"/>
    <line class="bl" x1="345" y1="66" x2="322" y2="66"/>
    <polyline class="bl" points="362,203 345,203 345,265 362,265"/>
    <line class="bl" x1="345" y1="234" x2="322" y2="234"/>
    <polyline class="bl" points="322,66 305,66 305,234 322,234"/>
    <line class="bl" x1="305" y1="150" x2="282" y2="150"/>
    <polyline class="bl" points="362,371 345,371 345,433 362,433"/>
    <line class="bl" x1="345" y1="402" x2="322" y2="402"/>
    <polyline class="bl" points="362,539 345,539 345,601 362,601"/>
    <line class="bl" x1="345" y1="570" x2="322" y2="570"/>
    <polyline class="bl" points="322,402 305,402 305,570 322,570"/>
    <line class="bl" x1="305" y1="486" x2="282" y2="486"/>
    <polyline class="bl" points="282,150 265,150 265,486 282,486"/>
    <line class="bl" x1="265" y1="318" x2="257" y2="318"/>
  </svg>

  <!-- LEFT MATCHES -->
  <div class="match" style="left:10px;top:9px;"><div class="flag" data-team="Germany">🇩🇪</div><div class="flag" data-team="Paraguay">🇵🇾</div></div>
  <div class="match" style="left:10px;top:71px;"><div class="flag" data-team="France">🇫🇷</div><div class="flag" data-team="Sweden">🇸🇪</div></div>
  <div class="match" style="left:10px;top:177px;"><div class="flag" data-team="South Africa">🇿🇦</div><div class="flag" data-team="Canada">🇨🇦</div></div>
  <div class="match" style="left:10px;top:239px;"><div class="flag" data-team="Netherlands">🇳🇱</div><div class="flag" data-team="Morocco">🇲🇦</div></div>
  <div class="match" style="left:10px;top:345px;"><div class="flag" data-team="Portugal">🇵🇹</div><div class="flag" data-team="Croatia">🇭🇷</div></div>
  <div class="match" style="left:10px;top:407px;"><div class="flag" data-team="Spain">🇪🇸</div><div class="flag" data-team="Austria">🇦🇹</div></div>
  <div class="match" style="left:10px;top:513px;"><div class="flag" data-team="USA">🇺🇸</div><div class="flag" data-team="Bosnia">🇧🇦</div></div>
  <div class="match" style="left:10px;top:575px;"><div class="flag" data-team="Belgium">🇧🇪</div><div class="flag" data-team="Senegal">🇸🇳</div></div>

  <!-- RIGHT MATCHES -->
  <div class="match" style="left:362px;top:9px;"><div class="flag" data-team="Brazil">🇧🇷</div><div class="flag" data-team="Japan">🇯🇵</div></div>
  <div class="match" style="left:362px;top:71px;"><div class="flag" data-team="Ivory Coast">🇨🇮</div><div class="flag" data-team="Norway">🇳🇴</div></div>
  <div class="match" style="left:362px;top:177px;"><div class="flag" data-team="Mexico">🇲🇽</div><div class="flag" data-team="Ecuador">🇪🇨</div></div>
  <div class="match" style="left:362px;top:239px;"><div class="flag" data-team="England">🏴󠁧󠁢󠁥󠁮󠁧󠁿</div><div class="flag" data-team="DR Congo">🇨🇩</div></div>
  <div class="match" style="left:362px;top:345px;"><div class="flag" data-team="Argentina">🇦🇷</div><div class="flag" data-team="Cape Verde">🇨🇻</div></div>
  <div class="match" style="left:362px;top:407px;"><div class="flag" data-team="Australia">🇦🇺</div><div class="flag" data-team="Egypt">🇪🇬</div></div>
  <div class="match" style="left:362px;top:513px;"><div class="flag" data-team="Switzerland">🇨🇭</div><div class="flag" data-team="Algeria">🇩🇿</div></div>
  <div class="match" style="left:362px;top:575px;"><div class="flag" data-team="Colombia">🇨🇴</div><div class="flag" data-team="Ghana">🇬🇭</div></div>

  <!-- LEFT R16 BADGES (x=186) -->
  <div class="adv-badge" id="blr0" style="left:186px;top:66px;display:none"><span class="af" id="blr0a"></span><span class="af" id="blr0b"></span></div>
  <div class="adv-badge" id="blr1" style="left:186px;top:234px;display:none"><span class="af" id="blr1a"></span><span class="af" id="blr1b"></span></div>
  <div class="adv-badge" id="blr2" style="left:186px;top:402px;display:none"><span class="af" id="blr2a"></span><span class="af" id="blr2b"></span></div>
  <div class="adv-badge" id="blr3" style="left:186px;top:570px;display:none"><span class="af" id="blr3a"></span><span class="af" id="blr3b"></span></div>

  <!-- LEFT QF BADGES (x=226) -->
  <div class="adv-badge" id="bql0" style="left:226px;top:150px;display:none"><span class="af" id="bql0a"></span><span class="af" id="bql0b"></span></div>
  <div class="adv-badge" id="bql1" style="left:226px;top:486px;display:none"><span class="af" id="bql1a"></span><span class="af" id="bql1b"></span></div>

  <!-- RIGHT R16 BADGES (x=334) -->
  <div class="adv-badge" id="brr0" style="left:334px;top:66px;display:none"><span class="af" id="brr0a"></span><span class="af" id="brr0b"></span></div>
  <div class="adv-badge" id="brr1" style="left:334px;top:234px;display:none"><span class="af" id="brr1a"></span><span class="af" id="brr1b"></span></div>
  <div class="adv-badge" id="brr2" style="left:334px;top:402px;display:none"><span class="af" id="brr2a"></span><span class="af" id="brr2b"></span></div>
  <div class="adv-badge" id="brr3" style="left:334px;top:570px;display:none"><span class="af" id="brr3a"></span><span class="af" id="brr3b"></span></div>

  <!-- RIGHT QF BADGES (x=294) -->
  <div class="adv-badge" id="bqr0" style="left:294px;top:150px;display:none"><span class="af" id="bqr0a"></span><span class="af" id="bqr0b"></span></div>
  <div class="adv-badge" id="bqr1" style="left:294px;top:486px;display:none"><span class="af" id="bqr1a"></span><span class="af" id="bqr1b"></span></div>

  <!-- TROPHY + FINALISTS -->
  <div class="trophy-wrap">
    <div class="trophy-icon">🏆</div>
    <div id="finalists">
      <span class="finalist" id="fin-l"></span>
      <span class="finalist" id="fin-r"></span>
    </div>
  </div>

</div>
</div>

<script>
(function(){
  function scale(){
    var c=document.getElementById('canvas');
    var vw=window.innerWidth;
    var sc=Math.min(1,vw/520);
    c.style.transformOrigin='top left';
    c.style.transform='scale('+sc+')';
    c.style.left=Math.round((vw-520*sc)/2)+'px';
    var h=Math.round(640*sc);
    document.body.style.height=h+'px';
    document.documentElement.style.height=h+'px';
  }

  function badge(id,fA,fB,win){
    var el=document.getElementById(id);
    if(!el)return;
    if(!fA&&!fB){el.style.display='none';return;}
    el.style.display='flex';
    var ea=document.getElementById(id+'a');
    var eb=document.getElementById(id+'b');
    if(ea){ea.textContent=fA||'·';ea.className='af'+(win&&fA&&fA!==win?' loser':'');}
    if(eb){eb.textContent=fB||'·';eb.className='af'+(win&&fB&&fB!==win?' loser':'');}
  }

  function applyAll(){
    var d={};
    try{d=JSON.parse(localStorage.getItem('wc2026_bracket')||'{}');}catch(e){}
    var lw=d.lR32w||[],rw=d.rR32w||[];
    var l16=d.lR16w||[],r16=d.rR16w||[];
    var lq=d.lQFw||[],rq=d.rQFw||[];

    badge('blr0',lw[0],lw[1],l16[0]);
    badge('blr1',lw[2],lw[3],l16[1]);
    badge('blr2',lw[4],lw[5],l16[2]);
    badge('blr3',lw[6],lw[7],l16[3]);
    badge('bql0',l16[0],l16[1],lq[0]);
    badge('bql1',l16[2],l16[3],lq[1]);
    badge('brr0',rw[0],rw[1],r16[0]);
    badge('brr1',rw[2],rw[3],r16[1]);
    badge('brr2',rw[4],rw[5],r16[2]);
    badge('brr3',rw[6],rw[7],r16[3]);
    badge('bqr0',r16[0],r16[1],rq[0]);
    badge('bqr1',r16[2],r16[3],rq[1]);

    var ls=d.lSFw||null,rs=d.rSFw||null,fw=d.finalW||null;
    var frow=document.getElementById('finalists');
    var fL=document.getElementById('fin-l');
    var fR=document.getElementById('fin-r');
    if(ls||rs){
      if(frow)frow.style.display='flex';
      if(fL){fL.textContent=ls||'·';fL.className='finalist'+(fw&&ls&&ls!==fw?' loser':'');}
      if(fR){fR.textContent=rs||'·';fR.className='finalist'+(fw&&rs&&rs!==fw?' loser':'');}
    }

    var r32={};
    try{r32=JSON.parse(localStorage.getItem('wc2026_r32_results')||'{}');}catch(e){}
    document.querySelectorAll('.flag[data-team]').forEach(function(el){
      el.classList.toggle('loser',r32[el.getAttribute('data-team')]==='loser');
    });
  }

  scale();
  applyAll();
  window.addEventListener('resize',scale);
  window.addEventListener('message',function(ev){
    if(!ev.data)return;
    if(ev.data.type==='bracket_data'){
      try{localStorage.setItem('wc2026_bracket',JSON.stringify(ev.data.data));}catch(e){}
      try{localStorage.setItem('wc2026_r32_results',JSON.stringify(ev.data.r32losers));}catch(e){}
    }
    applyAll();
  });
})();
</script>
</body>
</html>
