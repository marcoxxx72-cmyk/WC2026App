<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#08091a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="WC 2026"/>
<title>World Cup 2026 ⚽</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3832829015013673"
     crossorigin="anonymous"></script>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icon-192.png"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#08091a;color:#eee8d5;font-family:sans-serif;min-height:100vh}
#root{min-height:100vh}
select{-webkit-appearance:none;appearance:none}
</style>
<!-- Pro activation via URL -->
<script>
(function(){
  var params = new URLSearchParams(window.location.search);
  if(params.get('pro')==='1'){
    try{ localStorage.setItem('wc2026_pro','1'); }catch(e){}
    window.location.href = 'worldcup2026://?pro=1';
    setTimeout(function(){
      document.open();
      document.write('<div style="font-family:sans-serif;text-align:center;padding:60px 20px;background:#08091a;color:#d4af37;min-height:100vh"><div style="font-size:48px">🏆</div><h2 style="margin:20px 0">Pro activé !</h2><p style="color:#aaa">Revenez dans l\'application World Cup 2026</p></div>');
      document.close();
    }, 1500);
  }
})();
</script>
<!-- OneSignal -->
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "29a090bc-9893-46a1-87a3-e3f162e2271d",
    });
  });
</script>
</head>
<body>
<style>@keyframes sp{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}</style>
<div id="splash" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#08091a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s ease">
  <div style="font-size:64px;animation:sp 1.4s ease-in-out infinite">⚽</div>
  <div style="color:#d4af37;font-size:18px;font-weight:bold;letter-spacing:3px;margin-top:16px">WORLD CUP 2026</div>
  <div style="color:#a8bfd4;font-size:11px;margin-top:10px;letter-spacing:1px">Loading...</div>
</div>
<div id="root"></div>
<script>
(function(){
  var sp=document.getElementById('splash');
  var root=document.getElementById('root');
  var done=false;
  function hide(){if(done)return;done=true;sp.style.opacity='0';setTimeout(function(){sp.style.display='none';},420);}
  var ob=new MutationObserver(function(){if(root.children.length>0){hide();ob.disconnect();}});
  ob.observe(root,{childList:true,subtree:true});
  setTimeout(hide,8000);
})();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/build/three.min.js"></script>
<script type="module">
import {GLTFLoader} from 'https://cdn.jsdelivr.net/npm/three@0.152.0/examples/jsm/loaders/GLTFLoader.js';
import {DRACOLoader} from 'https://cdn.jsdelivr.net/npm/three@0.152.0/examples/jsm/loaders/DRACOLoader.js';
window.GLTFLoader=GLTFLoader;window.DRACOLoader=DRACOLoader;
window.dispatchEvent(new Event('loaders-ready'));
</script>
<script src="/app.js"></script>
<script>
(function(){
  document.addEventListener('DOMContentLoaded',function(){
    var isIOS=window.Capacitor&&window.Capacitor.getPlatform()==='ios';
    if(!isIOS||!window.RCCapacitor||!window.RCCapacitor.Purchases)return;
    var RC=window.RCCapacitor.Purchases;
    RC.configure({apiKey:'appl_GXcUUucxHJtVOrEQMAMwOCSlETj'}).then(function(){
      return RC.getCustomerInfo();
    }).then(function(info){
      var active=info&&info.customerInfo&&info.customerInfo.entitlements&&info.customerInfo.entitlements.active;
      if(active&&active['pro']){
        try{localStorage.setItem('wc2026_pro','1');}catch(e){}
        if(window._setPremium)window._setPremium(true);
      }
    }).catch(function(){});
  });
})();
</script>
</body>
</html>
