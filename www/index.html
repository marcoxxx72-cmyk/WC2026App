<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#08091a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="WC 2026"/>
<title>World Cup 2026 ⚽</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3832829015013673"
     crossorigin="anonymous"></script>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icon-192.png"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#08091a;color:#eee8d5;font-family:sans-serif;min-height:100vh}
#root{min-height:100vh}
select{-webkit-appearance:none;appearance:none}
</style>
<!-- Pro activation via URL -->
<script>
(function(){
  var params = new URLSearchParams(window.location.search);
  if(params.get('pro')==='1'){
    try{ localStorage.setItem('wc2026_pro','1'); }catch(e){}
    var isNative = window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform();
    if(isNative){
      window.location.href = 'worldcup2026://?pro=1';
      setTimeout(function(){
        document.open();
        document.write('<div style="font-family:sans-serif;text-align:center;padding:60px 20px;background:#08091a;color:#d4af37;min-height:100vh"><div style="font-size:48px">🏆</div><h2 style="margin:20px 0">Pro activé !</h2><p style="color:#aaa">Revenez dans l\'application World Cup 2026</p></div>');
        document.close();
      }, 1500);
    } else {
      window.location.replace('/');
    }
  }
})();
</script>
<!-- OneSignal -->
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "29a090bc-9893-46a1-87a3-e3f162e2271d",
    });
  });
</script>
</head>
<body>
<div id="splash" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#08091a center/cover no-repeat;z-index:9999;transition:opacity .5s ease;cursor:pointer;overflow:hidden"></div>
<div id="root"></div>
<script>
window._wcSplashUp=true;
(function(){
  var sp=document.getElementById('splash');

  var saved='';try{saved=localStorage.getItem('wc2026_lang')||'';}catch(e){}
  var nav=(navigator.language||'').toLowerCase().slice(0,2);
  var map={fr:'fr',es:'es',pt:'pt',it:'it',de:'de'};
  var lang=saved||(map[nav]||'en');

  var suffix=window.innerWidth>=1024?'desktop':'phone';
  var isNativeApp=!!(window.Capacitor&&window.Capacitor.isNativePlatform());
  var splashSuffix=isNativeApp?('-'+suffix+'-ios'):('-'+suffix);
  sp.style.backgroundImage="url('/public/splash-"+lang+splashSuffix+".png')";
  sp.style.backgroundSize='cover';

  // Overlay titre "WC26 FAN APP" — masque le titre original dans l'image
  var ov=document.createElement('div');
  ov.style.cssText='position:absolute;top:0;left:0;right:0;height:32%;background:linear-gradient(to bottom,rgba(4,4,8,0.96) 50%,transparent 100%);display:flex;align-items:center;justify-content:center;pointer-events:none;';
  var t=document.createElement('div');
  t.style.cssText='color:#d4af37;font-size:clamp(22px,6vw,44px);font-weight:900;letter-spacing:4px;text-transform:uppercase;font-family:Impact,"Arial Black",sans-serif;text-shadow:0 0 30px rgba(212,175,55,0.9),0 3px 10px rgba(0,0,0,0.9);text-align:center;margin-top:12px;';
  t.textContent='WC26 FAN APP';
  ov.appendChild(t);
  sp.appendChild(ov);

  function hide(){
    window._wcSplashUp=false;
    // Stop any music React may have queued, then start fresh on this gesture
    try{
      if(window._wcMusic){window._wcMusic.pause();window._wcMusic=null;}
      var mu=localStorage.getItem('wc2026_music');
      if(mu!=='off'){
        var src=(mu==='B')?'/RitmodaTorcida.mp3':'/Goals.mp3';
        var a=new Audio(src);a.loop=true;a.volume=0.3;a._wcsrc=src;
        a.play().catch(function(){});
        window._wcMusic=a;
      }
    }catch(e){}
    sp.style.opacity='0';
    setTimeout(function(){sp.style.display='none';},500);
  }
  setTimeout(function(){
    sp.addEventListener('click',hide);
    sp.addEventListener('touchstart',hide,{passive:true});
  },500);
})();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/build/three.min.js"></script>
<script type="module">
import {GLTFLoader} from 'https://cdn.jsdelivr.net/npm/three@0.152.0/examples/jsm/loaders/GLTFLoader.js';
import {DRACOLoader} from 'https://cdn.jsdelivr.net/npm/three@0.152.0/examples/jsm/loaders/DRACOLoader.js';
window.GLTFLoader=GLTFLoader;window.DRACOLoader=DRACOLoader;
window.dispatchEvent(new Event('loaders-ready'));
</script>
<script src="/app.js"></script>
<script>
(function(){
  document.addEventListener('DOMContentLoaded',function(){
    var isIOS=window.Capacitor&&window.Capacitor.getPlatform()==='ios';
    if(!isIOS||!window.RCCapacitor||!window.RCCapacitor.Purchases)return;
    var RC=window.RCCapacitor.Purchases;
    RC.configure({apiKey:'appl_GXcUUucxHJtVOrEQMAMwOCSlETj'}).then(function(){
      window._rcReady=true;
      return RC.getCustomerInfo();
    }).then(function(info){
      var active=info&&info.customerInfo&&info.customerInfo.entitlements&&info.customerInfo.entitlements.active;
      if(active&&active['premium']){
        try{localStorage.setItem('wc2026_pro','1');}catch(e){}
        if(window._setPremium)window._setPremium(true);
      }
    }).catch(function(){window._rcReady=true;});
  });
})();
</script>
</body>
</html>
