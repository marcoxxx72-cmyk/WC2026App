<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Penalty PRO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:linear-gradient(135deg,#0a0e1a,#0d1b2a,#0a0e1a);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Arial,sans-serif;overflow:hidden}

/* ── SCORE ── */
.score{color:#fff;font-size:14px;display:flex;gap:30px;margin-bottom:12px;letter-spacing:1px}
.score strong{color:#ffd700;font-size:26px;display:block;text-align:center}

/* ── CAGE ── */
.goal{
  position:relative;width:340px;height:240px;
  border:4px solid rgba(255,255,255,.9);border-bottom:none;border-radius:3px 3px 0 0;
  background:
    repeating-linear-gradient(0deg,transparent,transparent 18px,rgba(255,255,255,.06) 18px,rgba(255,255,255,.06) 19px),
    repeating-linear-gradient(90deg,transparent,transparent 18px,rgba(255,255,255,.06) 18px,rgba(255,255,255,.06) 19px);
  overflow:hidden;
}
.goal::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(180deg,rgba(30,60,120,.25),rgba(10,20,50,.5))}

/* ── GARDIEN SVG ── */
#gk-wrap{
  position:absolute;bottom:0;left:50%;
  transform:translateX(-50%);
  width:80px;height:160px;
  transform-origin:bottom center;
}
#gk-svg{width:100%;height:100%;overflow:visible;}

/* ── BALLON ── */
#ball{
  position:absolute;width:32px;height:32px;
  border-radius:50%;
  background:radial-gradient(circle at 35% 32%,#fff 18%,#ddd 40%,#999 70%,#555);
  bottom:-50px;left:50%;transform:translateX(-50%);
  display:none;
  box-shadow:0 4px 14px rgba(0,0,0,.6);
}
#ball::after{content:'';position:absolute;top:30%;left:20%;width:30%;height:20%;background:rgba(0,0,0,.25);border-radius:50%;transform:rotate(-30deg)}

/* ── FLASH RESULT ── */
#flash{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  font-size:28px;font-weight:900;white-space:nowrap;
  pointer-events:none;text-shadow:0 4px 18px rgba(0,0,0,.9);
  transition:transform .16s cubic-bezier(.34,1.56,.64,1);
}
#flash.show{transform:translate(-50%,-50%) scale(1)}

/* ── CONFETTIS GOAL ── */
.conf{position:absolute;top:-8px;font-size:16px;pointer-events:none;opacity:0;}

/* ── BOUTONS ── */
.label{color:rgba(255,255,255,.5);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin:18px 0 10px}
.btns{display:flex;gap:14px}
.btn{
  width:72px;height:72px;border-radius:50%;border:none;
  font-size:26px;cursor:pointer;
  box-shadow:0 6px 20px rgba(0,0,0,.4);
  transition:transform .1s;color:#fff;
  display:flex;align-items:center;justify-content:center;
}
.btn:active{transform:scale(.88)}
.btn:disabled{opacity:.35;pointer-events:none}
.btnL{background:linear-gradient(135deg,#e74c3c,#c0392b)}
.btnC{background:linear-gradient(135deg,#f39c12,#e67e22)}
.btnR{background:linear-gradient(135deg,#27ae60,#2ecc71)}
.hint{color:rgba(255,255,255,.25);font-size:10px;margin-top:12px;letter-spacing:1px}

/* ══════════════════════════════════════════
   ANIMATIONS GARDIEN — 6 positions
   Base : transform-origin = bottom center
   ══════════════════════════════════════════ */

/* Idle — oscillation douce */
@keyframes idle{
  0%,100%{transform:translateX(-50%) rotate(-2deg)}
  50%{transform:translateX(-50%) rotate(2deg)}
}

/* TYPE A — LUCARNE (-78° / +78°) */
@keyframes diveLA{
  0%  {transform:translateX(-50%) translateY(0)      rotate(0)}
  30% {transform:translateX(-130px) translateY(-60px) rotate(-50deg)}
  100%{transform:translateX(-190px) translateY(-20px) rotate(-78deg)}
}
@keyframes diveRA{
  0%  {transform:translateX(-50%) translateY(0)      rotate(0)}
  30% {transform:translateX(50px)  translateY(-60px) rotate(50deg)}
  100%{transform:translateX(110px) translateY(-20px) rotate(78deg)}
}

/* TYPE B — RAS DU SOL (-55° / +55°) */
@keyframes diveLB{
  0%  {transform:translateX(-50%) translateY(0)      rotate(0)}
  30% {transform:translateX(-110px) translateY(20px) rotate(-35deg)}
  100%{transform:translateX(-170px) translateY(30px) rotate(-55deg)}
}
@keyframes diveRB{
  0%  {transform:translateX(-50%) translateY(0)      rotate(0)}
  30% {transform:translateX(30px)  translateY(20px)  rotate(35deg)}
  100%{transform:translateX(90px)  translateY(30px)  rotate(55deg)}
}

/* SAUT CENTRE */
@keyframes jump{
  0%  {transform:translateX(-50%) translateY(0)      scaleX(1)}
  40% {transform:translateX(-50%) translateY(-75px)  scaleX(1.15)}
  70% {transform:translateX(-50%) translateY(-65px)  scaleX(1.2)}
  100%{transform:translateX(-50%) translateY(0)      scaleX(1)}
}

/* ATTRAPPAGE CENTRE BAS */
@keyframes catchC{
  0%  {transform:translateX(-50%) translateY(0)   rotate(0)     scaleY(1)}
  50% {transform:translateX(-50%) translateY(8px)  rotate(-18deg) scaleY(0.92)}
  100%{transform:translateX(-50%) translateY(14px) rotate(-28deg) scaleY(0.85)}
}

/* ══ TRAJECTOIRES BALLON ══ */
@keyframes flyL{
  0%  {bottom:-50px;left:50%;opacity:1;transform:translateX(-50%) scale(1)}
  100%{bottom:195px;left:11%;opacity:.35;transform:translateX(-50%) scale(.42)}
}
@keyframes flyCH{
  0%  {bottom:-50px;left:50%;opacity:1;transform:translateX(-50%) scale(1)}
  100%{bottom:210px;left:50%;opacity:.35;transform:translateX(-50%) scale(.38)}
}
/* Centre bas — ballon roule vers le gardien, finit au sol */
@keyframes flyCM{
  0%  {bottom:-50px;left:50%;opacity:1;transform:translateX(-50%) scale(1)}
  100%{bottom:6px;left:50%;opacity:.75;transform:translateX(-50%) scale(.88)}
}
@keyframes flyR{
  0%  {bottom:-50px;left:50%;opacity:1;transform:translateX(-50%) scale(1)}
  100%{bottom:195px;left:88%;opacity:.35;transform:translateX(-50%) scale(.42)}
}

/* CONFETTIS */
@keyframes confFall{
  0%  {transform:translateY(0) rotate(0);opacity:1}
  100%{transform:translateY(230px) rotate(720deg);opacity:0}
}
</style>
</head>
<body>

<div class="score">
  <div>⚽ Buts<br><strong id="sg">0</strong></div>
  <div>🧤 Arrêts<br><strong id="ss">0</strong></div>
</div>

<div class="goal" id="goal">

  <!-- Gardien SVG — bras animés via CSS transition sur <g> -->
  <div id="gk-wrap">
    <svg id="gk-svg" viewBox="-40 -160 80 160" xmlns="http://www.w3.org/2000/svg" style="overflow:visible">
      <!-- Tête -->
      <circle cx="0" cy="-142" r="12" fill="rgba(255,255,255,.15)" stroke="white" stroke-width="2.5"/>
      <!-- Torse -->
      <line x1="0" y1="-130" x2="0" y2="-80" stroke="white" stroke-width="4" stroke-linecap="round"/>
      <!-- Bassin -->
      <line x1="-14" y1="-80" x2="14" y2="-80" stroke="white" stroke-width="3" stroke-linecap="round"/>

      <!-- BRAS GAUCHE — groupe rotatif autour épaule (-8,-118) -->
      <g id="aL" style="transform-origin:-8px -118px;transform:rotate(20deg);transition:transform .38s cubic-bezier(.2,0,.4,1)">
        <line x1="-8" y1="-118" x2="-20" y2="-95" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
        <!-- Avant-bras — sous-groupe rotatif autour coude (-20,-95) -->
        <g id="faL" style="transform-origin:-20px -95px;transform:rotate(-15deg);transition:transform .32s cubic-bezier(.2,0,.4,1)">
          <line x1="-20" y1="-95" x2="-30" y2="-72" stroke="white" stroke-width="3" stroke-linecap="round"/>
          <circle id="gk-gloveL" cx="-30" cy="-72" r="8" fill="rgba(120,224,0,.4)" stroke="#78e000" stroke-width="2.5"/>
        </g>
      </g>

      <!-- BRAS DROIT — groupe rotatif autour épaule (8,-118) -->
      <g id="aR" style="transform-origin:8px -118px;transform:rotate(-20deg);transition:transform .38s cubic-bezier(.2,0,.4,1)">
        <line x1="8" y1="-118" x2="20" y2="-95" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
        <!-- Avant-bras -->
        <g id="faR" style="transform-origin:20px -95px;transform:rotate(15deg);transition:transform .32s cubic-bezier(.2,0,.4,1)">
          <line x1="20" y1="-95" x2="30" y2="-72" stroke="white" stroke-width="3" stroke-linecap="round"/>
          <circle id="gk-gloveR" cx="30" cy="-72" r="8" fill="rgba(120,224,0,.4)" stroke="#78e000" stroke-width="2.5"/>
        </g>
      </g>

      <!-- Jambe gauche -->
      <line x1="-8" y1="-80" x2="-14" y2="-40" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
      <line x1="-14" y1="-40" x2="-18" y2="-6" stroke="white" stroke-width="4" stroke-linecap="round"/>
      <!-- Jambe droite -->
      <line x1="8" y1="-80" x2="14" y2="-40" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
      <line x1="14" y1="-40" x2="18" y2="-6" stroke="white" stroke-width="4" stroke-linecap="round"/>
    </svg>
  </div>

  <div id="ball"></div>
  <!-- Ballon sécurisé — visible en phase 3 catch -->
  <svg id="catch-ball" style="display:none;position:absolute;left:50%;top:45%;transform:translate(-50%,-50%);pointer-events:none;overflow:visible" viewBox="-14 -14 28 28" width="28" height="28">
    <circle cx="0" cy="0" r="13" fill="rgba(120,224,0,.2)" stroke="#78e000" stroke-width="2.5"/>
    <line x1="-13" y1="0" x2="13" y2="0" stroke="rgba(120,224,0,.35)" stroke-width="1"/>
    <line x1="0" y1="-13" x2="0" y2="13" stroke="rgba(120,224,0,.35)" stroke-width="1"/>
  </svg>
  <div id="flash"></div>
</div>

<p class="label">Où tirez-vous ?</p>
<div class="btns">
  <button class="btn btnL" onclick="shoot('L')">⬅</button>
  <button class="btn btnC" onclick="shoot('C')">⬆</button>
  <button class="btn btnR" onclick="shoot('R')">➡</button>
</div>
<p class="hint" id="hint-txt">Le gardien choisit aléatoirement</p>

<script>
const wrap  = document.getElementById('gk-wrap');
const ball  = document.getElementById('ball');
const flash = document.getElementById('flash');
const goal  = document.getElementById('goal');
const btns  = document.querySelectorAll('.btn');
let busy=false, goals=0, saves=0;

/* ══ setState iOS-safe ══ */
function setState(s){
  const durMap={idle:'1.6s',jump:'.52s',catchC:'.4s',diveLA:'.42s',diveLB:'.42s',diveRA:'.42s',diveRB:'.42s'};
  const dur   = durMap[s]||'.42s';
  const fill  = s==='idle'?'none':'forwards';
  const rep   = s==='idle'?'infinite':'1';
  const ease  = s==='idle'?'ease-in-out':s==='jump'?'ease-out':'cubic-bezier(.2,0,.4,1)';

  /* iOS Safari fix — reset + reflow */
  wrap.style.animation='none';
  void wrap.offsetWidth;
  wrap.style.animation=`${s} ${dur} ${ease} ${fill} ${rep}`;

  /* Mise à jour SVG selon position */
  updateSVG(s);
}

/* ══ Bras animés via rotation CSS sur <g> ══
   aL/faL = upper arm L / forearm L
   aR/faR = upper arm R / forearm R
   Angles : rotation autour de l'épaule / coude
*/
const aL=document.getElementById('aL');
const faL=document.getElementById('faL');
const aR=document.getElementById('aR');
const faR=document.getElementById('faR');

function setArms(alDeg,falDeg,arDeg,farDeg){
  // Rotation autour du joint — pattern universel Safari/Chrome/iOS
  aL.style.transform  =`translate(-8px,-118px) rotate(${alDeg}deg) translate(8px,118px)`;
  faL.style.transform =`translate(-20px,-95px) rotate(${falDeg}deg) translate(20px,95px)`;
  aR.style.transform  =`translate(8px,-118px)  rotate(${arDeg}deg)  translate(-8px,118px)`;
  faR.style.transform =`translate(20px,-95px)  rotate(${farDeg}deg) translate(-20px,95px)`;
}

function updateSVG(s){
  // [bras gauche épaule, avant-bras gauche coude, bras droit épaule, avant-bras droit coude]
  const poses={
    idle:   [20,  -15, -20,  15],   // bras légèrement ouverts
    diveLA: [-110, -40,  35,  20],  // G lucarne haut, D traîne
    diveRA: [-25,  -20, 110,  40],  // D lucarne haut, G traîne
    diveLB: [ 50,   30, -15,  10],  // G vers sol gauche
    diveRB: [ 15,   10, -50, -30],  // D vers sol droit
    jump:   [-70,  -25,  70,  25],  // les deux bras montent
    catchC: [ 55,   25, -55, -25],  // bras ouverts vers le bas
  };
  const p=poses[s]||poses.idle;
  setArms(p[0],p[1],p[2],p[3]);
}

/* Phase 2 — bras se referment */
function setCatchPhase2(){ setArms(75, 30, -75, -30); }

/* Phase 3 — bras referment autour du ballon au sol */
function setCatchPhase3(){
  setArms(85, 55, -85, -55);
  document.getElementById('gk-gloveL').setAttribute('r','9');
  document.getElementById('gk-gloveR').setAttribute('r','9');
  document.getElementById('catch-ball').style.display='block';
}

function spawnConfetti(){
  const emojis=['🎊','⭐','🎉','✨','🌟','💫','🥇'];
  for(let i=0;i<10;i++){
    const d=document.createElement('div');
    d.className='conf';
    d.textContent=emojis[i%emojis.length];
    d.style.left=(5+i*9)+'%';
    d.style.top='0';
    d.style.fontSize=(12+Math.random()*10)+'px';
    d.style.animation=`confFall ${.8+i*.1}s ease-in ${i*.06}s forwards`;
    goal.appendChild(d);
    setTimeout(()=>d.remove(),2000);
  }
}

function showFlash(txt,color){
  flash.textContent=txt;
  flash.style.color=color;
  flash.classList.add('show');
  setTimeout(()=>flash.classList.remove('show'),1100);
}

function shoot(dir){
  if(busy)return;
  busy=true;
  btns.forEach(b=>b.disabled=true);

  /* IA gardien — choisit parmi les positions adaptées */
  const choices=['L','C','R'];
  const kDir=choices[Math.floor(Math.random()*3)];

  /* Ballon centre : haut ou bas — lié à l'animation gardien */
  const ballHigh=Math.random()<.5;

  function keeperAnim(kd){
    if(kd==='L') return Math.random()<.5?'diveLA':'diveLB';
    if(kd==='R') return Math.random()<.5?'diveRA':'diveRB';
    // Si gardien choisit centre ET tireur centre → lier hauteur
    return (dir==='C'&&kd==='C') ? (ballHigh?'jump':'catchC') : (Math.random()<.5?'jump':'catchC');
  }
  const kAnim=keeperAnim(kDir);

  /* Trajectoire ballon */
  let ballAnim='flyL';
  if(dir==='R') ballAnim='flyR';
  else if(dir==='C') ballAnim=ballHigh?'flyCH':'flyCM';

  /* Reset ballon iOS-safe */
  ball.style.animation='none';
  ball.style.display='block';
  void ball.offsetWidth;
  ball.style.animation=`${ballAnim} .55s ease-in forwards`;

  setState(kAnim);

  /* Catch 3 phases — seulement si catchC */
  if(kAnim==='catchC'){
    setTimeout(setCatchPhase2, 320);   // Phase 2 — contact ballon
    setTimeout(setCatchPhase3, 520);   // Phase 3 — sécurisé
  }

  /* Résultat */
  setTimeout(()=>{
    const saved=(dir===kDir)||
      (dir==='L'&&(kAnim==='diveLA'||kAnim==='diveLB'))||
      (dir==='R'&&(kAnim==='diveRA'||kAnim==='diveRB'))||
      (dir==='C'&&(kAnim==='jump'||kAnim==='catchC'));

    if(saved){
      saves++;document.getElementById('ss').textContent=saves;
      showFlash('ARRÊTÉ ! 🧤','#ffd700');
    } else {
      goals++;document.getElementById('sg').textContent=goals;
      showFlash('BUT ! ⚽','#ff4444');
      spawnConfetti();
    }
  },550);

  /* Reset */
  setTimeout(()=>{
    /* iOS-safe reset animation */
    wrap.style.animation='none';
    void wrap.offsetWidth;
    setState('idle');
    ball.style.display='none';
    document.getElementById('catch-ball').style.display='none';
    /* Reset gants taille normale */
    document.getElementById('gk-gloveL').setAttribute('r','8');
    document.getElementById('gk-gloveR').setAttribute('r','8');
    busy=false;
    btns.forEach(b=>b.disabled=false);
    updateSVG('idle');
  },2000);
}

setState('idle');
</script>
</body>
</html>
